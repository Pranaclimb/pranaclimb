<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pranaclimb">
    <title>Pranaclimb - Raw BR + Expressions</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
        }

        .breathing-animation {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.05); opacity: 0.35; }
        }

        .slide-up {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-shadow {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .pulse-circle {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        @supports (padding: max(0px)) {
            body {
                padding-top: max(env(safe-area-inset-top), 0px);
                padding-bottom: max(env(safe-area-inset-bottom), 0px);
            }
        }
    </style>
</head>
<body class="gradient-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Expression adjustment table (for manual marking)
        const EXPRESSION_ADJUSTMENTS = {
            'breath_hold': { adjustments: [2, 4, 6, 8, 10], emoji: '🔇', label: 'Breath Hold' },
            'grunt': { adjustment: 3, emoji: '💪', label: 'Grunt' },
            'scream': { adjustment: 5, emoji: '😱', label: 'Scream' },
            'strong_nasal': { adjustment: 2, emoji: '👃', label: 'Strong Nasal' },
            'yes_woo': { adjustments: [1, 2], emoji: '🎉', label: 'YES/WOO' },
            'sigh': { adjustments: [0, -1], emoji: '😮‍💨', label: 'Sigh' },
            'rp_latent': { adjustment: 1, emoji: '🧠', label: 'RP Latent' }
        };

        function PranaclimbApp() {
            const [isRecording, setIsRecording] = useState(false);
            const [audioLevel, setAudioLevel] = useState(0);
            const [breathCount, setBreathCount] = useState(0);
            const [rawBR, setRawBR] = useState(0);
            const [rpe, setRpe] = useState(5);
            const [elapsedTime, setElapsedTime] = useState(0);
            const [breathingNow, setBreathingNow] = useState(false);
            const [peakBR, setPeakBR] = useState(0);
            
            // Manual expression marking
            const [showExpressionMarker, setShowExpressionMarker] = useState(false);
            const [manualExpressions, setManualExpressions] = useState([]);
            const [showExpressionTable, setShowExpressionTable] = useState(false);
            const [showRPEScale, setShowRPEScale] = useState(false);
            
            // Audio recording
            const [audioRecording, setAudioRecording] = useState(null);
            const [audioURL, setAudioURL] = useState(null);
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);
            
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const mediaStreamRef = useRef(null);
            const animationFrameRef = useRef(null);
            const breathTimestampsRef = useRef([]);
            const lastBreathTimeRef = useRef(0);
            const energyHistoryRef = useRef([]);

            // Timer
            useEffect(() => {
                let interval;
                if (isRecording) {
                    interval = setInterval(() => {
                        setElapsedTime(prev => prev + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isRecording]);

            // Breath detection (RAW ONLY - no expression classification)
            const analyzeAudio = () => {
                if (!analyserRef.current) return;
                
                const bufferLength = analyserRef.current.frequencyBinCount;
                const freqData = new Uint8Array(bufferLength);
                const timeData = new Uint8Array(bufferLength);
                
                analyserRef.current.getByteFrequencyData(freqData);
                analyserRef.current.getByteTimeDomainData(timeData);
                
                const sampleRate = 16000;
                const minBin = Math.floor((150 / (sampleRate / 2)) * bufferLength);
                const maxBin = Math.floor((1500 / (sampleRate / 2)) * bufferLength);
                
                let breathEnergy = 0;
                for (let i = minBin; i < maxBin; i++) {
                    breathEnergy += freqData[i];
                }
                breathEnergy = breathEnergy / (maxBin - minBin);
                
                let rms = 0;
                for (let i = 0; i < timeData.length; i++) {
                    const normalized = (timeData[i] - 128) / 128;
                    rms += normalized * normalized;
                }
                rms = Math.sqrt(rms / timeData.length) * 100;
                
                const combinedEnergy = Math.max(breathEnergy, rms);
                setAudioLevel(combinedEnergy);
                
                energyHistoryRef.current.push(combinedEnergy);
                if (energyHistoryRef.current.length > 20) {
                    energyHistoryRef.current.shift();
                }
                
                const now = Date.now();
                const timeSinceLastBreath = now - lastBreathTimeRef.current;
                const minTimeBetweenBreaths = 1000;
                
                if (energyHistoryRef.current.length >= 15 && timeSinceLastBreath > minTimeBetweenBreaths) {
                    const recent = energyHistoryRef.current.slice(-5);
                    const earlier = energyHistoryRef.current.slice(-15, -10);
                    const oldest = energyHistoryRef.current.slice(0, 5);
                    
                    const recentAvg = recent.reduce((a, b) => a + b, 0) / recent.length;
                    const earlierAvg = earlier.reduce((a, b) => a + b, 0) / earlier.length;
                    const oldestAvg = oldest.reduce((a, b) => a + b, 0) / oldest.length;
                    
                    const hadPeak = earlierAvg > oldestAvg + 5;
                    const nowFalling = recentAvg < earlierAvg - 3;
                    const aboveThreshold = earlierAvg > 15;
                    
                    const anySound = combinedEnergy > 12;
                    setBreathingNow(anySound);
                    
                    // COUNT RAW EXHALE ONLY
                    if (hadPeak && nowFalling && aboveThreshold) {
                        breathTimestampsRef.current.push(now);
                        setBreathCount(prev => prev + 1);
                        lastBreathTimeRef.current = now;
                        
                        const oneMinuteAgo = now - 60000;
                        const recentBreaths = breathTimestampsRef.current.filter(t => t > oneMinuteAgo);
                        const newRawBR = recentBreaths.length;
                        setRawBR(newRawBR);
                        
                        if (newRawBR > peakBR) {
                            setPeakBR(newRawBR);
                        }
                    }
                } else {
                    const anySound = combinedEnergy > 12;
                    setBreathingNow(anySound);
                }
                
                animationFrameRef.current = requestAnimationFrame(analyzeAudio);
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: true,
                            sampleRate: 16000
                        } 
                    });
                    mediaStreamRef.current = stream;
                    
                    // Audio analysis
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 16000
                    });
                    const source = audioContextRef.current.createMediaStreamSource(stream);
                    analyserRef.current = audioContextRef.current.createAnalyser();
                    analyserRef.current.fftSize = 4096;
                    analyserRef.current.smoothingTimeConstant = 0.1;
                    source.connect(analyserRef.current);
                    
                    // Audio recording for playback
                    mediaRecorderRef.current = new MediaRecorder(stream);
                    audioChunksRef.current = [];
                    
                    mediaRecorderRef.current.ondataavailable = (event) => {
                        audioChunksRef.current.push(event.data);
                    };
                    
                    mediaRecorderRef.current.onstop = () => {
                        const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        setAudioRecording(audioBlob);
                        setAudioURL(audioUrl);
                    };
                    
                    mediaRecorderRef.current.start();
                    setIsRecording(true);
                    setElapsedTime(0);
                    setBreathCount(0);
                    setRawBR(0);
                    setPeakBR(0);
                    breathTimestampsRef.current = [];
                    energyHistoryRef.current = [];
                    setManualExpressions([]);
                    
                    analyzeAudio();
                    
                } catch (err) {
                    console.error('Error accessing microphone:', err);
                    alert('Please allow microphone access');
                }
            };

            const stopRecording = () => {
                setIsRecording(false);
                
                if (animationFrameRef.current) {
                    cancelAnimationFrame(animationFrameRef.current);
                }
                
                if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                    mediaRecorderRef.current.stop();
                }
                
                if (mediaStreamRef.current) {
                    mediaStreamRef.current.getTracks().forEach(track => track.stop());
                }
                
                if (audioContextRef.current) {
                    audioContextRef.current.close();
                }
                
                // Show expression marker after recording
                setTimeout(() => setShowExpressionMarker(true), 500);
            };

            const addManualExpression = (type, value) => {
                const adjustment = value !== undefined ? value : 
                    EXPRESSION_ADJUSTMENTS[type].adjustment ||
                    EXPRESSION_ADJUSTMENTS[type].adjustments[0];
                
                setManualExpressions(prev => [...prev, {
                    type,
                    adjustment,
                    emoji: EXPRESSION_ADJUSTMENTS[type].emoji,
                    label: EXPRESSION_ADJUSTMENTS[type].label
                }]);
            };

            const removeExpression = (index) => {
                setManualExpressions(prev => prev.filter((_, i) => i !== index));
            };

            const resetSession = () => {
                setElapsedTime(0);
                setBreathCount(0);
                setRawBR(0);
                setPeakBR(0);
                setRpe(5);
                breathTimestampsRef.current = [];
                energyHistoryRef.current = [];
                lastBreathTimeRef.current = 0;
                setManualExpressions([]);
                setAudioRecording(null);
                setAudioURL(null);
                setShowExpressionMarker(false);
            };

            const downloadAudio = () => {
                if (audioRecording) {
                    const url = URL.createObjectURL(audioRecording);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `pranaclimb_${Date.now()}.webm`;
                    a.click();
                }
            };

            const exportData = () => {
                const data = {
                    timestamp: new Date().toISOString(),
                    duration: elapsedTime,
                    breathCount: breathCount,
                    rawBR: rawBR,
                    peakBR: peakBR,
                    rpe: rpe,
                    manualExpressions: manualExpressions,
                    totalAdjustment: manualExpressions.reduce((sum, exp) => sum + exp.adjustment, 0)
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pranaclimb_${Date.now()}.json`;
                a.click();
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            return (
                <div className="min-h-screen pb-8">
                    <div className="fixed inset-0 pointer-events-none overflow-hidden">
                        <div className="breathing-animation absolute top-20 right-20 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#87CEEB' }} />
                        <div className="breathing-animation absolute bottom-20 left-20 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#32CD32', animationDelay: '1.5s' }} />
                        <div className="breathing-animation absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#FF00FC', animationDelay: '3s' }} />
                    </div>

                    <div className="relative z-10 max-w-7xl mx-auto px-4 py-6">
                        {/* Header */}
                        <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 mb-6 card-shadow slide-up border-2 border-gray-100">
                            <div className="flex items-center justify-between mb-6 flex-wrap gap-4">
                                <div>
                                    <h1 className="text-4xl font-bold mb-2 flex items-center gap-3" style={{ color: '#FF00FC' }}>
                                        Pranaclimb
                                        {breathingNow && isRecording && (
                                            <span className="pulse-circle inline-block w-4 h-4 rounded-full" 
                                                  style={{ backgroundColor: '#32CD32' }} />
                                        )}
                                    </h1>
                                    <p className="text-gray-600 font-medium">Raw Breath Rate Recording</p>
                                </div>
                                <div className="text-right">
                                    <div className="mono text-5xl font-bold text-gray-900">
                                        {formatTime(elapsedTime)}
                                    </div>
                                    <div className="text-gray-500 text-sm font-semibold">SESSION TIME</div>
                                </div>
                            </div>
                            
                            {/* Info box */}
                            {!isRecording && !audioRecording && (
                                <div className="mb-6 p-4 bg-gradient-to-r from-green-50 to-blue-50 rounded-2xl border-2 border-green-200">
                                    <p className="text-sm font-bold text-gray-900 mb-2">
                                        🎯 Clean & Accurate Workflow:
                                    </p>
                                    <ul className="text-xs text-gray-700 space-y-1">
                                        <li>• <strong>During session:</strong> Counts RAW exhales only (1 breath = 1 count)</li>
                                        <li>• <strong>After session:</strong> Listen to recording & mark expressions for your records</li>
                                        <li>• <strong>Result:</strong> Raw BR + separate expression log (not combined)</li>
                                        <li>• <strong>Audio saved:</strong> Replay anytime for accurate analysis</li>
                                    </ul>
                                </div>
                            )}
                            
                            {/* Controls */}
                            <div className="flex gap-4 flex-wrap">
                                {!isRecording && !audioRecording ? (
                                    <button
                                        onClick={startRecording}
                                        className="flex-1 min-w-[200px] text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                        style={{ backgroundColor: '#32CD32' }}
                                    >
                                        ▶ Start Recording
                                    </button>
                                ) : isRecording ? (
                                    <button
                                        onClick={stopRecording}
                                        className="flex-1 min-w-[200px] bg-red-500 hover:bg-red-600 text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                    >
                                        ■ Stop & Analyze
                                    </button>
                                ) : null}
                                
                                {audioRecording && (
                                    <>
                                        <button
                                            onClick={downloadAudio}
                                            className="text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                            style={{ backgroundColor: '#87CEEB' }}
                                        >
                                            🎙️ Download Audio
                                        </button>
                                        <button
                                            onClick={exportData}
                                            className="text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                            style={{ backgroundColor: '#32CD32' }}
                                        >
                                            📊 Export Data
                                        </button>
                                        <button
                                            onClick={resetSession}
                                            className="bg-gray-600 text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                        >
                                            🔄 New Session
                                        </button>
                                    </>
                                )}
                                
                                <button
                                    onClick={() => setShowRPEScale(!showRPEScale)}
                                    className="text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                    style={{ backgroundColor: '#32CD32' }}
                                >
                                    📊 RPE Scale
                                </button>
                                
                                <button
                                    onClick={() => setShowExpressionTable(!showExpressionTable)}
                                    className="text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                    style={{ backgroundColor: '#FF00FC' }}
                                >
                                    📋 Expressions
                                </button>
                            </div>
                        </div>

                        {/* Main metrics */}
                        <div className="grid md:grid-cols-3 gap-6 mb-6">
                            {/* Raw BR */}
                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-4 border-gray-100 slide-up"
                                 style={{ borderColor: '#87CEEB' }}>
                                <div className="flex items-center justify-between mb-3">
                                    <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">
                                        Raw BR
                                    </span>
                                    <span className="text-xs px-3 py-1 rounded-full" style={{ backgroundColor: '#87CEEB', color: 'white' }}>
                                        Observed
                                    </span>
                                </div>
                                <div className="mono text-6xl font-bold mb-2" style={{ color: '#87CEEB' }}>
                                    {rawBR}
                                </div>
                                <div className="text-sm text-gray-600 font-semibold">Breaths/Min</div>
                                <div className="mt-4 text-sm text-gray-500">
                                    Total: {breathCount} breaths
                                </div>
                                <div className="mt-2 text-xs text-gray-400">
                                    Peak: {peakBR} BPM
                                </div>
                            </div>

                            {/* RPE */}
                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-2 slide-up" 
                                 style={{ borderColor: '#32CD32' }}>
                                <div className="flex items-center justify-between mb-3">
                                    <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">
                                        RPE
                                    </span>
                                </div>
                                <div className="mono text-6xl font-bold mb-2" style={{ color: '#32CD32' }}>
                                    {rpe}
                                </div>
                                <div className="text-sm text-gray-600 font-semibold mb-4">
                                    Perceived Exertion
                                </div>
                                <input
                                    type="range"
                                    min="0"
                                    max="10"
                                    value={rpe}
                                    onChange={(e) => setRpe(parseInt(e.target.value))}
                                    className="w-full h-3 rounded-full appearance-none cursor-pointer"
                                    style={{ 
                                        background: `linear-gradient(to right, #87CEEB 0%, #32CD32 50%, #FF00FC 100%)`,
                                        accentColor: '#32CD32'
                                    }}
                                />
                            </div>

                            {/* Audio Level */}
                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-2 border-gray-100 slide-up">
                                <div className="flex items-center justify-between mb-3">
                                    <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">
                                        🎙️ Audio
                                    </span>
                                </div>
                                <div className="relative h-32 bg-gray-100 rounded-2xl overflow-hidden">
                                    <div
                                        className="absolute bottom-0 left-0 right-0 transition-all duration-100"
                                        style={{ 
                                            height: `${audioLevel}%`,
                                            background: 'linear-gradient(to top, #87CEEB, #32CD32, #FF00FC)'
                                        }}
                                    />
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <span className="mono text-4xl font-bold text-gray-800">
                                            {audioLevel.toFixed(0)}%
                                        </span>
                                    </div>
                                </div>
                                <p className="text-xs text-gray-500 mt-2 text-center">
                                    {isRecording ? '🔴 Recording' : audioRecording ? '✅ Saved' : 'Ready'}
                                </p>
                            </div>
                        </div>

                        {/* Audio Playback & Expression Marker */}
                        {audioRecording && (
                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 mb-6 card-shadow border-2 slide-up"
                                 style={{ borderColor: '#FF00FC' }}>
                                <h3 className="text-xl font-bold mb-4 flex items-center gap-2" style={{ color: '#FF00FC' }}>
                                    🎙️ Audio Playback & Expression Marker
                                </h3>
                                
                                {/* Audio Player */}
                                <div className="bg-gray-50 rounded-2xl p-4 mb-4">
                                    <audio controls className="w-full" src={audioURL} />
                                    <p className="text-xs text-gray-500 mt-2 text-center">
                                        Listen carefully and mark expressions below
                                    </p>
                                </div>
                                
                                {/* Expression Buttons */}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                                    {Object.entries(EXPRESSION_ADJUSTMENTS).map(([key, data]) => (
                                        <div key={key}>
                                            {data.adjustments ? (
                                                <div className="space-y-1">
                                                    <div className="text-xs font-bold text-gray-600 mb-1">
                                                        {data.emoji} {data.label}
                                                    </div>
                                                    {data.adjustments.map((val, idx) => (
                                                        <button
                                                            key={idx}
                                                            onClick={() => addManualExpression(key, val)}
                                                            className="w-full bg-gradient-to-r from-purple-100 to-pink-100 hover:from-purple-200 hover:to-pink-200 text-gray-900 px-3 py-2 rounded-lg text-xs font-semibold transition"
                                                        >
                                                            {val > 0 ? '+' : ''}{val} BPM
                                                        </button>
                                                    ))}
                                                </div>
                                            ) : (
                                                <button
                                                    onClick={() => addManualExpression(key)}
                                                    className="w-full bg-gradient-to-r from-purple-100 to-pink-100 hover:from-purple-200 hover:to-pink-200 text-gray-900 px-4 py-3 rounded-xl text-sm font-semibold transition"
                                                >
                                                    {data.emoji} {data.label}<br/>
                                                    <span className="text-xs">+{data.adjustment} BPM</span>
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                
                                {/* Manual Expression List */}
                                {manualExpressions.length > 0 && (
                                    <div className="bg-gradient-to-r from-pink-50 to-purple-50 rounded-2xl p-4 border-2"
                                         style={{ borderColor: '#FF00FC' }}>
                                        <div className="flex items-center justify-between mb-3">
                                            <h4 className="font-bold text-gray-900">Marked Expressions</h4>
                                            <span className="text-sm font-bold mono" style={{ color: '#FF00FC' }}>
                                                Total: +{manualExpressions.reduce((s, e) => s + e.adjustment, 0)} BPM
                                            </span>
                                        </div>
                                        <div className="space-y-2">
                                            {manualExpressions.map((exp, idx) => (
                                                <div key={idx} className="flex items-center justify-between bg-white rounded-lg p-3">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-xl">{exp.emoji}</span>
                                                        <span className="font-semibold text-gray-900">{exp.label}</span>
                                                        <span className="text-sm text-gray-600">
                                                            ({exp.adjustment > 0 ? '+' : ''}{exp.adjustment} BPM)
                                                        </span>
                                                    </div>
                                                    <button
                                                        onClick={() => removeExpression(idx)}
                                                        className="text-red-500 hover:text-red-700 font-bold"
                                                    >
                                                        ✕
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Results Summary */}
                        {audioRecording && (
                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-2 border-gray-100 slide-up">
                                <h3 className="text-xl font-bold mb-6 text-gray-900">
                                    📊 Session Summary
                                </h3>
