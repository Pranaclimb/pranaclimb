<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranaclimb Recovery Breath Ladder</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icon components
        const Play = () => (
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const Pause = () => (
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const RotateCcw = () => (
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        );

        const Info = () => (
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        function BreathLadder() {
            const [currentRung, setCurrentRung] = useState(2);
            const [isPlaying, setIsPlaying] = useState(false);
            const [phase, setPhase] = useState('ready');
            const [timeRemaining, setTimeRemaining] = useState(0);
            const [cycleCount, setCycleCount] = useState(0);
            const [showInfo, setShowInfo] = useState(false);
            
            const timerRef = useRef(null);

            const ladder = [
                { rung: 1, inhale: 2, exhale: 4, label: "Immediate calming", cue: "Lengthen the out-breath", use: "Post-crux chaos / BR > 55 BPM reset", wbal: "+10% / 10s", target: "BR → 40 BPM" },
                { rung: 2, inhale: 3, exhale: 6, label: "Settling HR and BR", cue: "Slow the exit", use: "Shake-outs / Between attempts", wbal: "+15-20% / 10s", target: "BR → 30 BPM" },
                { rung: 3, inhale: 4, exhale: 8, label: "Clear parasympathetic shift", cue: "Longer out = safer signal", use: "Deep recovery between burns", wbal: "+20-30% / 10s", target: "BR → 25 BPM" },
                { rung: 4, inhale: 5, exhale: 10, label: "Deep recovery", cue: "Let the system downshift", use: "Long rest / Pre-redpoint prep", wbal: "+30-40% / 10s", target: "BR → 20 BPM" },
                { rung: 5, inhale: 6, exhale: 12, label: "Advanced / Post-session", cue: "Quiet breath, quiet mind", use: "End of session / Sleep prep", wbal: "+40-50% / 10s", target: "BR → 15 BPM" }
            ];

            const current = ladder[currentRung];

            useEffect(() => {
                if (isPlaying) {
                    if (phase === 'ready') {
                        setPhase('inhale');
                        setTimeRemaining(current.inhale);
                    }

                    timerRef.current = setInterval(() => {
                        setTimeRemaining(prev => {
                            if (prev <= 0.1) {
                                if (phase === 'inhale') {
                                    setPhase('exhale');
                                    return current.exhale;
                                } else {
                                    setPhase('inhale');
                                    setCycleCount(c => c + 1);
                                    return current.inhale;
                                }
                            }
                            return prev - 0.1;
                        });
                    }, 100);
                } else {
                    if (timerRef.current) {
                        clearInterval(timerRef.current);
                    }
                }

                return () => {
                    if (timerRef.current) {
                        clearInterval(timerRef.current);
                    }
                };
            }, [isPlaying, phase, current]);

            const togglePlay = () => {
                if (!isPlaying) {
                    setPhase('ready');
                    setTimeRemaining(0);
                }
                setIsPlaying(!isPlaying);
            };

            const reset = () => {
                setIsPlaying(false);
                setPhase('ready');
                setTimeRemaining(0);
                setCycleCount(0);
            };

            const handleRungChange = (index) => {
                setCurrentRung(index);
                setIsPlaying(false);
                setPhase('ready');
                setTimeRemaining(0);
            };

            const getBubbleSize = () => {
                if (phase === 'ready') return 50;
                
                const duration = phase === 'inhale' ? current.inhale : current.exhale;
                const elapsed = duration - timeRemaining;
                const progress = elapsed / duration;
                
                if (phase === 'inhale') {
                    return 30 + (progress * 70);
                } else {
                    return 100 - (progress * 70);
                }
            };

            const bubbleSize = getBubbleSize();

            return (
                <div className="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-blue-900 p-6">
                    <div className="max-w-6xl mx-auto">
                        <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-8 mb-8 border border-white/20">
                            <div className="flex items-center justify-between mb-4 flex-wrap gap-4">
                                <div>
                                    <h1 className="text-4xl font-bold text-white mb-2">
                                        🪜 Pranaclimb Recovery Breath Ladder
                                    </h1>
                                    <p className="text-white/80 text-lg">Extended Exhale • Parasympathetic Activation • W'bal Recharge</p>
                                    <p className="text-white/60 text-sm italic mt-1">"Control your breathing. Control your climbing." - Pranaclimb Methodology</p>
                                </div>
                                <button
                                    onClick={() => setShowInfo(!showInfo)}
                                    className="bg-white/20 hover:bg-white/30 text-white p-3 rounded-full transition"
                                >
                                    <Info />
                                </button>
                            </div>
                        </div>

                        {showInfo && (
                            <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-8 mb-8 border border-white/20" style={{maxHeight: '80vh', overflowY: 'auto'}}>
                                <h2 className="text-2xl font-bold text-white mb-4">🌬️ The Pranaclimb Recovery System</h2>
                                
                                <div className="bg-gradient-to-r from-indigo-500/20 to-purple-500/20 rounded-xl p-6 mb-6 border border-indigo-500/30">
                                    <h3 className="text-xl font-bold text-white mb-3">🎯 Pranaclimb in 3 Variables</h3>
                                    <div className="grid md:grid-cols-3 gap-4 text-white/90 mb-4">
                                        <div className="bg-white/10 rounded-lg p-4 text-center">
                                            <div className="text-3xl mb-2">🫁</div>
                                            <div className="font-bold">Breathing Rate</div>
                                            <div className="text-sm opacity-80">Real-time effort</div>
                                        </div>
                                        <div className="bg-white/10 rounded-lg p-4 text-center">
                                            <div className="text-3xl mb-2">⭐</div>
                                            <div className="font-bold">RPE</div>
                                            <div className="text-sm opacity-80">Perceived exertion</div>
                                        </div>
                                        <div className="bg-white/10 rounded-lg p-4 text-center">
                                            <div className="text-3xl mb-2">💓</div>
                                            <div className="font-bold">HRR₆₀</div>
                                            <div className="text-sm opacity-80">Recovery speed</div>
                                        </div>
                                    </div>
                                    <p className="text-white/90 text-center">
                                        Together they power <strong>W'bal</strong> - your anaerobic battery for climbing performance
                                    </p>
                                </div>

                                <div className="bg-cyan-500/20 rounded-xl p-6 mb-4 border border-cyan-500/30">
                                    <h3 className="text-xl font-bold text-white mb-3">⚡ Critical Thresholds</h3>
                                    <div className="space-y-3 text-white/90">
                                        <div className="flex items-center gap-3">
                                            <div className="bg-green-500 w-4 h-4 rounded-full"></div>
                                            <div><strong>Recovery Zone: BR ≤ 30 BPM</strong> - W'bal recharges (+20-50% per 10s)</div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className="bg-orange-500 w-4 h-4 rounded-full"></div>
                                            <div><strong>CP: BR ≈ 45 BPM / RPE 8</strong> - Sustainable climbing threshold</div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className="bg-red-500 w-4 h-4 rounded-full"></div>
                                            <div><strong>RCP: BR > 55 BPM / RPE 9-10</strong> - Redline / hyperventilation</div>
                                        </div>
                                    </div>
                                    <div className="mt-4 p-3 bg-white/10 rounded-lg">
                                        <p className="text-white/90 text-sm">
                                            <strong>💡 Key Insight:</strong> Extended exhale breathing (2:1 ratio) keeps you below CP, 
                                            accelerates W'bal recharge, and activates parasympathetic recovery via vagal stimulation.
                                        </p>
                                    </div>
                                </div>

                                <div className="bg-green-500/20 rounded-xl p-6 mb-4 border border-green-500/30">
                                    <h3 className="text-xl font-bold text-white mb-3">🔋 W'bal Recovery Rates</h3>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-white/90">
                                            <thead>
                                                <tr className="border-b border-white/20">
                                                    <th className="text-left py-2">Scenario</th>
                                                    <th className="text-left py-2">BR Target</th>
                                                    <th className="text-left py-2">Recovery Rate</th>
                                                    <th className="text-left py-2">Use Rung</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr className="border-b border-white/10">
                                                    <td className="py-2">Shake-out (on wall)</td>
                                                    <td className="py-2">≤ 30 BPM</td>
                                                    <td className="py-2">+10-20% / 10s</td>
                                                    <td className="py-2">2:4 or 3:6</td>
                                                </tr>
                                                <tr className="border-b border-white/10">
                                                    <td className="py-2">Between attempts</td>
                                                    <td className="py-2">≤ 25 BPM</td>
                                                    <td className="py-2">+20-30% / 10s</td>
                                                    <td className="py-2">3:6 or 4:8</td>
                                                </tr>
                                                <tr className="border-b border-white/10">
                                                    <td className="py-2">Post-session</td>
                                                    <td className="py-2">≤ 20 BPM</td>
                                                    <td className="py-2">+40-50% / 10s</td>
                                                    <td className="py-2">5:10 or 6:12</td>
                                                </tr>
                                                <tr>
                                                    <td className="py-2">Complete rest (kneebar)</td>
                                                    <td className="py-2">≤ 15 BPM</td>
                                                    <td className="py-2">+50% / minute</td>
                                                    <td className="py-2">6:12 (advanced)</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div className="mt-6 p-6 bg-gradient-to-r from-pink-500/20 to-purple-500/20 rounded-xl border border-pink-500/30">
                                    <h3 className="text-xl font-bold text-white mb-3">📚 Learn More</h3>
                                    <p className="text-white/90 mb-3">
                                        This Recovery Breath Ladder is part of the <strong>Pranaclimb Methodology</strong> - a field-based system 
                                        integrating BR, RPE, and HRR₆₀ to track Critical Power and W'bal in rock climbing.
                                    </p>
                                    <div className="space-y-2 text-white/90 text-sm">
                                        <p><strong>Created by:</strong> Annie Anderson - Breathwork Specialist & Independent Researcher</p>
                                        <p><strong>Book:</strong> <em>Pranaclimb: Love, Breathe, Climb</em> (2025)</p>
                                        <p><strong>Email:</strong> annie@pranaclimb.com</p>
                                        <p><strong>Full Research:</strong> Available on SportRxiv and ResearchGate</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="grid lg:grid-cols-2 gap-8">
                            <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-8 border border-white/20">
                                <div className="flex flex-col items-center justify-center">
                                    <div className="relative w-full aspect-square max-w-md mb-8 flex items-center justify-center">
                                        <div
                                            className={`rounded-full transition-all duration-300 ease-in-out flex items-center justify-center ${
                                                phase === 'inhale' 
                                                    ? 'bg-gradient-to-br from-blue-400 via-blue-300 to-cyan-300' 
                                                    : phase === 'exhale'
                                                    ? 'bg-gradient-to-br from-purple-400 via-purple-300 to-pink-300'
                                                    : 'bg-gradient-to-br from-gray-400 to-gray-500'
                                            }`}
                                            style={{
                                                width: `${bubbleSize}%`,
                                                height: `${bubbleSize}%`,
                                                boxShadow: phase === 'inhale' 
                                                    ? `0 0 ${bubbleSize * 0.8}px rgba(59, 130, 246, 0.6)`
                                                    : phase === 'exhale'
                                                    ? `0 0 ${bubbleSize * 0.8}px rgba(168, 85, 247, 0.6)`
                                                    : '0 0 20px rgba(100, 100, 100, 0.3)'
                                            }}
                                        >
                                            <div className="text-center">
                                                <div className="text-white text-6xl font-bold mb-2 drop-shadow-2xl">
                                                    {phase === 'ready' ? current.inhale : Math.ceil(timeRemaining)}
                                                </div>
                                                <div className="text-white text-2xl font-semibold uppercase drop-shadow-lg">
                                                    {phase === 'ready' ? 'Ready' : phase}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white/20 rounded-2xl px-8 py-4 mb-6">
                                        <div className="text-center">
                                            <div className="text-white/60 text-sm mb-2">Current Ratio</div>
                                            <div className="text-5xl font-bold text-white">
                                                {current.inhale} : {current.exhale}
                                            </div>
                                            <div className="text-white/80 text-lg mt-2">Rung {current.rung}</div>
                                        </div>
                                    </div>

                                    <div className="flex gap-4 mb-6 flex-wrap justify-center">
                                        <button
                                            onClick={togglePlay}
                                            className={`${
                                                isPlaying ? 'bg-orange-500 hover:bg-orange-600' : 'bg-green-500 hover:bg-green-600'
                                            } text-white px-8 py-4 rounded-xl font-bold text-lg transition flex items-center gap-2 shadow-lg`}
                                        >
                                            {isPlaying ? <><Pause /> Pause</> : <><Play /> Start</>}
                                        </button>
                                        <button
                                            onClick={reset}
                                            className="bg-gray-600 hover:bg-gray-700 text-white px-8 py-4 rounded-xl font-bold text-lg transition flex items-center gap-2 shadow-lg"
                                        >
                                            <RotateCcw /> Reset
                                        </button>
                                    </div>

                                    <div className="bg-indigo-500/30 rounded-xl px-6 py-3 border border-indigo-500/50">
                                        <div className="text-white text-center">
                                            <span className="text-2xl font-bold">{cycleCount}</span>
                                            <span className="text-white/80 ml-2">breath cycles completed</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-4">
                                <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-6 border border-white/20 mb-6">
                                    <h2 className="text-2xl font-bold text-white mb-2">Select Your Rung</h2>
                                    <p className="text-white/80">Choose based on your recovery needs</p>
                                </div>

                                {ladder.map((step, index) => (
                                    <div
                                        key={step.rung}
                                        onClick={() => handleRungChange(index)}
                                        className={`bg-white/10 backdrop-blur-lg rounded-xl p-6 border-2 cursor-pointer transition-all ${
                                            currentRung === index
                                                ? 'border-cyan-400 bg-cyan-500/20 scale-105 shadow-xl'
                                                : 'border-white/20 hover:border-white/40 hover:bg-white/15'
                                        }`}
                                    >
                                        <div className="flex items-center justify-between mb-3 flex-wrap gap-3">
                                            <div className="flex items-center gap-4">
                                                <div className="bg-gradient-to-br from-cyan-400 to-blue-500 text-white w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl shadow-lg">
                                                    {step.rung}
                                                </div>
                                                <div>
                                                    <div className="text-3xl font-bold text-white">
                                                        {step.inhale}:{step.exhale}
                                                    </div>
                                                    <div className="text-white/60 text-sm">
                                                        Inhale {step.inhale}s • Exhale {step.exhale}s
                                                    </div>
                                                </div>
                                            </div>
                                            {currentRung === index && (
                                                <div className="bg-cyan-400 text-cyan-900 px-4 py-2 rounded-full font-bold text-sm">
                                                    ACTIVE
                                                </div>
                                            )}
                                        </div>

                                        <div className="space-y-2">
                                            <div className="text-white/90">
                                                <strong>{step.label}</strong>
                                            </div>
                                            <div className="text-cyan-300 italic text-sm">
                                                "{step.cue}"
                                            </div>
                                            <div className="text-white/70 text-sm">
                                                💡 {step.use}
                                            </div>
                                            <div className="grid grid-cols-2 gap-2 mt-3">
                                                <div className="bg-green-500/20 rounded px-3 py-2 border border-green-500/30">
                                                    <div className="text-green-300 text-xs font-semibold">W'bal Recovery</div>
                                                    <div className="text-white font-bold">{step.wbal}</div>
                                                </div>
                                                <div className="bg-blue-500/20 rounded px-3 py-2 border border-blue-500/30">
                                                    <div className="text-blue-300 text-xs font-semibold">Target BR</div>
                                                    <div className="text-white font-bold">{step.target}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-6 mt-8 border border-white/20">
                            <h3 className="text-xl font-bold text-white mb-4">🎯 Pranaclimb Coaching Guidelines</h3>
                            <div className="grid md:grid-cols-3 gap-4 text-white/90 mb-6">
                                <div className="bg-green-500/20 rounded-lg p-4 border border-green-500/30">
                                    <div className="text-2xl mb-2">✅</div>
                                    <div className="font-semibold mb-2">Do This</div>
                                    <ul className="text-sm space-y-1">
                                        <li>• Start with 2:4 or 3:6 (Rungs 1-2)</li>
                                        <li>• Use between attempts for W'bal recharge</li>
                                        <li>• Pair with HRR₆₀ tracking</li>
                                        <li>• Aim for BR ≤ 30 BPM</li>
                                    </ul>
                                </div>
                                <div className="bg-red-500/20 rounded-lg p-4 border border-red-500/30">
                                    <div className="text-2xl mb-2">❌</div>
                                    <div className="font-semibold mb-2">Avoid</div>
                                    <ul className="text-sm space-y-1">
                                        <li>• Forcing long inhales</li>
                                        <li>• Breath holding</li>
                                        <li>• Pushing into air hunger</li>
                                        <li>• Using during active climbing</li>
                                    </ul>
                                </div>
                                <div className="bg-blue-500/20 rounded-lg p-4 border border-blue-500/30">
                                    <div className="text-2xl mb-2">💡</div>
                                    <div className="font-semibold mb-2">Remember</div>
                                    <div className="text-sm">
                                        This is respiratory biofeedback for W'bal recharge. Stay below CP (45 BPM) to recover. 
                                        Extended exhale activates parasympathetic nervous system.
                                    </div>
                                </div>
                            </div>

                            <div className="bg-gradient-to-r from-purple-500/20 to-pink-500/20 rounded-xl p-6 border border-purple-500/30">
                                <h4 className="text-lg font-bold text-white mb-3">📈 Recovery Progression</h4>
                                <div className="space-y-3 text-white/90 text-sm">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-red-500 w-8 h-8 rounded-full flex items-center justify-center font-bold">1</div>
                                        <div><strong>Post-Crux:</strong> Start Rung 1 (2:4) immediately to drop BR from 55+ → 40 BPM</div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="bg-orange-500 w-8 h-8 rounded-full flex items-center justify-center font-bold">2</div>
                                        <div><strong>Active Recovery:</strong> Rung 2-3 (3:6 or 4:8) for shake-outs and between attempts</div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="bg-green-500 w-8 h-8 rounded-full flex items-center justify-center font-bold">3</div>
                                        <div><strong>Deep Recovery:</strong> Rung 4-5 (5:10 or 6:12) for complete W'bal recharge (~4 min)</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-gradient-to-r from-indigo-900 to-purple-900 rounded-2xl p-6 mt-6 border-2 border-indigo-500/50">
                            <div className="text-center">
                                <p className="text-white/60 text-sm mb-2">PART OF THE PRANACLIMB METHODOLOGY</p>
                                <p className="text-2xl font-bold text-white mb-2">"Control your breathing. Control your climbing."</p>
                                <p className="text-white/80 text-sm">
                                    By Annie Anderson • <em>Pranaclimb: Love, Breathe, Climb</em> (2025)
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<BreathLadder />, document.getElementById('root'));
    </script>
</body>
</html>
