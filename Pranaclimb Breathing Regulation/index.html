<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranaclimb Breathing Regulation Questionnaire</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Icons
        const Download = () => (
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
        );

        const RotateCcw = () => (
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        );

        const CheckCircle = () => (
            <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const AlertCircle = () => (
            <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const AlertTriangle = () => (
            <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        );

        function PranaclimbQuestionnaire() {
            const [responses, setResponses] = useState(Array(18).fill(null));
            const [showResults, setShowResults] = useState(false);

            const questions = [
                { id: 1, text: "I hold my breath during hard moves or clipping", category: "mechanical" },
                { id: 2, text: "I lose rhythm with my breathing when pumped", category: "mechanical" },
                { id: 3, text: "My breathing becomes shallow in stressful sections", category: "mechanical" },
                { id: 4, text: "I over-breathe or gasp when anxious/falling", category: "stress" },
                { id: 5, text: "I struggle to inhale deeply mid-route", category: "mechanical" },
                { id: 6, text: "I exhale sharply (grunt/scream) without control", category: "power" },
                { id: 7, text: "I feel tightness in chest/diaphragm while climbing", category: "mechanical" },
                { id: 8, text: "I breathe too fast early in the climb", category: "mechanical" },
                { id: 9, text: "I get dizzy/lightheaded on intense routes", category: "stress" },
                { id: 10, text: "I panic or lose composure when pumped", category: "stress" },
                { id: 11, text: "I struggle to calm my breathing at rests", category: "power" },
                { id: 12, text: "I can't return to nasal breathing after effort", category: "power" },
                { id: 13, text: "My fingers/toes tingle when overgripping or pumped", category: "stress" },
                { id: 14, text: "I feel disconnected from breathing when climbing", category: "stress" },
                { id: 15, text: "I find it hard to stay mentally calm on lead", category: "stress" },
                { id: 16, text: "My breathing feels loud, stressed or erratic", category: "mechanical" },
                { id: 17, text: "I hyperventilate after falling or on the redpoint go", category: "stress" },
                { id: 18, text: "I struggle to breathe with tension in core/abdomen", category: "power" }
            ];

            const handleResponse = (index, value) => {
                const newResponses = [...responses];
                newResponses[index] = value;
                setResponses(newResponses);
            };

            const calculateScores = () => {
                const totalScore = responses.reduce((sum, val) => sum + (val || 0), 0);
                
                const mechanical = [0, 1, 2, 4, 6, 7, 15].reduce((sum, idx) => sum + (responses[idx] || 0), 0);
                const stress = [3, 8, 9, 12, 13, 14, 16].reduce((sum, idx) => sum + (responses[idx] || 0), 0);
                const power = [5, 10, 11, 17].reduce((sum, idx) => sum + (responses[idx] || 0), 0);
                
                return { totalScore, mechanical, stress, power };
            };

            const getScoreLevel = (score) => {
                if (score <= 20) return { level: 'green', label: 'Functional & Efficient', Icon: CheckCircle, color: 'bg-green-500' };
                if (score <= 40) return { level: 'yellow', label: 'Improvable - Moderate Dysregulation', Icon: AlertTriangle, color: 'bg-yellow-500' };
                return { level: 'red', label: 'Significant Dysregulation', Icon: AlertCircle, color: 'bg-red-500' };
            };

            const getRecommendations = (scores) => {
                const recs = [];
                
                if (scores.mechanical > 14) {
                    recs.push({
                        title: "🫁 Mechanical Breathing Pattern",
                        description: "High score indicates skill-based breathing inefficiency",
                        actions: [
                            "Practice Silk Breath and Nasal Circuit daily",
                            "Focus on Breath Compass for posture stability",
                            "Work on eliminating breath-holds during moves"
                        ]
                    });
                }
                
                if (scores.stress > 12) {
                    recs.push({
                        title: "⚡ Stress & CO₂ Response",
                        description: "Elevated emotional and ventilatory threat response",
                        actions: [
                            "Use Tide Rhythm before cruxes to regulate CO₂",
                            "Practice HRR Reset breathing during rests",
                            "Work on mental calm strategies on lead"
                        ]
                    });
                }
                
                if (scores.power > 10) {
                    recs.push({
                        title: "🔥 Power & Expression Control",
                        description: "Redline breathing control needs improvement",
                        actions: [
                            "Learn Power Exhale for controlled expression",
                            "Practice Pufferfish Breath after hard efforts",
                            "Focus on Rowing Breath for recovery"
                        ]
                    });
                }
                
                return recs;
            };

            const allAnswered = responses.every(r => r !== null);
            const scores = calculateScores();
            const scoreLevel = getScoreLevel(scores.totalScore);
            const recommendations = getRecommendations(scores);

            const exportResults = () => {
                const data = {
                    date: new Date().toISOString(),
                    totalScore: scores.totalScore,
                    mechanical: scores.mechanical,
                    stress: scores.stress,
                    power: scores.power,
                    level: scoreLevel.label,
                    responses: questions.map((q, i) => ({
                        question: q.text,
                        response: responses[i]
                    }))
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pranaclimb_assessment_${Date.now()}.json`;
                a.click();
            };

            const reset = () => {
                setResponses(Array(18).fill(null));
                setShowResults(false);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 p-6">
                    <div className="max-w-5xl mx-auto">
                        <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-8 mb-8 border border-white/20">
                            <h1 className="text-4xl font-bold text-white mb-4">
                                🧗 Pranaclimb Breathing Regulation Questionnaire
                            </h1>
                            <p className="text-white/90 text-lg mb-4">
                                A climbing-specific breathing dysregulation screen
                            </p>
                            <div className="flex flex-wrap gap-3">
                                <span className="px-3 py-1 bg-blue-500/30 rounded-full text-sm text-white">🫁 Dysfunctional patterns</span>
                                <span className="px-3 py-1 bg-purple-500/30 rounded-full text-sm text-white">🧠 Fear responses</span>
                                <span className="px-3 py-1 bg-pink-500/30 rounded-full text-sm text-white">🪨 Movement-breath disconnect</span>
                                <span className="px-3 py-1 bg-red-500/30 rounded-full text-sm text-white">🎤 Expressive breathing cost</span>
                                <span className="px-3 py-1 bg-orange-500/30 rounded-full text-sm text-white">⚡ Threshold panic</span>
                            </div>
                        </div>

                        <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-6 mb-8 border border-white/20">
                            <h2 className="text-2xl font-bold text-white mb-4">📋 Instructions</h2>
                            <p className="text-white/90 text-lg mb-4">
                                Rate how often each occurs <strong>while climbing or preparing to climb</strong>
                            </p>
                            <div className="grid grid-cols-5 gap-4 text-center">
                                <div className="bg-green-500/20 rounded-lg p-3">
                                    <div className="text-2xl font-bold text-white">0</div>
                                    <div className="text-sm text-white/80">Never</div>
                                </div>
                                <div className="bg-blue-500/20 rounded-lg p-3">
                                    <div className="text-2xl font-bold text-white">1</div>
                                    <div className="text-sm text-white/80">Seldom</div>
                                </div>
                                <div className="bg-yellow-500/20 rounded-lg p-3">
                                    <div className="text-2xl font-bold text-white">2</div>
                                    <div className="text-sm text-white/80">Sometimes</div>
                                </div>
                                <div className="bg-orange-500/20 rounded-lg p-3">
                                    <div className="text-2xl font-bold text-white">3</div>
                                    <div className="text-sm text-white/80">Often</div>
                                </div>
                                <div className="bg-red-500/20 rounded-lg p-3">
                                    <div className="text-2xl font-bold text-white">4</div>
                                    <div className="text-sm text-white/80">Very Often</div>
                                </div>
                            </div>
                        </div>

                        <div className="space-y-4 mb-8">
                            {questions.map((q, index) => (
                                <div key={q.id} className="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/20">
                                    <div className="flex items-start gap-4 mb-4">
                                        <div className="bg-indigo-500 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0">
                                            {q.id}
                                        </div>
                                        <p className="text-white text-lg flex-1">{q.text}</p>
                                    </div>
                                    
                                    <div className="grid grid-cols-5 gap-3">
                                        {[0, 1, 2, 3, 4].map(value => (
                                            <button
                                                key={value}
                                                onClick={() => handleResponse(index, value)}
                                                className={`p-4 rounded-lg font-bold text-lg transition-all ${
                                                    responses[index] === value
                                                        ? 'bg-indigo-600 text-white scale-105 shadow-lg'
                                                        : 'bg-white/10 text-white/60 hover:bg-white/20'
                                                }`}
                                            >
                                                {value}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {allAnswered && !showResults && (
                            <div className="text-center mb-8">
                                <button
                                    onClick={() => setShowResults(true)}
                                    className="bg-gradient-to-r from-green-500 to-blue-500 text-white px-12 py-4 rounded-xl font-bold text-xl hover:scale-105 transition-transform shadow-2xl"
                                >
                                    Calculate Results
                                </button>
                            </div>
                        )}

                        {showResults && (
                            <div className="space-y-6">
                                <div className={`${scoreLevel.color} rounded-2xl p-8 text-white shadow-2xl`}>
                                    <div className="flex items-center justify-center gap-4 mb-4">
                                        <scoreLevel.Icon />
                                        <div className="text-center">
                                            <div className="text-6xl font-bold">{scores.totalScore}</div>
                                            <div className="text-xl opacity-90">/ 72</div>
                                        </div>
                                    </div>
                                    <div className="text-2xl font-bold text-center mb-2">{scoreLevel.label}</div>
                                    <div className="text-center opacity-90">
                                        {scoreLevel.level === 'green' && "Your breathing patterns are functional and efficient!"}
                                        {scoreLevel.level === 'yellow' && "Moderate dysregulation present - room for improvement"}
                                        {scoreLevel.level === 'red' && "Significant breathing dysregulation detected - coaching recommended"}
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-3 gap-6">
                                    <div className="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/20">
                                        <div className="text-center mb-4">
                                            <div className="text-4xl mb-2">🫁</div>
                                            <h3 className="text-xl font-bold text-white">Mechanical Pattern</h3>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-5xl font-bold text-white mb-2">{scores.mechanical}</div>
                                            <div className="text-white/60">/ 28</div>
                                            <div className={`mt-4 px-4 py-2 rounded-lg ${
                                                scores.mechanical > 14 ? 'bg-red-500/30' : 'bg-green-500/30'
                                            }`}>
                                                <div className="text-sm text-white">
                                                    {scores.mechanical > 14 ? '⚠️ Needs improvement' : '✅ Good control'}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/20">
                                        <div className="text-center mb-4">
                                            <div className="text-4xl mb-2">⚡</div>
                                            <h3 className="text-xl font-bold text-white">Stress Response</h3>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-5xl font-bold text-white mb-2">{scores.stress}</div>
                                            <div className="text-white/60">/ 28</div>
                                            <div className={`mt-4 px-4 py-2 rounded-lg ${
                                                scores.stress > 14 ? 'bg-red-500/30' : 'bg-green-500/30'
                                            }`}>
                                                <div className="text-sm text-white">
                                                    {scores.stress > 14 ? '⚠️ Elevated response' : '✅ Well regulated'}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/20">
                                        <div className="text-center mb-4">
                                            <div className="text-4xl mb-2">🔥</div>
                                            <h3 className="text-xl font-bold text-white">Power Control</h3>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-5xl font-bold text-white mb-2">{scores.power}</div>
                                            <div className="text-white/60">/ 16</div>
                                            <div className={`mt-4 px-4 py-2 rounded-lg ${
                                                scores.power > 8 ? 'bg-red-500/30' : 'bg-green-500/30'
                                            }`}>
                                                <div className="text-sm text-white">
                                                    {scores.power > 8 ? '⚠️ Needs work' : '✅ Good expression'}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {recommendations.length > 0 && (
                                    <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-8 border border-white/20">
                                        <h2 className="text-2xl font-bold text-white mb-6">💡 Personalized Recommendations</h2>
                                        <div className="space-y-6">
                                            {recommendations.map((rec, idx) => (
                                                <div key={idx} className="bg-white/5 rounded-xl p-6 border border-white/10">
                                                    <h3 className="text-xl font-bold text-white mb-3">{rec.title}</h3>
                                                    <p className="text-white/80 mb-4">{rec.description}</p>
                                                    <div className="space-y-2">
                                                        <p className="text-white font-semibold">Action Steps:</p>
                                                        <ul className="list-disc list-inside space-y-1">
                                                            {rec.actions.map((action, i) => (
                                                                <li key={i} className="text-white/90">{action}</li>
                                                            ))}
                                                        </ul>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="flex gap-4 justify-center flex-wrap">
                                    <button
                                        onClick={exportResults}
                                        className="flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition"
                                    >
                                        <Download />
                                        Export Results
                                    </button>
                                    <button
                                        onClick={reset}
                                        className="flex items-center gap-2 bg-gray-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-gray-700 transition"
                                    >
                                        <RotateCcw />
                                        Start Over
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<PranaclimbQuestionnaire />, document.getElementById('root'));
    </script>
</body>
</html>
