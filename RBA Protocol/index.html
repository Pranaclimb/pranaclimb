<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pranaclimb RBA">
    <title>Pranaclimb RBA Protocol</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
        }

        .breathing-animation {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.05); opacity: 0.35; }
        }

        .slide-up {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-ring {
            animation: pulseRing 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulseRing {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        .card-shadow {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .wbal-fill {
            transition: width 0.5s ease-out, background-color 0.3s;
        }

        @supports (padding: max(0px)) {
            body {
                padding-top: max(env(safe-area-inset-top), 0px);
                padding-bottom: max(env(safe-area-inset-bottom), 0px);
            }
        }
    </style>
</head>
<body class="gradient-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // W'bal-ODE tracking rules (Table III)
        const WBAL_RULES = {
            depletion: {
                efficient: -1.5, // -15% per 10s = -1.5% per second
                inefficient: -3.0, // -30% per 10s = -3.0% per second
                shortCrux: -20, // -15-30% for 5-15s crux (avg)
                sustainedCrux: -60 // -50-70% for ≥30s crux (avg)
            },
            recovery: {
                efficient: 2.0, // +20% per 10s = +2.0% per second
                inefficient: 1.0, // +10% per 10s = +1.0% per second
                microRest: 15, // +10-20% for 5-15s (avg)
                passive: 0.83, // +50% per min = +0.83% per second
                full: 100 // 80-100% after ~4 min
            },
            thresholds: {
                cp: 45, // CP ≈ 45 BPM / RPE 8
                rcp: 55, // RCP ≈ 55 BPM / RPE 9-10
                recovery: 35 // Below 35 BPM for recovery
            }
        };

        function PranaclimbRBA() {
            // RBA Protocol State
            const [phase, setPhase] = useState('setup'); // setup, baseline, ready, climbing, crux, recovery, results
            const [phaseTimer, setPhaseTimer] = useState(0);
            const [totalTime, setTotalTime] = useState(0);
            
            // Assessment Data
            const [climberName, setClimberName] = useState('');
            const [routeInfo, setRouteInfo] = useState('');
            const [baselineBR, setBaselineBR] = useState(0);
            const [baselineHR, setBaselineHR] = useState(null);
            const [mentalState, setMentalState] = useState('calm');
            
            // Live Metrics
            const [audioLevel, setAudioLevel] = useState(0);
            const [breathCount, setBreathCount] = useState(0);
            const [rawBR, setRawBR] = useState(0);
            const [effectiveBR, setEffectiveBR] = useState(0);
            const [rpe, setRpe] = useState(5);
            const [wbalLevel, setWbalLevel] = useState(100);
            const [cpDetected, setCpDetected] = useState(false);
            const [rcpDetected, setRcpDetected] = useState(false);
            
            // Crux Window Data
            const [cruxStartTime, setCruxStartTime] = useState(null);
            const [cruxRawBR, setCruxRawBR] = useState(0);
            const [cruxEffectiveBR, setCruxEffectiveBR] = useState(0);
            const [cruxExpressions, setCruxExpressions] = useState([]);
            const [cruxWbalDepletion, setCruxWbalDepletion] = useState(0);
            
            // Recovery Metrics
            const [dropoffHR, setDropoffHR] = useState(null);
            const [recovery60HR, setRecovery60HR] = useState(null);
            const [hrr60, setHrr60] = useState(null);
            const [brRecoveryTime, setBrRecoveryTime] = useState(null);
            
            // Expressions
            const [expressiveEvents, setExpressiveEvents] = useState([]);
            const [currentExpression, setCurrentExpression] = useState(null);
            const expressionBufferRef = useRef([]);
            
            // Audio/Motion
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const mediaStreamRef = useRef(null);
            const animationFrameRef = useRef(null);
            const breathTimestampsRef = useRef([]);
            const lastBreathTimeRef = useRef(0);
            const energyHistoryRef = useRef([]);
            
            // Results
            const [trafficLight, setTrafficLight] = useState(null); // green, yellow, red
            const [efficiency, setEfficiency] = useState('moderate');
            
            // Timers
            useEffect(() => {
                let interval;
                if (phase !== 'setup' && phase !== 'results') {
                    interval = setInterval(() => {
                        setPhaseTimer(prev => prev + 1);
                        setTotalTime(prev => prev + 1);
                        
                        // Update W'bal based on current state
                        if (phase === 'climbing' || phase === 'crux') {
                            updateWbal();
                        }
                        
                        // Auto-phase transitions
                        if (phase === 'baseline' && phaseTimer >= 180) {
                            setPhase('ready');
                        }
                        if (phase === 'climbing' && phaseTimer >= 240) {
                            handleClimbEnd();
                        }
                        if (phase === 'recovery' && phaseTimer >= 60) {
                            finishAssessment();
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [phase, phaseTimer, rawBR, effectiveBR, rpe]);
            
            // W'bal dynamics
            const updateWbal = () => {
                const cp = WBAL_RULES.thresholds.cp;
                const rcp = WBAL_RULES.thresholds.rcp;
                const recoveryThreshold = WBAL_RULES.thresholds.recovery;
                
                if (effectiveBR >= cp && rpe >= 8) {
                    // Above CP - depletion
                    const isEfficient = efficiency === 'efficient';
                    let depletionRate;
                    
                    if (effectiveBR >= rcp && rpe >= 9) {
                        // Severe domain - rapid depletion
                        depletionRate = isEfficient ? WBAL_RULES.depletion.efficient * 2 : WBAL_RULES.depletion.inefficient * 2;
                    } else {
                        // CP-RCP zone
                        depletionRate = isEfficient ? WBAL_RULES.depletion.efficient : WBAL_RULES.depletion.inefficient;
                    }
                    
                    setWbalLevel(prev => Math.max(0, prev + depletionRate));
                    
                    // Detect thresholds
                    if (!cpDetected && effectiveBR >= cp) setCpDetected(true);
                    if (!rcpDetected && effectiveBR >= rcp) setRcpDetected(true);
                    
                } else if (effectiveBR <= recoveryThreshold && rpe <= 6) {
                    // Below CP - recovery
                    const isEfficient = efficiency === 'efficient';
                    const recoveryRate = isEfficient ? WBAL_RULES.recovery.efficient : WBAL_RULES.recovery.inefficient;
                    
                    setWbalLevel(prev => Math.min(100, prev + recoveryRate));
                }
            };
            
            // Get W'bal color
            const getWbalColor = () => {
                if (wbalLevel > 60) return '#32CD32'; // Green
                if (wbalLevel > 30) return '#FFD700'; // Yellow
                return '#FF00FC'; // Pink/Red
            };
            
            // Start phases
            const startBaseline = () => {
                setPhase('baseline');
                setPhaseTimer(0);
            };
            
            const startClimbing = async () => {
                setPhase('climbing');
                setPhaseTimer(0);
                await startAudioRecording();
            };
            
            const markCruxStart = () => {
                if (phase === 'climbing') {
                    setPhase('crux');
                    setCruxStartTime(totalTime);
                    const cruxStartBreaths = breathCount;
                    const cruxStartWbal = wbalLevel;
                    
                    // After 60 seconds, capture crux data
                    setTimeout(() => {
                        const cruxBreaths = breathCount - cruxStartBreaths;
                        setCruxRawBR(cruxBreaths);
                        setCruxEffectiveBR(effectiveBR);
                        setCruxExpressions(expressiveEvents.slice(-10)); // Last 10 expressions
                        setCruxWbalDepletion(cruxStartWbal - wbalLevel);
                        setPhase('climbing');
                    }, 60000);
                }
            };
            
            const handleClimbEnd = () => {
                setPhase('recovery');
                setPhaseTimer(0);
                setDropoffHR(null); // Manual entry or from device
                
                // After 60s, calculate HRR60
                setTimeout(() => {
                    if (dropoffHR && recovery60HR) {
                        setHrr60(dropoffHR - recovery60HR);
                    }
                }, 60000);
            };
            
            const finishAssessment = () => {
                stopAudioRecording();
                calculateResults();
                setPhase('results');
            };
            
            // Results calculation
            const calculateResults = () => {
                // Traffic light logic
                let score = 0;
                
                // Good HRR60
                if (hrr60 >= 18) score += 2;
                else if (hrr60 >= 12) score += 1;
                
                // CP control
                if (cruxEffectiveBR >= 42 && cruxEffectiveBR <= 48) score += 2;
                else if (cruxEffectiveBR < 55) score += 1;
                
                // W'bal management
                if (wbalLevel > 30) score += 2;
                else if (wbalLevel > 10) score += 1;
                
                // Expression control
                const expressionDensity = cruxExpressions.length / 60;
                if (expressionDensity < 0.3) score += 1;
                
                // Traffic light
                if (score >= 6) setTrafficLight('green');
                else if (score >= 4) setTrafficLight('yellow');
                else setTrafficLight('red');
                
                // Efficiency determination
                const avgWbalDepletion = (100 - wbalLevel) / (phaseTimer / 10);
                if (avgWbalDepletion < 2) setEfficiency('efficient');
                else if (avgWbalDepletion < 3.5) setEfficiency('moderate');
                else setEfficiency('inefficient');
            };
            
            // Audio recording
            const startAudioRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: true,
                            sampleRate: 16000
                        }
                    });
                    mediaStreamRef.current = stream;
                    
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 16000
                    });
                    const source = audioContextRef.current.createMediaStreamSource(stream);
                    analyserRef.current = audioContextRef.current.createAnalyser();
                    analyserRef.current.fftSize = 4096;
                    analyserRef.current.smoothingTimeConstant = 0.1;
                    source.connect(analyserRef.current);
                    
                    analyzeAudio();
                } catch (err) {
                    console.error('Microphone error:', err);
                    alert('Please allow microphone access');
                }
            };
            
            const stopAudioRecording = () => {
                if (animationFrameRef.current) {
                    cancelAnimationFrame(animationFrameRef.current);
                }
                if (mediaStreamRef.current) {
                    mediaStreamRef.current.getTracks().forEach(track => track.stop());
                }
                if (audioContextRef.current) {
                    audioContextRef.current.close();
                }
            };
            
            // Breath detection (exhale-focused)
            const analyzeAudio = () => {
                if (!analyserRef.current) return;
                
                const bufferLength = analyserRef.current.frequencyBinCount;
                const freqData = new Uint8Array(bufferLength);
                
                analyserRef.current.getByteFrequencyData(freqData);
                
                // Breathing band energy
                const minBin = Math.floor((150 / 8000) * bufferLength);
                const maxBin = Math.floor((1500 / 8000) * bufferLength);
                
                let breathEnergy = 0;
                for (let i = minBin; i < maxBin; i++) {
                    breathEnergy += freqData[i];
                }
                breathEnergy = breathEnergy / (maxBin - minBin);
                
                setAudioLevel(breathEnergy);
                
                // Energy history for exhale detection
                energyHistoryRef.current.push(breathEnergy);
                if (energyHistoryRef.current.length > 20) {
                    energyHistoryRef.current.shift();
                }
                
                const now = Date.now();
                const timeSinceLastBreath = now - lastBreathTimeRef.current;
                
                // Exhale detection (falling edge)
                if (energyHistoryRef.current.length >= 15 && timeSinceLastBreath > 1000) {
                    const recent = energyHistoryRef.current.slice(-5);
                    const earlier = energyHistoryRef.current.slice(-15, -10);
                    const oldest = energyHistoryRef.current.slice(0, 5);
                    
                    const recentAvg = recent.reduce((a, b) => a + b, 0) / recent.length;
                    const earlierAvg = earlier.reduce((a, b) => a + b, 0) / earlier.length;
                    const oldestAvg = oldest.reduce((a, b) => a + b, 0) / oldest.length;
                    
                    const hadPeak = earlierAvg > oldestAvg + 5;
                    const nowFalling = recentAvg < earlierAvg - 3;
                    const aboveThreshold = earlierAvg > 15;
                    
                    if (hadPeak && nowFalling && aboveThreshold) {
                        breathTimestampsRef.current.push(now);
                        setBreathCount(prev => prev + 1);
                        lastBreathTimeRef.current = now;
                        
                        // Calculate BR
                        const oneMinuteAgo = now - 60000;
                        const recentBreaths = breathTimestampsRef.current.filter(t => t > oneMinuteAgo);
                        setRawBR(recentBreaths.length);
                        
                        // Effective BR (simplified - add expressions in real version)
                        setEffectiveBR(recentBreaths.length);
                    }
                }
                
                animationFrameRef.current = requestAnimationFrame(analyzeAudio);
            };
            
            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };
            
            const getPhaseInstruction = () => {
                switch(phase) {
                    case 'baseline':
                        return '🧘 Sit or stand relaxed. Breathe nasally. Stay calm for 3 minutes.';
                    case 'ready':
                        return '✅ Baseline complete! Ready to start your 4-minute climb.';
                    case 'climbing':
                        return '🧗 Climb at maximal sustainable effort. Mark your crux when it starts!';
                    case 'crux':
                        return '🔥 CRUX WINDOW ACTIVE - 60 seconds of detailed analysis!';
                    case 'recovery':
                        return '💚 Recovery mode. Let your breathing return to normal. 60 seconds.';
                    case 'results':
                        return '📊 Assessment Complete!';
                    default:
                        return '';
                }
            };
            
            return (
                <div className="min-h-screen pb-8">
                    {/* Background orbs */}
                    <div className="fixed inset-0 pointer-events-none overflow-hidden">
                        <div className="breathing-animation absolute top-20 right-20 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#87CEEB' }} />
                        <div className="breathing-animation absolute bottom-20 left-20 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#32CD32', animationDelay: '1.5s' }} />
                        <div className="breathing-animation absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#FF00FC', animationDelay: '3s' }} />
                    </div>

                    <div className="relative z-10 max-w-7xl mx-auto px-4 py-6">
                        {/* Header */}
                        <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 mb-6 card-shadow slide-up border-2"
                             style={{ borderColor: phase === 'crux' ? '#FF00FC' : '#32CD32' }}>
                            <div className="flex items-center justify-between mb-4">
                                <div>
                                    <h1 className="text-4xl font-bold mb-2" style={{ color: '#FF00FC' }}>
                                        Pranaclimb RBA
                                    </h1>
                                    <p className="text-gray-600 font-medium">Remote Breathing Assessment Protocol</p>
                                </div>
                                <div className="text-right">
                                    <div className="mono text-5xl font-bold" style={{ color: '#32CD32' }}>
                                        {formatTime(totalTime)}
                                    </div>
                                    <div className="text-gray-500 text-sm font-semibold">TOTAL TIME</div>
                                </div>
                            </div>
                            
                            {/* Phase indicator */}
                            {phase !== 'setup' && (
                                <div className="p-4 rounded-2xl bg-gradient-to-r from-blue-50 to-pink-50 border-2"
                                     style={{ borderColor: phase === 'crux' ? '#FF00FC' : '#32CD32' }}>
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="font-bold text-gray-900 text-lg">
                                            {phase === 'baseline' && '🧘 Phase 1: Baseline'}
                                            {phase === 'ready' && '✅ Phase 2: Ready'}
                                            {phase === 'climbing' && '🧗 Phase 3: Climbing (4 min)'}
                                            {phase === 'crux' && '🔥 CRUX WINDOW (60s)'}
                                            {phase === 'recovery' && '💚 Phase 4: Recovery (HRR₆₀)'}
                                            {phase === 'results' && '📊 Results'}
                                        </span>
                                        <span className="mono text-2xl font-bold" style={{ color: '#FF00FC' }}>
                                            {formatTime(phaseTimer)}
                                        </span>
                                    </div>
                                    <p className="text-sm text-gray-700">
                                        {getPhaseInstruction()}
                                    </p>
                                </div>
                            )}
                        </div>

                        {/* Setup Phase */}
                        {phase === 'setup' && (
                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-8 card-shadow slide-up">
                                <h2 className="text-3xl font-bold mb-6" style={{ color: '#32CD32' }}>
                                    📋 Pre-Assessment Setup
                                </h2>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">
                                            Climber Name
                                        </label>
                                        <input
                                            type="text"
                                            value={climberName}
                                            onChange={(e) => setClimberName(e.target.value)}
                                            className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-pink-500 outline-none"
                                            placeholder="Your name"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">
                                            Route / Sector Info
                                        </label>
                                        <input
                                            type="text"
                                            value={routeInfo}
                                            onChange={(e) => setRouteInfo(e.target.value)}
                                            className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-pink-500 outline-none"
                                            placeholder="Route name, grade, style"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">
                                            Mental/Emotional State
                                        </label>
                                        <div className="grid grid-cols-3 gap-3">
                                            {['calm', 'stressed', 'excited'].map(state => (
                                                <button
                                                    key={state}
                                                    onClick={() => setMentalState(state)}
                                                    className={`px-4 py-3 rounded-xl font-semibold transition ${
                                                        mentalState === state
                                                            ? 'text-white'
                                                            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                    }`}
                                                    style={mentalState === state ? {
                                                        backgroundColor: state === 'calm' ? '#32CD32' : state === 'stressed' ? '#FF00FC' : '#87CEEB'
                                                    } : {}}
                                                >
                                                    {state === 'calm' && '😌 Calm'}
                                                    {state === 'stressed' && '😰 Stressed'}
                                                    {state === 'excited' && '😄 Excited'}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">
                                            Efficiency Level (best guess)
                                        </label>
                                        <div className="grid grid-cols-3 gap-3">
                                            {['efficient', 'moderate', 'inefficient'].map(eff => (
                                                <button
                                                    key={eff}
                                                    onClick={() => setEfficiency(eff)}
                                                    className={`px-4 py-3 rounded-xl font-semibold transition ${
                                                        efficiency === eff
                                                            ? 'text-white'
                                                            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                    }`}
                                                    style={efficiency === eff ? {
                                                        backgroundColor: eff === 'efficient' ? '#32CD32' : eff === 'moderate' ? '#FFD700' : '#FF00FC'
                                                    } : {}}
                                                >
                                                    {eff.charAt(0).toUpperCase() + eff.slice(1)}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <button
                                        onClick={startBaseline}
                                        disabled={!climberName}
                                        className="w-full text-white px-8 py-6 rounded-2xl font-bold text-xl transition transform active:scale-95 shadow-lg disabled:opacity-50"
                                        style={{ backgroundColor: '#32CD32' }}
                                    >
                                        Begin RBA Protocol →
                                    </button>
                                </div>
                                
                                <div className="mt-8 p-6 bg-gradient-to-r from-blue-50 to-pink-50 rounded-2xl border-2 border-gray-200">
                                    <h3 className="font-bold text-gray-900 mb-3">📖 Protocol Overview:</h3>
                                    <ol className="space-y-2 text-sm text-gray-700">
                                        <li><strong>1. Baseline (3 min):</strong> Relaxed breathing, establish resting BR</li>
                                        <li><strong>2. Climb (4 min):</strong> Maximal sustainable effort, RPE 8-10</li>
                                        <li><strong>3. Crux Window (60s):</strong> Mark your hardest sustained sequence</li>
                                        <li><strong>4. Recovery (60s+):</strong> HRR₆₀ and BR recovery tracking</li>
                                        <li><strong>5. Results:</strong> Traffic light output + coaching cues</li>
                                    </ol>
                                </div>
                            </div>
                        )}

                        {/* Live Metrics during protocol */}
                        {(phase === 'climbing' || phase === 'crux' || phase === 'recovery') && (
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
                                {/* Raw BR */}
                                <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-2 border-gray-100">
                                    <div className="text-xs font-bold text-gray-500 uppercase mb-2">Raw BR</div>
                                    <div className="mono text-5xl font-bold" style={{ color: '#87CEEB' }}>
                                        {rawBR}
                                    </div>
                                    <div className="text-sm text-gray-600 mt-2">Breaths/Min</div>
                                </div>

                                {/* Effective BR */}
                                <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-4"
                                     style={{ borderColor: effectiveBR >= 55 ? '#FF00FC' : effectiveBR >= 45 ? '#FFD700' : '#32CD32' }}>
                                    <div className="text-xs font-bold text-gray-500 uppercase mb-2">Effective BR</div>
                                    <div className="mono text-5xl font-bold" style={{ 
                                        color: effectiveBR >= 55 ? '#FF00FC' : effectiveBR >= 45 ? '#FFD700' : '#32CD32' 
                                    }}>
                                        {effectiveBR}
                                    </div>
                                    <div className="text-sm font-semibold mt-2" style={{ 
                                        color: effectiveBR >= 55 ? '#FF00FC' : effectiveBR >= 45 ? '#FFD700' : '#32CD32' 
                                    }}>
                                        {effectiveBR >= 55 ? '🔴 RCP Zone' : effectiveBR >= 45 ? '🟡 CP Zone' : '🟢 Below CP'}
                                    </div>
                                </div>

                                {/* W'bal Gauge */}
                                <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-2 border-gray-100">
                                    <div className="text-xs font-bold text-gray-500 uppercase mb-2">W'bal Level</div>
                                    <div className="relative h-24 bg-gray-200 rounded-2xl overflow-hidden mb-2">
                                        <div
                                            className="wbal-fill absolute bottom-0 left-0 right-0 transition-all duration-500"
                                            style={{ 
                                                height: `${wbalLevel}%`,
                                                backgroundColor: getWbalColor()
                                            }}
                                        />
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <span className="mono text-3xl font-bold text-gray-800">
                                                {Math.round(wbalLevel)}%
                                            </span>
                                        </div>
                                    </div>
                                    <div className="text-xs text-gray-600 text-center">
                                        {wbalLevel > 60 ? '✅ Good reserve' : wbalLevel > 30 ? '⚠️ Depleting' : '🔴 Critical'}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Action Buttons */}
                        {phase === 'ready' && (
                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-8 card-shadow text-center">
                                <button
                                    onClick={startClimbing}
                                    className="text-white px-12 py-8 rounded-2xl font-bold text-2xl transition transform hover:scale-105 active:scale-95 shadow-2xl"
                                    style={{ backgroundColor: '#32CD32' }}
                                >
                                    🧗 Start 4-Minute Climb
                                </button>
                            </div>
                        )}

                        {phase === 'climbing' && (
                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-8 card-shadow text-center">
                                <button
                                    onClick={markCruxStart}
                                    className="text-white px-12 py-8 rounded-2xl font-bold text-2xl transition transform hover:scale-105 active:scale-95 shadow-2xl pulse-ring"
                                    style={{ backgroundColor: '#FF00FC' }}
                                >
                                    🔥 Mark Crux Start
                                </button>
                                <p className="mt-4 text-gray-600">
                                    Press when you begin your hardest 60-second sequence
                                </p>
                            </div>
                        )}

                        {/* Results Screen */}
                        {phase === 'results' && (
                            <div className="space-y-6">
                                {/* Traffic Light Result */}
                                <div className={`bg-white/90 backdrop-blur-lg rounded-3xl p-8 card-shadow border-4 text-center ${
                                    trafficLight === 'green' ? 'border-green-500' :
                                    trafficLight === 'yellow' ? 'border-yellow-500' :
                                    'border-red-500'
                                }`}>
                                    <div className="text-8xl mb-4">
                                        {trafficLight === 'green' && '🟢'}
                                        {trafficLight === 'yellow' && '🟡'}
                                        {trafficLight === 'red' && '🔴'}
                                    </div>
                                    <h2 className="text-4xl font-bold mb-4" style={{ 
                                        color: trafficLight === 'green' ? '#32CD32' :
                                               trafficLight === 'yellow' ? '#FFD700' :
                                               '#FF00FC'
                                    }}>
                                        {trafficLight === 'green' && 'Green - Efficient & Ready'}
                                        {trafficLight === 'yellow' && 'Yellow - Borderline, Coachable'}
                                        {trafficLight === 'red' && 'Red - Limiter Flagged'}
                                    </h2>
                                    <p className="text-gray-700 text-lg">
                                        Assessment complete for {climberName}
                                    </p>
                                </div>

                                {/* Key Metrics */}
                                <div className="grid md:grid-cols-3 gap-6">
                                    <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow">
                                        <h3 className="font-bold text-gray-500 text-sm mb-2">CP Detection</h3>
                                        <div className="text-3xl font-bold mb-2" style={{ color: '#FFD700' }}>
                                            {cpDetected ? '✅ Detected' : '❌ Not Reached'}
                                        </div>
                                        <p className="text-sm text-gray-600">
                                            Crux Effective BR: {cruxEffectiveBR} BPM
                                        </p>
                                    </div>

                                    <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow">
                                        <h3 className="font-bold text-gray-500 text-sm mb-2">W'bal Depletion</h3>
                                        <div className="text-3xl font-bold mb-2" style={{ color: '#FF00FC' }}>
                                            {Math.round(cruxWbalDepletion)}%
                                        </div>
                                        <p className="text-sm text-gray-600">
                                            During 60s crux window
                                        </p>
                                    </div>

                                    <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow">
                                        <h3 className="font-bold text-gray-500 text-sm mb-2">HRR₆₀</h3>
                                        <div className="text-3xl font-bold mb-2" style={{ color: '#32CD32' }}>
                                            {hrr60 ? `${hrr60} BPM` : 'N/A'}
                                        </div>
                                        <p className="text-sm text-gray-600">
                                            {hrr60 >= 18 ? '✅ Excellent' : hrr60 >= 12 ? '⚠️ Moderate' : '🔴 Slow'}
                                        </p>
                                    </div>
                                </div>

                                {/* Coaching Recommendations */}
                                <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-8 card-shadow">
                                    <h3 className="text-2xl font-bold mb-4" style={{ color: '#32CD32' }}>
                                        🎯 Coaching Recommendations
                                    </h3>
                                    <div className="space-y-4">
                                        {efficiency === 'inefficient' && (
                                            <div className="p-4 bg-red-50 rounded-xl border-2 border-red-200">
                                                <p className="font-bold text-red-900 mb-2">⚠️ Inefficient W'bal Depletion Detected</p>
                                                <p className="text-sm text-red-800">
                                                    Focus on: Footwork precision, core bracing control, breath-movement synchronization
                                                </p>
                                            </div>
                                        )}
                                        
                                        {cruxEffectiveBR > 55 && (
                                            <div className="p-4 bg-pink-50 rounded-xl border-2 border-pink-200">
                                                <p className="font-bold text-pink-900 mb-2">🔥 RCP Zone Entered</p>
                                                <p className="text-sm text-pink-800">
                                                    Work on: Grey zone pacing, RP Sync timing, controlled rhythm at high intensity
                                                </p>
                                            </div>
                                        )}
                                        
                                        {hrr60 && hrr60 < 12 && (
                                            <div className="p-4 bg-yellow-50 rounded-xl border-2 border-yellow-200">
                                                <p className="font-bold text-yellow-900 mb-2">⚡ Slow Recovery</p>
                                                <p className="text-sm text-yellow-800">
                                                    Improve: Aerobic base, recovery breathing protocols, parasympathetic training
                                                </p>
                                            </div>
                                        )}

                                        {trafficLight === 'green' && (
                                            <div className="p-4 bg-green-50 rounded-xl border-2 border-green-200">
                                                <p className="font-bold text-green-900 mb-2">✅ Strong Respiratory Profile</p>
                                                <p className="text-sm text-green-800">
                                                    Continue: Current training protocols. Consider advancing to harder grades or longer routes.
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Reset Button */}
                                <button
                                    onClick={() => window.location.reload()}
                                    className="w-full bg-gray-600 hover:bg-gray-700 text-white px-8 py-6 rounded-2xl font-bold text-xl transition"
                                >
                                    🔄 New Assessment
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<PranaclimbRBA />, document.getElementById('root'));
    </script>
</body>
</html>
