<!DOCTYPE html>
<html lang="en">
<head>

    <title>Pranaclimb Professional Assessment System</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #87CEEB 0%, #FFFFFF 50%, #FFB6C1 100%);
            min-height: 100vh;
        }

        .mono {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
            font-variant-numeric: tabular-nums;
        }

        .breathing-circle {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.05); opacity: 0.35; }
        }

        .slide-up {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-shadow {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .pulse-circle {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }
        
        .animate-bounce {
            animation: bounce 0.5s ease-in-out 2;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .animate-pulse {
            animation: pulseSlow 2s ease-in-out infinite;
        }
        
        @keyframes pulseSlow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @supports (padding: max(0px)) {
            body {
                padding-top: max(env(safe-area-inset-top), 0px);
                padding-bottom: max(env(safe-area-inset-bottom), 0px);
            }
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.2s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            animation: scaleIn 0.3s ease-out;
        }
        
        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .big-button {
            font-size: 1.25rem;
            font-weight: 700;
            padding: 1.5rem 3rem;
            border-radius: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }
        
        .big-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
        }
        
        .big-button:active {
            transform: translateY(0);
        }
        
        #ppg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* NEW SIMPLIFIED UI STYLES */
        
        :root {
            --color-pink: #FF00FF;
            --color-blue: #89CFF0;
            --color-green: #AAFF00;
        }
        
        .white-bg {
            background: white !important;
            min-height: 100vh;
        }
        
        .hero-section {
            text-align: center;
            padding: 60px 20px 40px;
        }
        
        .hero-section-minimal {
            text-align: center;
            padding: 40px 20px 30px;
        }
        
        .hero-title-minimal {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-pink);
            margin-bottom: 0;
            line-height: 1.3;
        }
        
        .hero-title {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-pink), var(--color-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            line-height: 1.2;
        }
        
        .hero-title-solid {
            font-size: 48px;
            font-weight: 800;
            color: var(--color-pink);
            margin-bottom: 12px;
            line-height: 1.2;
        }
        
        .hero-subtitle {
            font-size: 18px;
            color: #4B5563;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .hero-description {
            font-size: 14px;
            color: #6B7280;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .start-climb-button {
            width: 100%;
            max-width: 400px;
            margin: 40px auto 30px;
            padding: 24px 32px;
            font-size: 24px;
            font-weight: 800;
            color: white;
            background: linear-gradient(135deg, var(--color-pink), var(--color-blue), var(--color-green));
            background-size: 200% 200%;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.3);
            transition: all 0.3s ease;
            animation: gradientShift 3s ease infinite;
            display: block;
        }
        
        .start-climb-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 0, 255, 0.4);
        }
        
        .start-climb-button:active {
            transform: translateY(0);
        }
        
        .start-climb-button-clean {
            width: 100%;
            max-width: 400px;
            margin: 30px auto 20px;
            padding: 20px 32px;
            font-size: 20px;
            font-weight: 700;
            color: var(--color-pink);
            background: white;
            border: 2px solid var(--color-pink);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: block;
        }
        
        .start-climb-button-clean:hover {
            background: var(--color-pink);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 0, 255, 0.2);
        }
        
        .start-climb-button-clean:active {
            transform: translateY(0);
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .secondary-actions {
            display: flex;
            gap: 12px;
            justify-center;
            margin: 15px auto;
            max-width: 400px;
        }
        
        .secondary-button {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #4B5563;
            background: white;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .secondary-button:hover {
            border-color: var(--color-pink);
            color: var(--color-pink);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="white-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function PranaclimbApp() {
            // Workflow state
            const [currentStep, setCurrentStep] = useState('welcome'); // 'welcome', 'recording', 'recovery', 'export'
            
            // Modal states
            const [showRPEModal, setShowRPEModal] = useState(false);
            const [showExpressionsModal, setShowExpressionsModal] = useState(false);
            const [showWbalModal, setShowWbalModal] = useState(false);
            const [showAssessmentModal, setShowAssessmentModal] = useState(false);
            const [showRBAIntro, setShowRBAIntro] = useState(false);
            const [showExtendedAssessment, setShowExtendedAssessment] = useState(false);
            const [showManualsModal, setShowManualsModal] = useState(false);
            const [activeManualTab, setActiveManualTab] = useState('rpe'); // 'rpe', 'wbal', 'expressions'
            const [showSettings, setShowSettings] = useState(false); // NEW: Settings panel
            const [showLearnMore, setShowLearnMore] = useState(false); // NEW: Learn More modal
            const [showIPhoneSettings, setShowIPhoneSettings] = useState(false); // NEW: iPhone Setup Guide
            
            // Audio settings
            const [showAudioSettings, setShowAudioSettings] = useState(false);
            const [availableMics, setAvailableMics] = useState([]);
            const [selectedMicId, setSelectedMicId] = useState(null);
            const [micLevel, setMicLevel] = useState(0);
            const [breathSensitivity, setBreathSensitivity] = useState('medium'); // 'low', 'medium', 'high'
            const [isTestingMic, setIsTestingMic] = useState(false);
            const [testBreathDetected, setTestBreathDetected] = useState(false);
            const testAudioContextRef = useRef(null);
            const testAnalyserRef = useRef(null);
            const testAnimationRef = useRef(null);
            const isTestingMicRef = useRef(false); // Track testing state for closures
            
            // Audio recording
            const [isRecording, setIsRecording] = useState(false);
            const isRecordingRef = useRef(false);
            const [audioRecording, setAudioRecording] = useState(null);
            const [audioPlaybackUrl, setAudioPlaybackUrl] = useState(null); // NEW: For audio playback
            const [breathHolds, setBreathHolds] = useState([]); // NEW: Track breath holds
            const [powerBreaths, setPowerBreaths] = useState([]); // NEW: Track power breaths
            const smoothedEnergyRef = useRef(0); // NEW: For EMA smoothing
            const energyWindowRef = useRef([]); // NEW: Rolling window for adaptive threshold
            
            // SCIENTIFIC UPGRADES - Chest-mounted optimization
            const baselineEnergyRef = useRef(15); // Adaptive baseline (starts at reasonable value)
            const noiseFloorRef = useRef(5); // MAD-based noise estimate (starts at reasonable value)
            const emaAlpha = 0.25; // EMA smoothing factor
            const adaptiveThresholdK = 3.0; // Multiplier for noise (chest-tuned)
            const [motionState, setMotionState] = useState('rest'); // 'rest', 'climb', 'crux'
            const [breathConfidence, setBreathConfidence] = useState('high'); // 'high', 'med', 'low'
            const lastSpikeTimeRef = useRef(0); // For spike rejection
            const [zoneMinutes, setZoneMinutes] = useState({ belowCP: 0, cpToRcp: 0, aboveRCP: 0 }); // Zone time tracking
            const zoneTimerRef = useRef(null);
            
            const [elapsedTime, setElapsedTime] = useState(0);
            
            // Breath detection
            const [breathCount, setBreathCount] = useState(0);
            const [rawBR, setRawBR] = useState(0);
            const [peakBR, setPeakBR] = useState(0);
            const [breathingNow, setBreathingNow] = useState(false);
            
            // RPE
            const [rpe, setRpe] = useState(5);
            
            // Assessment data
            const [climberName, setClimberName] = useState('');
            const [climberAge, setClimberAge] = useState('');
            const [assessmentDate, setAssessmentDate] = useState(new Date().toISOString().split('T')[0]);
            const [coachName, setCoachName] = useState('');
            const [climbingVolume, setClimbingVolume] = useState('');
            const [climbStyle, setClimbStyle] = useState('Sport');
            const [routeName, setRouteName] = useState('');
            const [environmentalConditions, setEnvironmentalConditions] = useState('');
            const [mentalState, setMentalState] = useState('');
            const [baselineBR, setBaselineBR] = useState('');
            const [baselineHR, setBaselineHR] = useState('');
            
            // Recovery assessment
            const [startingHR, setStartingHR] = useState('');
            const [endingHR, setEndingHR] = useState('');
            const [startingBR, setStartingBR] = useState(0);
            const [endingBR, setEndingBR] = useState(0);
            const [tiredness, setTiredness] = useState(5);
            const [readiness, setReadiness] = useState(5);
            const [recoveryTimer, setRecoveryTimer] = useState(60);
            const [isRecoveryRunning, setIsRecoveryRunning] = useState(false);
            
            // PPG Heart Rate
            const [ppgActive, setPpgActive] = useState(false);
            const [ppgHeartRate, setPpgHeartRate] = useState(null);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const ppgDataRef = useRef([]);
            const ppgIntervalRef = useRef(null);
            const lastPPGLogTime = useRef(0); // Track last signal quality log
            const ppgVideoWaitingLogged = useRef(false); // Track if we've logged waiting message
            
            // Voice recognition
            const [voiceEnabled, setVoiceEnabled] = useState(false);
            const [voiceSupported, setVoiceSupported] = useState(false);
            const [lastVoiceCommand, setLastVoiceCommand] = useState('');
            const recognitionRef = useRef(null);
            
            // Motion tracking
            const [motionEnabled, setMotionEnabled] = useState(false);
            const [motionPermission, setMotionPermission] = useState('prompt');
            const [movementIntensity, setMovementIntensity] = useState(0);
            const [climbingState, setClimbingState] = useState('rest');
            const motionDataRef = useRef([]);
            const movementHistoryRef = useRef([]);
            
            // Audio analysis
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);
            const breathTimestampsRef = useRef([]);
            const mfccDataRef = useRef([]);
            const lastBreathTimeRef = useRef(0);
            const energyHistoryRef = useRef([]);
            const animationFrameRef = useRef(null);
            
            // 60-second chime
            const [hasPlayed60SecondChime, setHasPlayed60SecondChime] = useState(false);
            
            // Audio Settings Functions
            const enumerateMicrophones = async () => {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const mics = devices.filter(device => device.kind === 'audioinput');
                    setAvailableMics(mics);
                    if (mics.length > 0 && !selectedMicId) {
                        setSelectedMicId(mics[0].deviceId);
                    }
                    console.log(`🎤 Found ${mics.length} microphones:`, mics.map(m => m.label));
                } catch (error) {
                    console.error('Error enumerating microphones:', error);
                }
            };
            
            const startMicTest = async () => {
                try {
                    const constraints = {
                        audio: {
                            deviceId: selectedMicId ? { exact: selectedMicId } : undefined
                            // Browser defaults: echoCancellation, noiseSuppression, autoGainControl all enabled
                        }
                    };
                    
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    testAudioContextRef.current = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    const source = testAudioContextRef.current.createMediaStreamSource(stream);
                    testAnalyserRef.current = testAudioContextRef.current.createAnalyser();
                    testAnalyserRef.current.fftSize = 4096;
                    testAnalyserRef.current.smoothingTimeConstant = 0.1;
                    source.connect(testAnalyserRef.current);
                    
                    setIsTestingMic(true);
                    isTestingMicRef.current = true; // Set ref for closure access
                    analyzeMicLevel();
                    
                    console.log('✅ Mic test started');
                } catch (error) {
                    console.error('❌ Mic test error:', error);
                    alert('Could not access microphone. Please check permissions.');
                }
            };
            
            const stopMicTest = () => {
                if (testAnimationRef.current) {
                    cancelAnimationFrame(testAnimationRef.current);
                }
                if (testAudioContextRef.current) {
                    testAudioContextRef.current.close();
                }
                setIsTestingMic(false);
                isTestingMicRef.current = false; // Clear ref
                setMicLevel(0);
                setTestBreathDetected(false);
            };
            
            const analyzeMicLevel = () => {
                if (!testAnalyserRef.current) {
                    console.log('❌ analyzeMicLevel: testAnalyserRef is null');
                    return;
                }
                if (!isTestingMicRef.current) {
                    console.log('❌ analyzeMicLevel: isTestingMicRef is false');
                    return;
                }
                
                const bufferLength = testAnalyserRef.current.frequencyBinCount;
                const freqData = new Uint8Array(bufferLength);
                const timeData = new Uint8Array(bufferLength);
                
                testAnalyserRef.current.getByteFrequencyData(freqData);
                testAnalyserRef.current.getByteTimeDomainData(timeData);
                
                const sampleRate = 16000;
                const minBin = Math.floor((150 / (sampleRate / 2)) * bufferLength);
                const maxBin = Math.floor((1500 / (sampleRate / 2)) * bufferLength);
                
                // Calculate energy in breathing band
                let breathEnergy = 0;
                for (let i = minBin; i < maxBin; i++) {
                    breathEnergy += freqData[i];
                }
                breathEnergy = breathEnergy / (maxBin - minBin);
                
                // Calculate RMS from time domain
                let rms = 0;
                for (let i = 0; i < timeData.length; i++) {
                    const normalized = (timeData[i] - 128) / 128;
                    rms += normalized * normalized;
                }
                rms = Math.sqrt(rms / timeData.length) * 100;
                
                const combinedEnergy = Math.max(breathEnergy, rms);
                const levelPercent = Math.min(100, (combinedEnergy / 50) * 100);
                setMicLevel(levelPercent);
                
                console.log(`🎤 Mic Level: ${levelPercent.toFixed(0)}% (Energy: ${combinedEnergy.toFixed(1)})`);
                
                // Get sensitivity threshold
                const thresholds = {
                    low: 25,
                    medium: 15,
                    high: 10
                };
                const threshold = thresholds[breathSensitivity];
                
                // Detect breath
                if (combinedEnergy > threshold) {
                    setTestBreathDetected(true);
                    console.log(`🫁 TEST Breath detected! Energy: ${combinedEnergy.toFixed(1)}, Threshold: ${threshold}`);
                    setTimeout(() => setTestBreathDetected(false), 1000);
                }
                
                if (isTestingMicRef.current) {
                    testAnimationRef.current = requestAnimationFrame(analyzeMicLevel);
                }
            };
            
            // Open audio settings and enumerate mics
            useEffect(() => {
                if (showAudioSettings) {
                    enumerateMicrophones();
                }
            }, [showAudioSettings]);
            
            // Cleanup mic test on unmount
            useEffect(() => {
                return () => {
                    stopMicTest();
                };
            }, []);
            
            // Singing bowl sound
            const playSingingBowl = () => {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioContext.currentTime;
                
                const fundamentalFreq = 432;
                const harmonics = [1, 2.4, 3.2, 4.1, 5.3];
                
                harmonics.forEach((ratio, index) => {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(fundamentalFreq * ratio, now);
                    
                    const decayTime = 3 + (index * 0.5);
                    gainNode.gain.setValueAtTime(0.2 / (index + 1), now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + decayTime);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.start(now);
                    oscillator.stop(now + decayTime);
                });
            };
            
            // PPG Heart Rate Detection
            const startPPG = async () => {
                try {
                    console.log('🎥 Requesting camera access for PPG...');
                    
                    // Mobile-friendly camera constraints
                    // Try rear camera first (environment), fall back to any camera
                    let stream;
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { 
                                facingMode: { ideal: 'environment' },
                                width: { ideal: 320 },
                                height: { ideal: 240 }
                            }
                        });
                        console.log('✅ Got rear camera (environment mode)');
                    } catch (err) {
                        console.log('⚠️ Rear camera not available, trying any camera...');
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { 
                                width: { ideal: 320 },
                                height: { ideal: 240 }
                            }
                        });
                        console.log('✅ Got camera (any available)');
                    }
                    
                    if (!videoRef.current) {
                        console.error('❌ videoRef.current is null!');
                        alert('Video element not ready. Please try again.');
                        return;
                    }
                    
                    videoRef.current.srcObject = stream;
                    console.log('✅ Stream assigned to video element');
                    
                    // Wait for video metadata to load before starting analysis
                    await new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => {
                            reject(new Error('Video load timeout'));
                        }, 5000); // 5 second timeout
                        
                        videoRef.current.onloadedmetadata = () => {
                            clearTimeout(timeout);
                            console.log('✅ PPG video metadata loaded');
                            resolve();
                        };
                    });
                    
                    await videoRef.current.play();
                    
                    console.log('✅ PPG camera started, video playing');
                    console.log(`📹 Video dimensions: ${videoRef.current.videoWidth}x${videoRef.current.videoHeight}`);
                    
                    if (videoRef.current.videoWidth === 0 || videoRef.current.videoHeight === 0) {
                        console.error('❌ Video dimensions are 0! Camera may not be ready.');
                        alert('Camera not ready. Please try again.');
                        return;
                    }
                    
                    // Enable flash/torch if available (works on some mobile devices)
                    const track = stream.getVideoTracks()[0];
                    const capabilities = track.getCapabilities();
                    console.log('📱 Camera capabilities:', capabilities);
                    
                    if (capabilities.torch) {
                        try {
                            await track.applyConstraints({ advanced: [{ torch: true }] });
                            console.log('✅ Torch enabled');
                        } catch (torchErr) {
                            console.log('⚠️ Torch enable failed:', torchErr.message);
                        }
                    } else {
                        console.log('⚠️ Torch not available on this device');
                    }
                    
                    setPpgActive(true);
                    ppgDataRef.current = [];
                    setPpgHeartRate(null);
                    ppgVideoWaitingLogged.current = false; // Reset waiting flag
                    lastPPGLogTime.current = 0; // Reset log timer
                    
                    // Start analyzing frames
                    ppgIntervalRef.current = setInterval(() => {
                        analyzePPGFrame();
                    }, 50); // 20 Hz sampling
                    
                    console.log('📊 PPG sampling started at 20 Hz (every 50ms)');
                    console.log('👆 Cover camera lens with finger now!');
                    
                } catch (error) {
                    console.error('❌ PPG camera error:', error);
                    let errorMessage = 'Camera access failed. ';
                    
                    if (error.name === 'NotAllowedError') {
                        errorMessage += 'Please allow camera permission when prompted.';
                    } else if (error.name === 'NotFoundError') {
                        errorMessage += 'No camera found on this device.';
                    } else if (error.name === 'NotReadableError') {
                        errorMessage += 'Camera is already in use by another application.';
                    } else if (error.name === 'AbortError') {
                        errorMessage += 'Camera access was aborted.';
                    } else if (error.message === 'Video load timeout') {
                        errorMessage += 'Video failed to load. Please try again.';
                    } else {
                        errorMessage += `Error: ${error.message}`;
                    }
                    
                    alert(errorMessage);
                }
            };
            
            const analyzePPGFrame = () => {
                if (!videoRef.current) {
                    console.log('❌ PPG: videoRef.current is null');
                    return;
                }
                
                if (!canvasRef.current) {

                // Sample center region (50x50 pixels)

                const centerY = canvas.height / 2;

                        Math.floor(centerX - sampleSize/2),

                    // Calculate average red channel intensity (blood absorbs green, reflects red)
                    let redSum = 0;

                            } else if (signalQuality === 'fair') {
                                console.log(`⚠️ Fair signal. ${goodSamples}/200 good samples - Press finger firmly`);
                            } else {

            const calculateHeartRateFromPPG = () => {
                if (ppgDataRef.current.length < 100) return 0;
                
                const data = ppgDataRef.current.map(d => d.value);
                
                // Apply moving average smoothing to reduce noise
                const smoothWindow = 5;
                const smoothedData = [];
                for (let i = 0; i < data.length; i++) {
                    const start = Math.max(0, i - Math.floor(smoothWindow/2));
                    const end = Math.min(data.length, i + Math.floor(smoothWindow/2) + 1);
                    const window = data.slice(start, end);
                    const avg = window.reduce((a, b) => a + b, 0) / window.length;
                    smoothedData.push(avg);
                }
                
                // Calculate dynamic threshold based on signal variation
                const mean = smoothedData.reduce((a, b) => a + b, 0) / smoothedData.length;
                const variance = smoothedData.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / smoothedData.length;
                const stdDev = Math.sqrt(variance);
                const threshold = stdDev * 0.6; // Adaptive threshold
                
                // Find peaks with improved detection
                const peaks = [];
                for (let i = 2; i < smoothedData.length - 2; i++) {
                    const current = smoothedData[i];
                    const before1 = smoothedData[i-1];
                    const before2 = smoothedData[i-2];
                    const after1 = smoothedData[i+1];
                    const after2 = smoothedData[i+2];
                    
                    // Peak must be higher than surrounding points
                    if (current > before1 && current > before2 && 
                        current > after1 && current > after2 &&
                        current > mean + threshold) {
                        peaks.push(i);
                    }
                }
                
                if (peaks.length < 3) {
                    console.log(`⚠️ Not enough peaks detected: ${peaks.length}`);
                    return 0;
                }
                
                // Calculate intervals between peaks (in samples)
                const intervals = [];
                for (let i = 1; i < peaks.length; i++) {
                    const interval = peaks[i] - peaks[i-1];
                    intervals.push(interval);
                }
                
                // Filter out unrealistic intervals
                // At 20Hz sampling: 40 BPM = 30 samples, 200 BPM = 6 samples
                const validIntervals = intervals.filter(interval => interval >= 6 && interval <= 30);
                
                if (validIntervals.length < 2) {
                    console.log(`⚠️ Not enough valid intervals: ${validIntervals.length}`);
                    return 0;
                }
                
                // Remove outliers using median absolute deviation
                validIntervals.sort((a, b) => a - b);
                const median = validIntervals[Math.floor(validIntervals.length / 2)];
                const deviations = validIntervals.map(val => Math.abs(val - median));
                deviations.sort((a, b) => a - b);
                const mad = deviations[Math.floor(deviations.length / 2)];
                
                // Keep intervals within 2 MAD of median
                const filteredIntervals = validIntervals.filter(val => Math.abs(val - median) <= 2 * mad);
                
                if (filteredIntervals.length < 2) {
                    console.log(`⚠️ Not enough filtered intervals: ${filteredIntervals.length}`);
                    return 0;
                }
                
                // Calculate average interval
                const avgInterval = filteredIntervals.reduce((a, b) => a + b, 0) / filteredIntervals.length;
                
                // Convert to BPM
                const samplingRate = 20; // Hz
                const beatsPerSecond = samplingRate / avgInterval;
                const bpm = beatsPerSecond * 60;
                
                console.log(`🔬 PPG Analysis: ${peaks.length} peaks, ${filteredIntervals.length} valid intervals, avg interval: ${avgInterval.toFixed(1)} samples`);
                
                return bpm;
            };

            // Start recording

                    console.log('✅ Recording started! Microphone active, analyzeAudio() starting...');
                    console.log('🔬 EXHALE-FOCUSED ALGORITHM: 150-500Hz (70% weight) + 500-900Hz (30% weight) | Adaptive threshold | EMA smoothing | Falling-edge detection');
                    console.log('📚 Based on: Abdulsadig 2024, Mimoz 2012, Lu 2021, Laborde 2017, Magnon 2021');

            // Analyze audio for breath detection - SCIENTIFICALLY UPGRADED
            const analyzeAudio = () => {
                if (!analyserRef.current) {
                    console.log('⚠️ analyzeAudio called but analyserRef.current is null');
                    return;
                }
                
                const bufferLength = analyserRef.current.frequencyBinCount;
                const freqData = new Uint8Array(bufferLength);
                const timeData = new Uint8Array(bufferLength);
                
                analyserRef.current.getByteFrequencyData(freqData);
                analyserRef.current.getByteTimeDomainData(timeData);
                
                const sampleRate = 16000;
                
                // OPTIMIZED FOR EXHALE DETECTION
                // Exhales have most energy in 150-500 Hz range (lower frequencies, longer duration)
                // Inhales are higher frequency (500-1000 Hz) but less consistent
                // We prioritize exhale detection for more reliable breath counting
                
                // Primary exhale band: 150-500 Hz (weighted 70%)
                const exhaleMinBin = Math.floor((150 / (sampleRate / 2)) * bufferLength);
                const exhaleMaxBin = Math.floor((500 / (sampleRate / 2)) * bufferLength);
                
                // Secondary inhale band: 500-900 Hz (weighted 30%)
                const inhaleMinBin = Math.floor((500 / (sampleRate / 2)) * bufferLength);
                const inhaleMaxBin = Math.floor((900 / (sampleRate / 2)) * bufferLength);
                
                // Calculate exhale energy (primary signal)
                let exhaleEnergy = 0;
                for (let i = exhaleMinBin; i < exhaleMaxBin; i++) {
                    exhaleEnergy += freqData[i];
                }
                exhaleEnergy = exhaleEnergy / (exhaleMaxBin - exhaleMinBin);
                
                // Calculate inhale energy (secondary signal)
                let inhaleEnergy = 0;
                for (let i = inhaleMinBin; i < inhaleMaxBin; i++) {
                    inhaleEnergy += freqData[i];
                }
                inhaleEnergy = inhaleEnergy / (inhaleMaxBin - inhaleMinBin);
                
                // Weighted combination: 70% exhale, 30% inhale
                const breathEnergy = (exhaleEnergy * 0.7) + (inhaleEnergy * 0.3);
                
                // Optional: Log exhale focus every 2 seconds for verification
                if (!window.lastExhaleLogTime) window.lastExhaleLogTime = 0;
                if (Date.now() - window.lastExhaleLogTime > 2000 && (exhaleEnergy > 15 || inhaleEnergy > 15)) {
                    console.log(`🫁 EXHALE-FOCUSED | Exhale (150-500Hz): ${exhaleEnergy.toFixed(1)} (70%) | Inhale (500-900Hz): ${inhaleEnergy.toFixed(1)} (30%) | Combined: ${breathEnergy.toFixed(1)}`);
                    window.lastExhaleLogTime = Date.now();
                }
                
                
                // UPGRADE 2: RMS SMOOTHING (200ms window)
                // Calculate RMS from time domain with smoothing
                let rms = 0;
                for (let i = 0; i < timeData.length; i++) {
                    const normalized = (timeData[i] - 128) / 128;
                    rms += normalized * normalized;
                }
                rms = Math.sqrt(rms / timeData.length) * 100;
                
                const rawEnergy = Math.max(breathEnergy, rms);
                
                // UPGRADE 3: EMA SMOOTHING (alpha = 0.25)
                // Smooths breath envelope, rejects fast spikes
                if (smoothedEnergyRef.current === 0) {
                    smoothedEnergyRef.current = rawEnergy;
                } else {
                    smoothedEnergyRef.current = emaAlpha * rawEnergy + (1 - emaAlpha) * smoothedEnergyRef.current;
                }
                const combinedEnergy = smoothedEnergyRef.current;
                
                // UPGRADE 4: ADAPTIVE THRESHOLD (median + k*MAD)
                // Based on: Clinical validation studies - robust to noise
                energyWindowRef.current.push(combinedEnergy);
                if (energyWindowRef.current.length > 160) { // 8-12 second rolling window at ~50Hz
                    energyWindowRef.current.shift();
                }
                
                // Calculate median and MAD (Median Absolute Deviation)
                if (energyWindowRef.current.length >= 80) {
                    const sorted = [...energyWindowRef.current].sort((a, b) => a - b);
                    const median = sorted[Math.floor(sorted.length / 2)];
                    baselineEnergyRef.current = median;
                    
                    // Calculate MAD
                    const deviations = energyWindowRef.current.map(e => Math.abs(e - median));
                    const sortedDev = deviations.sort((a, b) => a - b);
                    const mad = sortedDev[Math.floor(sortedDev.length / 2)];
                    noiseFloorRef.current = mad;
                }
                
                // SIMPLIFIED: Fixed threshold multiplier (motion-aware gating removed - was causing crashes)
                const thresholdMultiplier = 2.8; // Middle ground for all conditions
                const minTimeBetweenBreaths = 1000;
                const adaptiveThreshold = baselineEnergyRef.current + (thresholdMultiplier * noiseFloorRef.current);
                
                // Store energy history for pattern detection
                energyHistoryRef.current.push(combinedEnergy);
                if (energyHistoryRef.current.length > 20) {
                    energyHistoryRef.current.shift();
                }
                
                const now = Date.now();
                const timeSinceLastBreath = now - lastBreathTimeRef.current;
                
                // UPGRADE 6: IMPROVED BREATH HOLD DETECTION (>2.5s = short, >4s = long)
                // Based on: Tracheal sound literature - apnea detection
                if (timeSinceLastBreath > 2500 && breathTimestampsRef.current.length > 0) {
                    const lastHold = breathHolds[breathHolds.length - 1];
                    if (!lastHold || now - lastHold.endTime > 2000) {
                        const holdDuration = timeSinceLastBreath;
                        const holdType = holdDuration > 4000 ? 'long' : 'short';
                        setBreathHolds(prev => [...prev, {
                            startTime: lastBreathTimeRef.current,
                            endTime: now,
                            duration: holdDuration,
                            type: holdType
                        }]);
                        console.log(`🫁🚫 Breath hold (${holdType})! Duration: ${(holdDuration/1000).toFixed(1)}s`);
                    }
                }
                
                // UPGRADE 7: SPIKE KILLER - Reject very fast transients
                // Breathing envelopes are slow (>300ms), spikes are fast (<150ms)
                const timeSinceLastSpike = now - lastSpikeTimeRef.current;

                    const earlierAvg = earlier.reduce((a, b) => a + b, 0) / earlier.length;
                    const oldestAvg = oldest.reduce((a, b) => a + b, 0) / oldest.length;
                    
                    // Check for spike (too fast rise/fall)

                    const fallRate = (earlierAvg - recentAvg) / 5; // per frame
                    const isSpike = timeSinceLastSpike < 150 || (Math.abs(riseRate) > 3 && Math.abs(fallRate) > 3);
                    
                    if (isSpike) {

                    }
                    
                    // EXHALE DETECTION - Falling edge pattern with adaptive threshold
                    const hadPeak = earlierAvg > oldestAvg + 5;
                    const nowFalling = recentAvg < earlierAvg - 3;
                    const aboveAdaptiveThreshold = earlierAvg > Math.max(adaptiveThreshold, 12);

                    const prominence = earlierAvg - baselineEnergyRef.current;

                const data = {
                    metadata: {

                        exportDate: new Date().toISOString(),

                        name: climberName,

                        breathCount: breathCount,

                            smoothing: 'EMA (α=0.25) + RMS (200ms)',
                            motionGating: 'Rest/Climb/Crux states',
                            spikeRejection: 'enabled (<150ms)',
                            references: ['Abdulsadig 2024', 'Mimoz 2012', 'Lu 2021', 'Laborde 2017']
                        },
                        breathingExpressions: {
                            breathHolds: breathHolds.map(h => ({
                                duration: (h.duration / 1000).toFixed(1) + 's',
                                type: h.type || 'unknown',
                                timestamp: h.startTime

                            totalHolds: breathHolds.length,
                            totalHoldTime: (breathHolds.reduce((sum, h) => sum + h.duration, 0) / 1000).toFixed(1) + 's',
                            powerBreaths: powerBreaths.length,
                            expressionRate: ((breathHolds.length + powerBreaths.length) / breathCount * 100).toFixed(1) + '%'

                const belowPercent = (zoneMinutes.belowCP / totalSeconds) * 100;
                const rcpPercent = (zoneMinutes.aboveRCP / totalSeconds) * 100;

                if (rcpPercent > 50) {

                    return 'Grey-zone drift';
