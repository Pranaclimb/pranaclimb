<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR-10 RPE & BR Scale | Pranaclimb</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', system-ui, sans-serif;
            background: white;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.15;
            }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        .animate-slide-in {
            animation: slideIn 0.6s ease-out;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .rpe-row {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .rpe-row:hover {
            transform: translateX(8px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .zone-indicator {
            width: 4px;
            transition: width 0.3s ease;
        }

        .rpe-row:hover .zone-indicator {
            width: 8px;
        }

        .breathing-orb {
            animation: pulse 4s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function RPEScale() {
            const [hoveredRow, setHoveredRow] = useState(null);
            const [selectedZone, setSelectedZone] = useState(null);

            const zones = [
                {
                    rpe: 0,
                    zone: "Baseline",
                    effort: "Rest / Recovery",
                    breathing: "Nasal, calm, quiet, smooth, even",
                    rawBR: "<10",
                    effectiveBR: "—",
                    climbing: "Baseline / no exertion",
                    wbal: "Full recharge",
                    color: "#87CEEB",
                    intensity: "rest"
                },
                {
                    rpe: 1,
                    zone: "Recovery",
                    effort: "Very Easy",
                    breathing: "Gentle nasal breathing",
                    rawBR: "10–12",
                    effectiveBR: "No adjustment",
                    climbing: "Shaking out / rest stance",
                    wbal: "Recharging",
                    color: "#87CEEB",
                    intensity: "low"
                },
                {
                    rpe: 2,
                    zone: "Warm-up",
                    effort: "Easy",
                    breathing: "Conversational nasal or light oronasal",
                    rawBR: "12–15",
                    effectiveBR: "No adjustment",
                    climbing: "Easy terrain / warm-up routes",
                    wbal: "Minimal depletion",
                    color: "#87CEEB",
                    intensity: "low"
                },
                {
                    rpe: 3,
                    zone: "Aerobic",
                    effort: "Moderate",
                    breathing: "Slightly deeper nasal or light oronasal",
                    rawBR: "15–20",
                    effectiveBR: "No adjustment",
                    climbing: "Aerobic flow climbing",
                    wbal: "Preserved",
                    color: "#32CD32",
                    intensity: "moderate"
                },
                {
                    rpe: 4,
                    zone: "Aerobic+",
                    effort: "Somewhat Hard",
                    breathing: "Controlled oronasal, steady rhythm",
                    rawBR: "20–25",
                    effectiveBR: "No adjustment",
                    climbing: "Sustained movement",
                    wbal: "Preserved / recharging",
                    color: "#32CD32",
                    intensity: "moderate"
                },
                {
                    rpe: 5,
                    zone: "Heavy",
                    effort: "Hard",
                    breathing: "Pumpy oronasal; micro-exhales; occasional grunts",
                    rawBR: "25–30",
                    effectiveBR: "35–40 (+5–15)",
                    climbing: "Crux entry / positioning",
                    wbal: "Light depletion",
                    color: "#32CD32",
                    intensity: "hard"
                },
                {
                    rpe: 6,
                    zone: "Heavy+",
                    effort: "Hard+",
                    breathing: "Faster oronasal; tension rising; short BHs; early RP-timed exhales",
                    rawBR: "30–35",
                    effectiveBR: "40–45 (+5–15)",
                    climbing: "Pre-crux loading",
                    wbal: "Depleting",
                    color: "#FF00FC",
                    intensity: "hard"
                },
                {
                    rpe: 7,
                    zone: "High Heavy",
                    effort: "Very Hard",
                    breathing: "Mouth breathing; controlled rhythm; sparse grunts/screams",
                    rawBR: "35–40",
                    effectiveBR: "42–45",
                    climbing: "Highest heavy effort below CP",
                    wbal: "W′bal stable → falling",
                    color: "#FF00FC",
                    intensity: "very-hard"
                },
                {
                    rpe: 8,
                    zone: "Grey Zone — CP",
                    effort: "Extremely Hard",
                    breathing: "Strong oral breathing; RP Sync active; expressive control",
                    rawBR: "40–45",
                    effectiveBR: "CP ≈ 45 BPM / RPE 8",
                    climbing: "Critical Power (CP)",
                    wbal: "Gradual depletion",
                    color: "#FF00FC",
                    intensity: "extreme"
                },
                {
                    rpe: 9,
                    zone: "Grey Zone — RCP approach",
                    effort: "Near Maximal",
                    breathing: "Hyperventilation or rhythmic 1:1 breathing; screams / BHs",
                    rawBR: "45–55",
                    effectiveBR: "RCP > 55 BPM / RPE 9–10",
                    climbing: "Above CP, entering anaerobic dominance; approaching RCP",
                    wbal: "Rapid depletion · anaerobic contribution rising",
                    color: "#FF00FC",
                    intensity: "maximal"
                },
                {
                    rpe: 10,
                    zone: "Severe / RCP+",
                    effort: "Maximal",
                    breathing: "Breathless or chaotic 1:1; sustained BHs; uncontrolled expression",
                    rawBR: "≥60",
                    effectiveBR: "≥60 (ceiling)",
                    climbing: "RCP exceeded · terminal effort",
                    wbal: "Full W′bal exhaustion · maximal anaerobic expenditure",
                    color: "#FF00FC",
                    intensity: "maximal"
                }
            ];

            return (
                <div className="min-h-screen bg-white relative overflow-hidden">
                    {/* Animated background elements */}
                    <div className="absolute inset-0 pointer-events-none">
                        <div className="breathing-orb absolute top-20 right-20 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#87CEEB' }} />
                        <div className="breathing-orb absolute bottom-20 left-20 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#32CD32', animationDelay: '1s' }} />
                        <div className="breathing-orb absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#FF00FC', animationDelay: '2s' }} />
                    </div>

                    <div className="relative z-10 container mx-auto px-4 py-12 max-w-7xl">
                        {/* Header */}
                        <header className="text-center mb-12 animate-fade-in">
                            <div className="inline-block mb-4">
                                <span className="text-sm font-semibold tracking-widest uppercase" 
                                      style={{ color: '#FF00FC' }}>
                                    Table I
                                </span>
                            </div>
                            <h1 className="text-5xl md:text-6xl font-bold mb-4" 
                                style={{ fontFamily: 'Poppins', color: '#1f2937' }}>
                                CR-10 RPE & BR Scale
                            </h1>
                            <p className="text-lg text-gray-600 mb-2">
                                Pranaclimb Breathing Rate Interpretation
                            </p>
                            <p className="text-sm text-gray-500 italic">
                                RP Sync–Aligned · Expression-Adjusted · Rhythm-Sensitive
                            </p>
                            
                            {/* Color legend */}
                            <div className="flex justify-center gap-6 mt-8 flex-wrap">
                                <div className="flex items-center gap-2">
                                    <div className="w-4 h-4 rounded-full" style={{ backgroundColor: '#87CEEB' }} />
                                    <span className="text-sm text-gray-600">Low Intensity</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-4 h-4 rounded-full" style={{ backgroundColor: '#32CD32' }} />
                                    <span className="text-sm text-gray-600">Moderate Intensity</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-4 h-4 rounded-full" style={{ backgroundColor: '#FF00FC' }} />
                                    <span className="text-sm text-gray-600">High Intensity</span>
                                </div>
                            </div>
                        </header>

                        {/* RPE Scale Table */}
                        <div className="space-y-3 mb-12">
                            {zones.map((zone, index) => (
                                <div
                                    key={zone.rpe}
                                    className="rpe-row bg-white rounded-2xl border-2 overflow-hidden cursor-pointer"
                                    style={{
                                        borderColor: hoveredRow === zone.rpe ? zone.color : '#e5e7eb',
                                        animationDelay: `${index * 0.05}s`
                                    }}
                                    onMouseEnter={() => setHoveredRow(zone.rpe)}
                                    onMouseLeave={() => setHoveredRow(null)}
                                    onClick={() => setSelectedZone(selectedZone === zone.rpe ? null : zone.rpe)}
                                >
                                    <div className="flex">
                                        {/* Zone indicator bar */}
                                        <div 
                                            className="zone-indicator"
                                            style={{ backgroundColor: zone.color }}
                                        />
                                        
                                        <div className="flex-1 p-6">
                                            {/* Header Row */}
                                            <div className="flex items-center gap-6 mb-3">
                                                {/* RPE Number */}
                                                <div className="flex items-center justify-center w-16 h-16 rounded-xl font-bold text-2xl"
                                                     style={{ 
                                                         backgroundColor: `${zone.color}20`,
                                                         color: zone.color 
                                                     }}>
                                                    {zone.rpe}
                                                </div>
                                                
                                                {/* Zone & Effort */}
                                                <div className="flex-1">
                                                    <h3 className="text-xl font-bold text-gray-900 mb-1">
                                                        {zone.zone}
                                                    </h3>
                                                    <p className="text-sm font-semibold" style={{ color: zone.color }}>
                                                        {zone.effort}
                                                    </p>
                                                </div>
                                                
                                                {/* BR Display */}
                                                <div className="text-right">
                                                    <div className="text-xs text-gray-500 mb-1">Raw BR</div>
                                                    <div className="mono text-lg font-semibold text-gray-900">
                                                        {zone.rawBR}
                                                    </div>
                                                    <div className="text-xs text-gray-500">BPM</div>
                                                </div>
                                            </div>
                                            
                                            {/* Expandable Details */}
                                            <div className={`grid gap-4 transition-all duration-300 ${
                                                selectedZone === zone.rpe || hoveredRow === zone.rpe 
                                                    ? 'opacity-100 mt-4' 
                                                    : 'opacity-60'
                                            }`}>
                                                <div className="grid md:grid-cols-2 gap-4">
                                                    {/* Breathing Cues */}
                                                    <div className="bg-gray-50 rounded-lg p-4">
                                                        <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">
                                                            🫁 Breathing Cues
                                                        </h4>
                                                        <p className="text-sm text-gray-700 leading-relaxed">
                                                            {zone.breathing}
                                                        </p>
                                                    </div>
                                                    
                                                    {/* Effective BR */}
                                                    <div className="bg-gray-50 rounded-lg p-4">
                                                        <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">
                                                            📊 Effective BR
                                                        </h4>
                                                        <p className="text-sm text-gray-700 mono font-semibold">
                                                            {zone.effectiveBR}
                                                        </p>
                                                    </div>
                                                </div>
                                                
                                                <div className="grid md:grid-cols-2 gap-4">
                                                    {/* Climbing Interpretation */}
                                                    <div className="bg-gray-50 rounded-lg p-4">
                                                        <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">
                                                            🧗 Climbing Interpretation
                                                        </h4>
                                                        <p className="text-sm text-gray-700 leading-relaxed">
                                                            {zone.climbing}
                                                        </p>
                                                    </div>
                                                    
                                                    {/* W'bal Dynamics */}
                                                    <div className="bg-gray-50 rounded-lg p-4">
                                                        <h4 className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">
                                                            ⚡ W′bal Dynamics
                                                        </h4>
                                                        <p className="text-sm text-gray-700 leading-relaxed">
                                                            {zone.wbal}
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Notes Section */}
                        <div className="bg-gradient-to-br from-gray-50 to-white border-2 border-gray-200 rounded-2xl p-8 mb-8">
                            <h3 className="text-2xl font-bold mb-6 text-gray-900">
                                🔑 Key Notes
                            </h3>
                            
                            <div className="space-y-4 text-sm text-gray-700 leading-relaxed">
                                <div className="flex gap-3">
                                    <span className="font-bold" style={{ color: '#FF00FC' }}>*</span>
                                    <p>
                                        <strong>Effective BR = Raw BR + expression adjustments</strong>
                                    </p>
                                </div>
                                
                                <div className="bg-white rounded-lg p-4 border border-gray-200">
                                    <h4 className="font-semibold mb-3 text-gray-900">Table Notes:</h4>
                                    <ul className="space-y-2">
                                        <li>• <strong>Sport/Trad:</strong> +15 BPM adjustment cap per 60s</li>
                                        <li>• <strong>Bouldering:</strong> no cap</li>
                                        <li>• <strong>Raw BR ≥ 60 BPM:</strong> no correction applied (ceiling)</li>
                                    </ul>
                                </div>
                                
                                <div className="bg-white rounded-lg p-4 border border-gray-200">
                                    <h4 className="font-semibold mb-3 text-gray-900">1:1 Breathing (~60 BPM) Interpretation:</h4>
                                    <p className="mb-2">
                                        Appears in elite climbers (e.g. Anna Hazelnutt, Freja Shannon) and must be interpreted by 
                                        rhythm, not rate alone:
                                    </p>
                                    <ul className="space-y-2 ml-4">
                                        <li>→ Classify by Effective BR + rhythm</li>
                                        <li>→ W′bal depletes fast but predictably</li>
                                        <li className="mt-3" style={{ color: '#FF00FC' }}>
                                            <strong>Chaotic 1:1 breathing</strong> = panic / inefficiency
                                        </li>
                                        <li className="ml-4">→ higher energetic cost</li>
                                        <li className="ml-4">→ Apply scream-density override / inefficiency multiplier</li>
                                        <li className="ml-4">→ W′bal drains disproportionately</li>
                                    </ul>
                                </div>
                                
                                <div className="bg-gradient-to-r from-blue-50 to-pink-50 rounded-lg p-6 border-2 mt-6"
                                     style={{ borderColor: '#FF00FC' }}>
                                    <p className="text-center text-lg font-semibold text-gray-900">
                                        <span style={{ color: '#87CEEB' }}>Raw BR</span> shows what you see. 
                                        <span style={{ color: '#32CD32' }}> Effective BR</span> shows what it costs. 
                                        <span style={{ color: '#FF00FC' }}> Rhythm</span> shows how well it's controlled.
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Footer */}
                        <footer className="text-center text-sm text-gray-500">
                            <p className="mb-2">
                                Pranaclimb · RP Sync–Aligned · Expression-Adjusted · Rhythm-Sensitive
                            </p>
                            <div className="flex justify-center gap-2 items-center">
                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: '#87CEEB' }} />
                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: '#32CD32' }} />
                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: '#FF00FC' }} />
                            </div>
                        </footer>
                    </div>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RPEScale />);
    </script>
</body>
</html>
