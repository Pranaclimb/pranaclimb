<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pranaclimb">
    
    <!-- Custom Pranaclimb Logo as App Icon -->
    <!-- Place pranaclimb-icon.png in the same directory as this HTML file -->
    <link rel="icon" type="image/png" href="pranaclimb-icon.png">
    <link rel="apple-touch-icon" href="pranaclimb-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="pranaclimb-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="pranaclimb-icon.png">
    <link rel="apple-touch-icon" sizes="120x120" href="pranaclimb-icon.png">
    <meta name="theme-color" content="#FF00FC">
    
    <title>Pranaclimb Remote Breathing Assessment</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
        }

        .breathing-animation {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.05); opacity: 0.35; }
        }

        .slide-up {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-shadow {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .pulse-circle {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }
        
        .animate-bounce {
            animation: bounce 0.5s ease-in-out 2;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .animate-pulse {
            animation: pulseSlow 2s ease-in-out infinite;
        }
        
        @keyframes pulseSlow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @supports (padding: max(0px)) {
            body {
                padding-top: max(env(safe-area-inset-top), 0px);
                padding-bottom: max(env(safe-area-inset-bottom), 0px);
            }
        }
    </style>
</head>
<body class="gradient-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Expression adjustment table (for manual marking)
        const EXPRESSION_ADJUSTMENTS = {
            'breath_hold': { adjustments: [2, 4, 6, 8, 10], emoji: '🔇', label: 'Breath Hold' },
            'grunt': { adjustment: 3, emoji: '💪', label: 'Grunt' },
            'scream': { adjustment: 5, emoji: '😱', label: 'Scream' },
            'strong_nasal': { adjustment: 2, emoji: '👃', label: 'Strong Nasal' },
            'yes_woo': { adjustments: [1, 2], emoji: '🎉', label: 'YES/WOO' },
            'sigh': { adjustments: [0, -1], emoji: '😮‍💨', label: 'Sigh' },
            'rp_latent': { adjustment: 1, emoji: '🧠', label: 'RP Latent' }
        };

        function PranaclimbApp() {
            const [isRecording, setIsRecording] = useState(false);
            const [audioLevel, setAudioLevel] = useState(0);
            const [breathCount, setBreathCount] = useState(0);
            const [rawBR, setRawBR] = useState(0);
            const [rpe, setRpe] = useState(5);
            const [elapsedTime, setElapsedTime] = useState(0);
            const [breathingNow, setBreathingNow] = useState(false);
            const [peakBR, setPeakBR] = useState(0);
            
            // Manual expression marking
            const [showExpressionMarker, setShowExpressionMarker] = useState(false);
            const [manualExpressions, setManualExpressions] = useState([]);
            const [showExpressionTable, setShowExpressionTable] = useState(false);
            const [showRPEScale, setShowRPEScale] = useState(false);
            
            // Recovery tracking
            const [showRecoveryTimer, setShowRecoveryTimer] = useState(false);
            const [recoveryTimer, setRecoveryTimer] = useState(60);
            const [isRecoveryRunning, setIsRecoveryRunning] = useState(false);
            const [startingHR, setStartingHR] = useState('');
            const [endingHR, setEndingHR] = useState('');
            const [startingBR, setStartingBR] = useState(0);
            const [endingBR, setEndingBR] = useState(0);
            const [hrr60, setHrr60] = useState(0);
            const [tiredness, setTiredness] = useState(5);
            const [readiness, setReadiness] = useState(5);
            
            // Assessment worksheet fields
            const [showAssessment, setShowAssessment] = useState(false);
            const [climberName, setClimberName] = useState('');
            const [climberAge, setClimberAge] = useState('');
            const [sessionDate, setSessionDate] = useState(new Date().toISOString().split('T')[0]);
            const [climbingVolume, setClimbingVolume] = useState('');
            const [coachName, setCoachName] = useState('');
            const [environment, setEnvironment] = useState('');
            const [mentalState, setMentalState] = useState('');
            const [climbStyle, setClimbStyle] = useState('Sport');
            const [routeSector, setRouteSector] = useState('');
            const [baselineHR, setBaselineHR] = useState('');
            const [baselineBR, setBaselineBR] = useState(0);
            
            // Accelerometer tracking
            const [motionEnabled, setMotionEnabled] = useState(false);
            const [motionPermission, setMotionPermission] = useState('prompt'); // 'prompt', 'granted', 'denied', 'unsupported'
            const [movementIntensity, setMovementIntensity] = useState(0);
            const [climbingState, setClimbingState] = useState('rest'); // 'rest', 'climbing', 'crux'
            const motionDataRef = useRef([]);
            const movementHistoryRef = useRef([]);
            const lastMotionTimeRef = useRef(0);
            
            // Voice recognition
            const [voiceEnabled, setVoiceEnabled] = useState(false);
            const [voiceSupported, setVoiceSupported] = useState(false);
            const [lastVoiceCommand, setLastVoiceCommand] = useState('');
            const [voiceCommandTime, setVoiceCommandTime] = useState(0);
            const recognitionRef = useRef(null);
            
            // 60-second singing bowl chime
            const [hasPlayed60SecondChime, setHasPlayed60SecondChime] = useState(false);
            
            // Audio recording
            const [audioRecording, setAudioRecording] = useState(null);
            const [audioURL, setAudioURL] = useState(null);
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);
            
            // MFCC Timeline data
            const [mfccTimeline, setMfccTimeline] = useState([]);
            const mfccDataRef = useRef([]);
            const audioPlayerRef = useRef(null);
            
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const mediaStreamRef = useRef(null);
            const animationFrameRef = useRef(null);
            const breathTimestampsRef = useRef([]);
            const lastBreathTimeRef = useRef(0);
            const energyHistoryRef = useRef([]);

            // Timer
            useEffect(() => {
                let interval;
                if (isRecording) {
                    interval = setInterval(() => {
                        setElapsedTime(prev => prev + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isRecording]);
            
            // Recovery timer
            useEffect(() => {
                let interval;
                if (isRecoveryRunning && recoveryTimer > 0) {
                    interval = setInterval(() => {
                        setRecoveryTimer(prev => {
                            if (prev <= 1) {
                                setIsRecoveryRunning(false);
                                // Capture ending BR
                                setEndingBR(rawBR);
                                // Play singing bowl when recovery timer completes
                                playSingingBowl();
                                console.log('🔔 Recovery complete - singing bowl chime played');
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isRecoveryRunning, recoveryTimer, rawBR]);
            
            // Motion sensor initialization
            useEffect(() => {
                // Check if DeviceMotionEvent is available
                if (!window.DeviceMotionEvent) {
                    setMotionPermission('unsupported');
                    return;
                }
                
                // On iOS 13+, permission is required but can only be requested via user gesture
                // So we just check if the API exists and set to 'prompt' state
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    setMotionPermission('prompt'); // Need user to click button
                } else {
                    // Android or older iOS - permission not required
                    setMotionPermission('granted');
                }
            }, []);
            
            // Handle motion permission request (iOS)
            const requestMotionPermission = async () => {
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceMotionEvent.requestPermission();
                        if (permission === 'granted') {
                            setMotionPermission('granted');
                            setMotionEnabled(true);
                        } else {
                            setMotionPermission('denied');
                        }
                    } catch (error) {
                        console.error('Motion permission error:', error);
                        setMotionPermission('denied');
                    }
                } else {
                    // Already granted (Android/older iOS)
                    setMotionEnabled(true);
                }
            };
            
            // Motion event listener
            useEffect(() => {
                if (!motionEnabled || motionPermission !== 'granted') return;
                
                const handleMotion = (event) => {
                    const now = Date.now();
                    
                    // Get acceleration data (with gravity removed for better movement detection)
                    const accel = event.accelerationIncludingGravity || event.acceleration;
                    if (!accel) return;
                    
                    const x = accel.x || 0;
                    const y = accel.y || 0;
                    const z = accel.z || 0;
                    
                    // Get rotation data (gyroscope)
                    const rotation = event.rotationRate || { alpha: 0, beta: 0, gamma: 0 };
                    
                    // Calculate movement intensity (magnitude of acceleration + rotation)
                    const accelMagnitude = Math.sqrt(x*x + y*y + z*z);
                    const rotationMagnitude = Math.sqrt(
                        rotation.alpha**2 + rotation.beta**2 + rotation.gamma**2
                    );
                    
                    // Reduce rotation weight further - it's often noisy
                    const rawIntensity = accelMagnitude + (rotationMagnitude * 0.2);
                    
                    // Apply smoothing to reduce noise - average with previous reading
                    const smoothedIntensity = movementHistoryRef.current.length > 0
                        ? (rawIntensity + movementHistoryRef.current[movementHistoryRef.current.length - 1]) / 2
                        : rawIntensity;
                    
                    setMovementIntensity(smoothedIntensity);
                    
                    // Track movement history for state detection
                    movementHistoryRef.current.push(smoothedIntensity);
                    if (movementHistoryRef.current.length > 50) { // Keep 50 samples (~1 second at 50Hz)
                        movementHistoryRef.current.shift();
                    }
                    
                    // Detect climbing state - LESS SENSITIVE THRESHOLDS
                    if (movementHistoryRef.current.length >= 20) {
                        const recentAvg = movementHistoryRef.current.slice(-20).reduce((a, b) => a + b, 0) / 20;
                        const recentMax = Math.max(...movementHistoryRef.current.slice(-10));
                        
                        // State classification - HIGHER THRESHOLDS for real climbing movements
                        // Phone in pocket/hand = ~5-15 intensity
                        // Active climbing = 20-40 intensity  
                        // Crux/dynamic moves = 50+ intensity
                        if (recentMax > 50 && recentAvg > 25) {
                            setClimbingState('crux'); // Very high intensity sustained = crux moment
                        } else if (recentAvg > 18) {
                            setClimbingState('climbing'); // Moderate sustained movement = climbing
                        } else {
                            setClimbingState('rest'); // Low movement = rest
                        }
                    }
                    
                    // Store motion data (throttled to ~20Hz to save memory)
                    if (now - lastMotionTimeRef.current > 50 && isRecording) {
                        motionDataRef.current.push({
                            time: elapsedTime + (now % 1000) / 1000,
                            intensity: smoothedIntensity,
                            state: climbingState,
                            accel: { x, y, z },
                            rotation: { 
                                alpha: rotation.alpha, 
                                beta: rotation.beta, 
                                gamma: rotation.gamma 
                            }
                        });
                        lastMotionTimeRef.current = now;
                        
                        // Keep last 5 minutes
                        if (motionDataRef.current.length > 6000) { // 20Hz * 300s
                            motionDataRef.current.shift();
                        }
                    }
                };
                
                window.addEventListener('devicemotion', handleMotion);
                return () => window.removeEventListener('devicemotion', handleMotion);
            }, [motionEnabled, motionPermission, isRecording, elapsedTime, climbingState]);
            
            // Voice recognition setup
            useEffect(() => {
                // Check if Speech Recognition is supported
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    setVoiceSupported(true);
                    
                    const recognition = new SpeechRecognition();
                    recognition.continuous = true; // Keep listening
                    recognition.interimResults = false; // Only final results
                    recognition.lang = 'en-US';
                    
                    recognition.onresult = (event) => {
                        const last = event.results.length - 1;
                        const transcript = event.results[last][0].transcript.toLowerCase().trim();
                        const confidence = event.results[last][0].confidence;
                        
                        console.log('🎤 Voice heard:', transcript, `(${(confidence * 100).toFixed(0)}% confidence)`);
                        
                        // Word to number mapping
                        const wordToNumber = {
                            'zero': 0, 'one': 1, 'two': 2, 'three': 3, 'four': 4,
                            'five': 5, 'six': 6, 'seven': 7, 'eight': 8, 'nine': 9, 'ten': 10
                        };
                        
                        // Try to extract number (digits or words)
                        let rpeValue = null;
                        
                        // Pattern 1: Look for digit (e.g., "RPE 8", "rate 7", "8")
                        const digitMatch = transcript.match(/(?:rpe|rate|effort|exertion)?\s*(\d+)/i);
                        if (digitMatch) {
                            rpeValue = parseInt(digitMatch[1]);
                            console.log('✓ Matched digit pattern:', digitMatch[1]);
                        }
                        
                        // Pattern 2: Look for number word (e.g., "RPE eight", "rate seven", "eight")
                        if (rpeValue === null) {
                            const wordMatch = transcript.match(/(?:rpe|rate|effort|exertion)?\s*(zero|one|two|three|four|five|six|seven|eight|nine|ten)/i);
                            if (wordMatch) {
                                rpeValue = wordToNumber[wordMatch[1].toLowerCase()];
                                console.log('✓ Matched word pattern:', wordMatch[1], '→', rpeValue);
                            }
                        }
                        
                        // Pattern 3: Just the word alone (e.g., "eight", "seven")
                        if (rpeValue === null) {
                            const word = transcript.trim().toLowerCase();
                            if (wordToNumber.hasOwnProperty(word)) {
                                rpeValue = wordToNumber[word];
                                console.log('✓ Matched standalone word:', word, '→', rpeValue);
                            }
                        }
                        
                        // If we found a valid RPE value, update it
                        if (rpeValue !== null && rpeValue >= 0 && rpeValue <= 10) {
                            console.log('✅ Setting RPE to:', rpeValue);
                            setRpe(rpeValue);
                            setLastVoiceCommand(`RPE ${rpeValue}`);
                            setVoiceCommandTime(Date.now());
                            
                            // Clear command display after 3 seconds
                            setTimeout(() => {
                                setLastVoiceCommand('');
                            }, 3000);
                        } else {
                            console.log('❌ No valid RPE value found in:', transcript);
                        }
                    };
                    
                    recognition.onerror = (event) => {
                        console.error('Speech recognition error:', event.error);
                        if (event.error === 'no-speech') {
                            // Restart if stopped due to silence
                            if (voiceEnabled) {
                                recognition.start();
                            }
                        }
                    };
                    
                    recognition.onend = () => {
                        // Auto-restart if still enabled
                        if (voiceEnabled) {
                            try {
                                recognition.start();
                            } catch (e) {
                                console.log('Recognition already started');
                            }
                        }
                    };
                    
                    recognitionRef.current = recognition;
                } else {
                    setVoiceSupported(false);
                }
            }, []);
            
            // Voice recognition control
            useEffect(() => {
                if (!voiceSupported || !recognitionRef.current) return;
                
                if (voiceEnabled) {
                    try {
                        recognitionRef.current.start();
                        console.log('Voice recognition started');
                    } catch (e) {
                        console.log('Recognition already running');
                    }
                } else {
                    try {
                        recognitionRef.current.stop();
                        console.log('Voice recognition stopped');
                    } catch (e) {
                        console.log('Recognition already stopped');
                    }
                }
                
                return () => {
                    if (recognitionRef.current) {
                        try {
                            recognitionRef.current.stop();
                        } catch (e) {}
                    }
                };
            }, [voiceEnabled, voiceSupported]);
            
            // 60-second singing bowl chime
            useEffect(() => {
                if (isRecording && elapsedTime >= 60 && !hasPlayed60SecondChime) {
                    playSingingBowl();
                    setHasPlayed60SecondChime(true);
                    console.log('🔔 60-second singing bowl chime played');
                }
                
                // Reset chime flag when recording stops
                if (!isRecording && hasPlayed60SecondChime) {
                    setHasPlayed60SecondChime(false);
                }
            }, [isRecording, elapsedTime, hasPlayed60SecondChime]);

            // Breath detection with EVIDENCE-BASED improvements from respiratory analysis research
            const analyzeAudio = () => {
                if (!analyserRef.current) return;
                
                const bufferLength = analyserRef.current.frequencyBinCount;
                const freqData = new Uint8Array(bufferLength);
                const timeData = new Uint8Array(bufferLength);
                
                analyserRef.current.getByteFrequencyData(freqData);
                analyserRef.current.getByteTimeDomainData(timeData);
                
                const sampleRate = 16000;
                
                // PROVEN WORKING: 150-1500 Hz breathing band
                // This is the range that was detecting breaths reliably!
                const minBin = Math.floor((150 / (sampleRate / 2)) * bufferLength);
                const maxBin = Math.floor((1500 / (sampleRate / 2)) * bufferLength);
                
                // Calculate energy in breathing band
                let breathEnergy = 0;
                for (let i = minBin; i < maxBin; i++) {
                    breathEnergy += freqData[i];
                }
                breathEnergy = breathEnergy / (maxBin - minBin);
                
                // Calculate RMS from time domain
                let rms = 0;
                for (let i = 0; i < timeData.length; i++) {
                    const normalized = (timeData[i] - 128) / 128;
                    rms += normalized * normalized;
                }
                rms = Math.sqrt(rms / timeData.length) * 100;
                
                const combinedEnergy = Math.max(breathEnergy, rms);
                setAudioLevel(combinedEnergy);
                
                // Store MFCC-style energy data for timeline visualization (simplified)
                const mfccBands = [];
                const numBands = 13;
                const binRange = Math.floor((maxBin - minBin) / numBands);
                
                for (let band = 0; band < numBands; band++) {
                    const startBin = minBin + (band * binRange);
                    const endBin = Math.min(startBin + binRange, maxBin);
                    let bandEnergy = 0;
                    for (let i = startBin; i < endBin; i++) {
                        bandEnergy += freqData[i];
                    }
                    mfccBands.push(bandEnergy / binRange);
                }
                
                const spectralEnergy = mfccBands.reduce((a, b) => a + b, 0) / numBands;
                
                mfccDataRef.current.push({
                    time: elapsedTime + (Date.now() % 1000) / 1000,
                    energy: spectralEnergy,
                    bands: mfccBands
                });
                
                // Keep last 5 minutes
                if (mfccDataRef.current.length > 18000) {
                    mfccDataRef.current.shift();
                }
                
                energyHistoryRef.current.push(combinedEnergy);
                if (energyHistoryRef.current.length > 20) {
                    energyHistoryRef.current.shift();
                }
                
                const now = Date.now();
                const timeSinceLastBreath = now - lastBreathTimeRef.current;
                const minTimeBetweenBreaths = 1000;
                
                if (energyHistoryRef.current.length >= 15 && timeSinceLastBreath > minTimeBetweenBreaths) {
                    const recent = energyHistoryRef.current.slice(-5);
                    const earlier = energyHistoryRef.current.slice(-15, -10);
                    const oldest = energyHistoryRef.current.slice(0, 5);
                    
                    const recentAvg = recent.reduce((a, b) => a + b, 0) / recent.length;
                    const earlierAvg = earlier.reduce((a, b) => a + b, 0) / earlier.length;
                    const oldestAvg = oldest.reduce((a, b) => a + b, 0) / oldest.length;
                    
                    // EXHALE DETECTION - Falling edge pattern (PROVEN to work!)
                    const hadPeak = earlierAvg > oldestAvg + 5;        // Energy rose
                    const nowFalling = recentAvg < earlierAvg - 3;     // Energy falling
                    const aboveThreshold = earlierAvg > 15;            // Peak was significant
                    
                    const anySound = combinedEnergy > 12;
                    setBreathingNow(anySound);
                    
                    // COUNT RAW EXHALE - back to working detection!
                    // Removed overly strict exhale confirmation that was blocking everything
                    if (hadPeak && nowFalling && aboveThreshold) {
                        breathTimestampsRef.current.push(now);
                        setBreathCount(prev => prev + 1);
                        lastBreathTimeRef.current = now;
                        
                        const oneMinuteAgo = now - 60000;
                        const recentBreaths = breathTimestampsRef.current.filter(t => t > oneMinuteAgo);
                        const newRawBR = recentBreaths.length;
                        setRawBR(newRawBR);
                        
                        if (newRawBR > peakBR) {
                            setPeakBR(newRawBR);
                        }
                    }
                } else {
                    const anySound = combinedEnergy > 12;
                    setBreathingNow(anySound);
                }
                
                animationFrameRef.current = requestAnimationFrame(analyzeAudio);
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: true,
                            sampleRate: 16000
                        } 
                    });
                    mediaStreamRef.current = stream;
                    
                    // Audio analysis
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 16000
                    });
                    const source = audioContextRef.current.createMediaStreamSource(stream);
                    analyserRef.current = audioContextRef.current.createAnalyser();
                    analyserRef.current.fftSize = 4096;
                    analyserRef.current.smoothingTimeConstant = 0.1;
                    source.connect(analyserRef.current);
                    
                    // Audio recording for playback
                    mediaRecorderRef.current = new MediaRecorder(stream);
                    audioChunksRef.current = [];
                    
                    mediaRecorderRef.current.ondataavailable = (event) => {
                        audioChunksRef.current.push(event.data);
                    };
                    
                    mediaRecorderRef.current.onstop = () => {
                        const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        setAudioRecording(audioBlob);
                        setAudioURL(audioUrl);
                    };
                    
                    mediaRecorderRef.current.start();
                    setIsRecording(true);
                    setElapsedTime(0);
                    setBreathCount(0);
                    setRawBR(0);
                    setPeakBR(0);
                    breathTimestampsRef.current = [];
                    energyHistoryRef.current = [];
                    setManualExpressions([]);
                    mfccDataRef.current = [];
                    setMfccTimeline([]);
                    
                    analyzeAudio();
                    
                } catch (err) {
                    console.error('Error accessing microphone:', err);
                    alert('Please allow microphone access');
                }
            };

            const stopRecording = () => {
                setIsRecording(false);
                
                if (animationFrameRef.current) {
                    cancelAnimationFrame(animationFrameRef.current);
                }
                
                if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                    mediaRecorderRef.current.stop();
                }
                
                if (mediaStreamRef.current) {
                    mediaStreamRef.current.getTracks().forEach(track => track.stop());
                }
                
                if (audioContextRef.current) {
                    audioContextRef.current.close();
                }
                
                // Save MFCC timeline data
                setMfccTimeline([...mfccDataRef.current]);
                
                // Capture peak BR as baseline for recovery
                setStartingBR(rawBR);
                
                // Show expression marker after recording
                setTimeout(() => setShowExpressionMarker(true), 500);
            };
            
            const startRecoveryTimer = () => {
                if (!startingHR || startingHR === '') {
                    alert('Please enter your current heart rate first!');
                    return;

                    setHrr60(drop);
                    return drop;

                return { class: 'Fatigued', color: '#FF00FC', desc: 'Poor recovery, reset breathing & rest longer' };

            const playSingingBowl = () => {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioContext.currentTime;
                
                // Singing bowl has multiple harmonics - we'll layer 5 frequencies
                const fundamentalFreq = 432; // Hz - healing frequency
                const harmonics = [1, 2.4, 3.2, 4.1, 5.3]; // Harmonic ratios for metallic bowl sound
                
                harmonics.forEach((ratio, index) => {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(fundamentalFreq * ratio, now);
                    
                    // Each harmonic fades at different rate (creates shimmer effect)
                    const decayTime = 3 + (index * 0.5); // 3-5.5 seconds
                    gainNode.gain.setValueAtTime(0.2 / (index + 1), now); // Higher harmonics quieter
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + decayTime);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.start(now);
                    oscillator.stop(now + decayTime);
                });
            };
