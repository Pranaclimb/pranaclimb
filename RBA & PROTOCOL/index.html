<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pranaclimb Live">
    <title>Pranaclimb Live Monitor</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
        }

        .breathing-animation {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.05); opacity: 0.35; }
        }

        .slide-up {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-shadow {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .pulse-circle {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        @supports (padding: max(0px)) {
            body {
                padding-top: max(env(safe-area-inset-top), 0px);
                padding-bottom: max(env(safe-area-inset-bottom), 0px);
            }
        }
    </style>
</head>
<body class="gradient-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Expression adjustment table
        const EXPRESSION_ADJUSTMENTS = {
            'breath_hold': { min: 2, max: 10, emoji: '🔇', meaning: 'Bracing / pressure' },
            'grunt': { value: 3, emoji: '💪', meaning: 'Force transfer' },
            'scream': { value: 5, emoji: '😱', meaning: 'Max neural drive' },
            'strong_nasal': { value: 2, emoji: '👃', meaning: 'Diaphragm priming' },
            'yes_woo': { min: 1, max: 2, emoji: '🎉', meaning: 'Emotional release' },
            'sigh': { min: 0, max: -1, emoji: '😮‍💨', meaning: 'Parasympathetic reset' },
            'rp_latent': { value: 1, emoji: '🧠', meaning: 'Neural prep (no ventilation)' },
            'rp_sync': { value: 0, emoji: '⚡', meaning: 'Timing, not cost' }
        };

        function PranaclimbLiveMonitor() {
            const [isRecording, setIsRecording] = useState(false);
            const [audioLevel, setAudioLevel] = useState(0);
            const [breathCount, setBreathCount] = useState(0);
            const [rawBR, setRawBR] = useState(0);
            const [effectiveBR, setEffectiveBR] = useState(0);
            const [rpe, setRpe] = useState(5);
            const [motionData, setMotionData] = useState({ x: 0, y: 0, z: 0, magnitude: 0 });
            const [isMoving, setIsMoving] = useState(false);
            const [sessionData, setSessionData] = useState([]);
            const [elapsedTime, setElapsedTime] = useState(0);
            const [restDetected, setRestDetected] = useState(false);
            const [expressiveEvents, setExpressiveEvents] = useState([]);
            const [currentExpression, setCurrentExpression] = useState(null);
            const [brZone, setBrZone] = useState('baseline');
            const [peakBR, setPeakBR] = useState(0);
            const [showExpressionTable, setShowExpressionTable] = useState(false);
            const [showRPEScale, setShowRPEScale] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [breathingNow, setBreathingNow] = useState(false);
            
            // RBA Protocol Mode
            const [rbaMode, setRbaMode] = useState(false);
            const [rbaPhase, setRbaPhase] = useState('idle'); // idle, baseline, climbing, crux, recovery, results
            const [rbaTimer, setRbaTimer] = useState(0);
            const [cruxStartTime, setCruxStartTime] = useState(null);
            const [cruxData, setCruxData] = useState({ rawBR: 0, effectiveBR: 0, expressions: [], wbalDepletion: 0 });
            const [wbalLevel, setWbalLevel] = useState(100); // W'bal as percentage
            const [baselineHR, setBaselineHR] = useState(null);
            const [dropoffHR, setDropoffHR] = useState(null);
            const [recoveryHR, setRecoveryHR] = useState(null);
            const [showRBAResults, setShowRBAResults] = useState(false);
            
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const mediaStreamRef = useRef(null);
            const animationFrameRef = useRef(null);
            const breathTimestampsRef = useRef([]);
            const lastBreathTimeRef = useRef(0);
            const sessionStartRef = useRef(null);
            const expressionBufferRef = useRef([]);
            const motionHistoryRef = useRef([]);
            const energyHistoryRef = useRef([]);

            useEffect(() => {
                let interval;
                if (isRecording) {
                    interval = setInterval(() => {
                        setElapsedTime(prev => prev + 1);
                        
                        // RBA Protocol timer
                        if (rbaMode) {
                            setRbaTimer(prev => {
                                const newTime = prev + 1;
                                
                                // Auto-transition phases
                                if (rbaPhase === 'baseline' && newTime >= 180) { // 3 min baseline complete
                                    setRbaPhase('ready');
                                }
                                if (rbaPhase === 'climbing' && newTime >= 240) { // 4 min climb complete
                                    setRbaPhase('recovery');
                                    setDropoffHR(null); // Ready to capture dropoff HR
                                }
                                if (rbaPhase === 'recovery' && newTime >= 60) { // 60s recovery complete
                                    setRbaPhase('results');
                                    setShowRBAResults(true);
                                }
                                
                                // W'bal dynamics during climb
                                if (rbaPhase === 'climbing' || rbaPhase === 'crux') {
                                    updateWbal();
                                }
                                
                                return newTime;
                            });
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isRecording, rbaMode, rbaPhase, effectiveBR, isMoving]);

            // W'bal calculation based on current BR and movement
            const updateWbal = () => {
                const cpThreshold = 45;
                const isAboveCP = effectiveBR >= cpThreshold;
                
                if (isAboveCP && !isMoving) {
                    // Above CP, not resting → W'bal depletion
                    const efficiency = effectiveBR > 55 ? 0.3 : 0.15; // 30% if >RCP, 15% if CP-RCP
                    const depletionPer10s = efficiency * 10;
                    const depletionPerSecond = depletionPer10s / 10;
                    
                    setWbalLevel(prev => Math.max(0, prev - depletionPerSecond));
                } else if (effectiveBR < cpThreshold && isMoving === false) {
                    // Below CP, resting → W'bal recharge
                    const rechargePer10s = 5; // 5% per 10s at rest
                    const rechargePerSecond = rechargePer10s / 10;
                    
                    setWbalLevel(prev => Math.min(100, prev + rechargePerSecond));
                }
            };

            useEffect(() => {
                let motionHandler;
                
                if (isRecording && window.DeviceMotionEvent) {
                    if (typeof DeviceMotionEvent.requestPermission === 'function') {
                        DeviceMotionEvent.requestPermission()
                            .then(permissionState => {
                                if (permissionState === 'granted') {
                                    attachMotionHandler();
                                }
                            })
                            .catch(console.error);
                    } else {
                        attachMotionHandler();
                    }
                }
                
                function attachMotionHandler() {
                    motionHandler = (event) => {
                        const acc = event.accelerationIncludingGravity;
                        if (acc) {
                            const x = acc.x || 0;
                            const y = acc.y || 0;
                            const z = acc.z || 0;
                            const magnitude = Math.sqrt(x*x + y*y + z*z);
                            
                            setMotionData({ x, y, z, magnitude });
                            
                            motionHistoryRef.current.push(magnitude);
                            if (motionHistoryRef.current.length > 50) {
                                motionHistoryRef.current.shift();
                            }
                            
                            const avgMagnitude = motionHistoryRef.current.reduce((a, b) => a + b, 0) / motionHistoryRef.current.length;
                            const moving = avgMagnitude > 11;
                            
                            if (!moving && isMoving) {
                                setRestDetected(true);
                                setTimeout(() => setRestDetected(false), 5000);
                            }
                            
                            setIsMoving(moving);
                        }
                    };
                    
                    window.addEventListener('devicemotion', motionHandler);
                }
                
                return () => {
                    if (motionHandler) {
                        window.removeEventListener('devicemotion', motionHandler);
                    }
                };
            }, [isRecording, isMoving]);

            useEffect(() => {
                if (effectiveBR < 20) setBrZone('baseline');
                else if (effectiveBR < 35) setBrZone('aerobic');
                else if (effectiveBR < 45) setBrZone('below-cp');
                else if (effectiveBR <= 48) setBrZone('at-cp');
                else if (effectiveBR <= 55) setBrZone('above-cp');
                else setBrZone('redline');
            }, [effectiveBR]);

            // EXHALE-FOCUSED breath detection with debouncing
            const analyzeAudio = () => {
                if (!analyserRef.current) return;
                
                const bufferLength = analyserRef.current.frequencyBinCount;
                const freqData = new Uint8Array(bufferLength);
                const timeData = new Uint8Array(bufferLength);
                
                analyserRef.current.getByteFrequencyData(freqData);
                analyserRef.current.getByteTimeDomainData(timeData);
                
                const sampleRate = 16000;
                
                // Focus on breathing frequencies (150-1500 Hz)
                const minBin = Math.floor((150 / (sampleRate / 2)) * bufferLength);
                const maxBin = Math.floor((1500 / (sampleRate / 2)) * bufferLength);
                
                // Calculate energy in breathing band
                let breathEnergy = 0;
                for (let i = minBin; i < maxBin; i++) {
                    breathEnergy += freqData[i];
                }
                breathEnergy = breathEnergy / (maxBin - minBin);
                
                // Calculate RMS from time domain
                let rms = 0;
                for (let i = 0; i < timeData.length; i++) {
                    const normalized = (timeData[i] - 128) / 128;
                    rms += normalized * normalized;
                }
                rms = Math.sqrt(rms / timeData.length) * 100;
                
                // Combine both metrics
                const combinedEnergy = Math.max(breathEnergy, rms);
                setAudioLevel(combinedEnergy);
                
                // Track energy history for exhale detection
                energyHistoryRef.current.push(combinedEnergy);
                if (energyHistoryRef.current.length > 20) { // Keep 20 frames (~300ms at 60fps)
                    energyHistoryRef.current.shift();
                }
                
                const now = Date.now();
                const timeSinceLastBreath = now - lastBreathTimeRef.current;
                
                // REALISTIC breathing timing - prevent multiple counts per breath
                // Normal breathing: 10-20 breaths/min = 3-6 seconds per breath
                // Heavy breathing: 30-40 breaths/min = 1.5-2 seconds per breath
                // Extreme: 50-60 breaths/min = 1-1.2 seconds per breath
                const minTimeBetweenBreaths = 1000; // 1 second minimum (allows up to 60 BPM)
                
                if (energyHistoryRef.current.length >= 15 && timeSinceLastBreath > minTimeBetweenBreaths) {
                    // EXHALE DETECTION: Look for falling edge pattern
                    // Exhale = rise in energy, then fall
                    
                    const recent = energyHistoryRef.current.slice(-5); // Last 5 frames
                    const earlier = energyHistoryRef.current.slice(-15, -10); // 10-15 frames ago
                    const oldest = energyHistoryRef.current.slice(0, 5); // Oldest frames
                    
                    const recentAvg = recent.reduce((a, b) => a + b, 0) / recent.length;
                    const earlierAvg = earlier.reduce((a, b) => a + b, 0) / earlier.length;
                    const oldestAvg = oldest.reduce((a, b) => a + b, 0) / oldest.length;
                    
                    // Exhale pattern: energy rose, then is falling
                    const hadPeak = earlierAvg > oldestAvg + 5; // Energy increased
                    const nowFalling = recentAvg < earlierAvg - 3; // Energy now decreasing
                    const aboveThreshold = earlierAvg > 15; // Peak was significant
                    
                    // Visual feedback for any sound
                    const anySound = combinedEnergy > 12;
                    setBreathingNow(anySound);
                    
                    // EXHALE DETECTED: Peak passed, energy falling, was above threshold
                    if (hadPeak && nowFalling && aboveThreshold) {
                        const duration = timeSinceLastBreath / 1000;
                        const peakEnergy = earlierAvg;
                        
                        // Expression classification based on peak energy
                        let expression = null;
                        if (peakEnergy > 70) {
                            expression = peakEnergy > 85 ? 'scream' : 'grunt';
                        } else if (peakEnergy > 50 && duration < 2) {
                            expression = 'yes_woo';
                        } else if (duration > 4) {
                            expression = 'breath_hold';
                        } else if (duration > 2 && peakEnergy > 20 && peakEnergy < 50) {
                            expression = 'sigh';
                        }
                        
                        breathTimestampsRef.current.push(now);
                        setBreathCount(prev => prev + 1);
                        lastBreathTimeRef.current = now;
                        
                        if (expression) {
                            const adjustment = calculateExpressionAdjustment(expression, duration);
                            const event = {
                                time: elapsedTime,
                                type: expression,
                                level: peakEnergy,
                                adjustment: adjustment,
                                emoji: EXPRESSION_ADJUSTMENTS[expression]?.emoji || '🫁'
                            };
                            
                            setExpressiveEvents(prev => [...prev, event]);
                            setCurrentExpression(expression);
                            setTimeout(() => setCurrentExpression(null), 1000);
                            
                            expressionBufferRef.current.push(adjustment);
                            if (expressionBufferRef.current.length > 10) {
                                expressionBufferRef.current.shift();
                            }
                        }
                        
                        // Calculate Raw BR
                        const oneMinuteAgo = now - 60000;
                        const recentBreaths = breathTimestampsRef.current.filter(t => t > oneMinuteAgo);
                        const newRawBR = recentBreaths.length;
                        setRawBR(newRawBR);
                        
                        // Calculate Effective BR
                        const recentAdjustments = expressionBufferRef.current.reduce((a, b) => a + b, 0);
                        const avgAdjustment = expressionBufferRef.current.length > 0 
                            ? recentAdjustments / expressionBufferRef.current.length 
                            : 0;
                        
                        const newEffectiveBR = Math.round(newRawBR + avgAdjustment);
                        setEffectiveBR(newEffectiveBR);
                        
                        if (newEffectiveBR > peakBR) {
                            setPeakBR(newEffectiveBR);
                        }
                        
                        logSessionData(peakEnergy, expression);
                    }
                } else {
                    // Visual feedback even if not counting
                    const anySound = combinedEnergy > 12;
                    setBreathingNow(anySound);
                }
                
                animationFrameRef.current = requestAnimationFrame(analyzeAudio);
            };

            const calculateExpressionAdjustment = (expression, duration) => {
                if (!expression) return 0;
                
                const adjust = EXPRESSION_ADJUSTMENTS[expression];
                if (!adjust) return 0;
                
                if (expression === 'breath_hold') {
                    return Math.min(10, Math.max(2, duration * 2));
                } else if (expression === 'sigh') {
                    return -0.5;
                } else if (expression === 'yes_woo') {
                    return 1.5;
                } else if (adjust.value !== undefined) {
                    return adjust.value;
                } else if (adjust.min !== undefined && adjust.max !== undefined) {
                    return (adjust.min + adjust.max) / 2;
                }
                return 0;
            };

            const logSessionData = (audioLevel, expression) => {
                setSessionData(prev => [...prev, {
                    timestamp: elapsedTime,
                    rawBR: rawBR,
                    effectiveBR: effectiveBR,
                    rpe: rpe,
                    audioLevel: audioLevel,
                    motion: motionData.magnitude,
                    isMoving: isMoving,
                    expression: expression || 'none',
                    zone: brZone
                }]);
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: true,
                            sampleRate: 16000
                        } 
                    });
                    mediaStreamRef.current = stream;
                    
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 16000
                    });
                    const source = audioContextRef.current.createMediaStreamSource(stream);
                    analyserRef.current = audioContextRef.current.createAnalyser();
                    analyserRef.current.fftSize = 4096; // High resolution
                    analyserRef.current.smoothingTimeConstant = 0.1; // Fast response
                    source.connect(analyserRef.current);
                    
                    setIsRecording(true);
                    sessionStartRef.current = Date.now();
                    setElapsedTime(0);
                    setBreathCount(0);
                    setRawBR(0);
                    setEffectiveBR(0);
                    setPeakBR(0);
                    setSessionData([]);
                    setExpressiveEvents([]);
                    breathTimestampsRef.current = [];
                    expressionBufferRef.current = [];
                    motionHistoryRef.current = [];
                    energyHistoryRef.current = [];
                    
                    analyzeAudio();
                    
                    if (typeof DeviceMotionEvent !== 'undefined' && 
                        typeof DeviceMotionEvent.requestPermission === 'function') {
                        DeviceMotionEvent.requestPermission()
                            .catch(err => console.log('Motion permission denied:', err));
                    }
                    
                } catch (err) {
                    console.error('Error accessing microphone:', err);
                    alert('Please allow microphone access. On iOS, go to Settings > Safari > Microphone and enable access.');
                }
            };

            const stopRecording = () => {
                setIsRecording(false);
                
                if (animationFrameRef.current) {
                    cancelAnimationFrame(animationFrameRef.current);
                }
                
                if (mediaStreamRef.current) {
                    mediaStreamRef.current.getTracks().forEach(track => track.stop());
                }
                
                if (audioContextRef.current) {
                    audioContextRef.current.close();
                }
            };

            const resetSession = () => {
                setElapsedTime(0);
                setBreathCount(0);
                setRawBR(0);
                setEffectiveBR(0);
                setPeakBR(0);
                setRpe(5);
                setSessionData([]);
                setExpressiveEvents([]);
                setCurrentExpression(null);
                setBrZone('baseline');
                setRestDetected(false);
                breathTimestampsRef.current = [];
                expressionBufferRef.current = [];
                motionHistoryRef.current = [];
                energyHistoryRef.current = [];
                lastBreathTimeRef.current = 0;
                sessionStartRef.current = null;
                
                // Reset RBA state
                setRbaMode(false);
                setRbaPhase('idle');
                setRbaTimer(0);
                setCruxStartTime(null);
                setCruxData({ rawBR: 0, effectiveBR: 0, expressions: [], wbalDepletion: 0 });
                setWbalLevel(100);
                setBaselineHR(null);
                setDropoffHR(null);
                setRecoveryHR(null);
                setShowRBAResults(false);
                
                setShowResetConfirm(false);
            };

            const startRBABaseline = () => {
                setRbaMode(true);
                setRbaPhase('baseline');
                setRbaTimer(0);
                setWbalLevel(100);
            };

            const startRBAClimb = () => {
                setRbaPhase('climbing');
                setRbaTimer(0);
                startRecording();
            };

            const markCruxWindow = () => {
                if (rbaPhase === 'climbing') {
                    setCruxStartTime(elapsedTime);
                    setRbaPhase('crux');
                    
                    // Capture current state for crux analysis
                    setTimeout(() => {
                        // After 60 seconds, calculate crux metrics
                        const cruxExpressions = expressiveEvents.filter(
                            e => e.time >= elapsedTime && e.time < elapsedTime + 60
                        );
                        
                        setCruxData({
                            rawBR: rawBR,
                            effectiveBR: effectiveBR,
                            expressions: cruxExpressions,
                            wbalDepletion: 100 - wbalLevel
                        });
                        
                        setRbaPhase('climbing'); // Return to normal climbing
                    }, 60000);
                }
            };

            const endRBAClimb = () => {
                setDropoffHR(null); // Capture dropoff HR if available
                setRbaPhase('recovery');
                setRbaTimer(0);
                
                // Start recovery countdown
                setTimeout(() => {
                    setRecoveryHR(null); // Capture 60s recovery HR
                }, 60000);
            };

            const exportData = () => {
                const csvContent = [
                    ['Time(s)', 'Raw BR', 'Effective BR', 'RPE', 'Audio Level', 'Motion', 'Moving', 'Expression', 'Zone'],
                    ...sessionData.map(d => [
                        d.timestamp,
                        d.rawBR,
                        d.effectiveBR,
                        d.rpe,
                        d.audioLevel.toFixed(2),
                        d.motion.toFixed(2),
                        d.isMoving ? 'Yes' : 'No',
                        d.expression,
                        d.zone
                    ])
                ].map(row => row.join(',')).join('\n');
                
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pranaclimb_${Date.now()}.csv`;
                a.click();
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const getZoneColor = () => {
                switch(brZone) {
                    case 'baseline': return '#87CEEB';
                    case 'aerobic': return '#32CD32';
                    case 'below-cp': return '#32CD32';
                    case 'at-cp': return '#FF00FC';
                    case 'above-cp': return '#FF00FC';
                    case 'redline': return '#FF00FC';
                    default: return '#87CEEB';
                }
            };

            const getZoneLabel = () => {
                switch(brZone) {
                    case 'baseline': return 'Baseline';
                    case 'aerobic': return 'Aerobic';
                    case 'below-cp': return 'Below CP';
                    case 'at-cp': return 'At CP';
                    case 'above-cp': return 'Above CP → RCP';
                    case 'redline': return 'Redline';
                    default: return 'Monitoring';
                }
            };

            return (
                <div className="min-h-screen pb-8">
                    <div className="fixed inset-0 pointer-events-none overflow-hidden">
                        <div className="breathing-animation absolute top-20 right-20 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#87CEEB' }} />
                        <div className="breathing-animation absolute bottom-20 left-20 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#32CD32', animationDelay: '1.5s' }} />
                        <div className="breathing-animation absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#FF00FC', animationDelay: '3s' }} />
                    </div>

                    <div className="relative z-10 max-w-7xl mx-auto px-4 py-6">
                        <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 mb-6 card-shadow slide-up border-2 border-gray-100">
                            <div className="flex items-center justify-between mb-6 flex-wrap gap-4">
                                <div>
                                    <div className="flex items-center gap-3 mb-2">
                                        <h1 className="text-4xl font-bold flex items-center gap-3" style={{ color: '#FF00FC' }}>
                                            Pranaclimb Live
                                            {breathingNow && isRecording && (
                                                <span className="pulse-circle inline-block w-4 h-4 rounded-full" 
                                                      style={{ backgroundColor: '#32CD32' }} />
                                            )}
                                        </h1>
                                        {!isRecording && (
                                            <button
                                                onClick={() => setRbaMode(!rbaMode)}
                                                className={`px-4 py-2 rounded-xl text-sm font-bold transition ${
                                                    rbaMode 
                                                        ? 'bg-gradient-to-r from-pink-500 to-purple-500 text-white' 
                                                        : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                                }`}
                                            >
                                                {rbaMode ? '🧪 RBA Mode' : '🏃 Free Climb'}
                                            </button>
                                        )}
                                    </div>
                                    <p className="text-gray-600 font-medium">
                                        {rbaMode ? 'Remote Breathing Assessment Protocol' : 'Exhale-Focused Detection'}
                                    </p>
                                    {rbaMode && rbaPhase !== 'idle' && (
                                        <div className="mt-2 flex items-center gap-2">
                                            <span className="text-sm font-bold px-3 py-1 rounded-full text-white"
                                                  style={{ 
                                                      backgroundColor: 
                                                          rbaPhase === 'baseline' ? '#87CEEB' :
                                                          rbaPhase === 'ready' ? '#32CD32' :
                                                          rbaPhase === 'climbing' ? '#32CD32' :
                                                          rbaPhase === 'crux' ? '#FF00FC' :
                                                          rbaPhase === 'recovery' ? '#87CEEB' :
                                                          '#gray'

                                    </div>
                                    
                                    <button
                                        onClick={() => setShowRPEScale(false)}
                                        className="w-full mt-6 text-white px-8 py-4 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                        style={{ backgroundColor: '#32CD32' }}
                                    >
                                        Close
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Expression Table Modal */}
                        {showExpressionTable && (
                            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4"
                                 onClick={() => setShowExpressionTable(false)}>
                                <div className="bg-white rounded-3xl p-6 max-w-3xl w-full max-h-[90vh] overflow-y-auto card-shadow"
                                     onClick={(e) => e.stopPropagation()}>
                                    <div className="flex items-center justify-between mb-6">
                                        <h2 className="text-3xl font-bold" style={{ color: '#FF00FC' }}>
                                            Expression Table
                                        </h2>
                                        <button
                                            onClick={() => setShowExpressionTable(false)}
                                            className="text-gray-500 hover:text-gray-700 text-3xl font-bold"
                                        >
                                            ×
                                        </button>
                                    </div>
                                    
                                    <p className="text-sm text-gray-600 mb-6">
                                        <strong>FINAL – No Stacking</strong>
                                    </p>
                                    
                                    <div className="overflow-x-auto">
                                        <table className="w-full">
                                            <thead>
                                                <tr className="border-b-2" style={{ borderColor: '#FF00FC' }}>
                                                    <th className="text-left p-3 font-bold text-gray-900">Expression</th>
                                                    <th className="text-center p-3 font-bold text-gray-900">Δ BR</th>
                                                    <th className="text-left p-3 font-bold text-gray-900">Meaning</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr className="border-b hover:bg-gray-50">
                                                    <td className="p-3 flex items-center gap-2">
                                                        <span className="text-2xl">🔇</span>
                                                        <span className="font-semibold">Breath hold</span>
                                                    </td>
                                                    <td className="p-3 text-center mono font-bold" style={{ color: '#FF00FC' }}>
                                                        +2 → +10
                                                    </td>
                                                    <td className="p-3 text-gray-700">Bracing / pressure</td>
                                                </tr>
                                                <tr className="border-b hover:bg-gray-50">
                                                    <td className="p-3 flex items-center gap-2">
                                                        <span className="text-2xl">💪</span>
                                                        <span className="font-semibold">Grunt</span>
                                                    </td>
                                                    <td className="p-3 text-center mono font-bold" style={{ color: '#32CD32' }}>
                                                        +3
                                                    </td>
                                                    <td className="p-3 text-gray-700">Force transfer</td>
                                                </tr>
                                                <tr className="border-b hover:bg-gray-50">
                                                    <td className="p-3 flex items-center gap-2">
                                                        <span className="text-2xl">😱</span>
                                                        <span className="font-semibold">Scream</span>
                                                    </td>
                                                    <td className="p-3 text-center mono font-bold" style={{ color: '#FF00FC' }}>
                                                        +5
                                                    </td>
                                                    <td className="p-3 text-gray-700">Max neural drive</td>
                                                </tr>
                                                <tr className="border-b hover:bg-gray-50">
                                                    <td className="p-3 flex items-center gap-2">
                                                        <span className="text-2xl">👃</span>
                                                        <span className="font-semibold">Strong nasal inhale</span>
                                                    </td>
                                                    <td className="p-3 text-center mono font-bold" style={{ color: '#87CEEB' }}>
                                                        +2
                                                    </td>
                                                    <td className="p-3 text-gray-700">Diaphragm priming</td>
                                                </tr>
                                                <tr className="border-b hover:bg-gray-50">
                                                    <td className="p-3 flex items-center gap-2">
                                                        <span className="text-2xl">🎉</span>
                                                        <span className="font-semibold">YES / WOO</span>
                                                    </td>
                                                    <td className="p-3 text-center mono font-bold" style={{ color: '#32CD32' }}>
                                                        +1 → +2
                                                    </td>
                                                    <td className="p-3 text-gray-700">Emotional release</td>
                                                </tr>
                                                <tr className="border-b hover:bg-gray-50">
                                                    <td className="p-3 flex items-center gap-2">
                                                        <span className="text-2xl">😮‍💨</span>
                                                        <span className="font-semibold">Sigh / "ahh"</span>
                                                    </td>
                                                    <td className="p-3 text-center mono font-bold" style={{ color: '#87CEEB' }}>
                                                        0 → −1
                                                    </td>
                                                    <td className="p-3 text-gray-700">Parasympathetic reset</td>
                                                </tr>
                                                <tr className="border-b hover:bg-gray-50">
                                                    <td className="p-3 flex items-center gap-2">
                                                        <span className="text-2xl">🧠</span>
                                                        <span className="font-semibold">RP (latent)</span>
                                                    </td>
                                                    <td className="p-3 text-center mono font-bold" style={{ color: '#32CD32' }}>
                                                        +1
                                                    </td>
                                                    <td className="p-3 text-gray-700">Neural prep (no ventilation)</td>
                                                </tr>
                                                <tr className="hover:bg-gray-50">
                                                    <td className="p-3 flex items-center gap-2">
                                                        <span className="text-2xl">⚡</span>
                                                        <span className="font-semibold">RP Sync</span>
                                                    </td>
                                                    <td className="p-3 text-center mono font-bold text-gray-600">
                                                        context
                                                    </td>
                                                    <td className="p-3 text-gray-700">Timing, not cost</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                    
                                    <div className="mt-6 p-4 bg-gradient-to-r from-blue-50 to-pink-50 rounded-2xl border-2"
                                         style={{ borderColor: '#FF00FC' }}>
                                        <p className="text-sm font-bold text-gray-900 mb-2">Critical Rule:</p>
                                        <p className="text-sm text-gray-700">
                                            <strong>RP Sync never stacks with expressions.</strong><br/>
                                            RP tells <em>when</em> the breath happens.<br/>
                                            Expressions tell <em>what</em> the breath is.
                                        </p>
                                    </div>
                                    
                                    <button
                                        onClick={() => setShowExpressionTable(false)}
                                        className="w-full mt-6 text-white px-8 py-4 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                        style={{ backgroundColor: '#FF00FC' }}
                                    >
                                        Close
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Reset Modal */}
                        {showResetConfirm && (
                            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4"
                                 onClick={() => setShowResetConfirm(false)}>
                                <div className="bg-white rounded-3xl p-6 max-w-md w-full card-shadow"
                                     onClick={(e) => e.stopPropagation()}>
                                    <h3 className="text-2xl font-bold mb-4 text-gray-900">
                                        Reset Session?
                                    </h3>
                                    <p className="text-gray-700 mb-6">
                                        Clear all data? Make sure you've exported first!
                                    </p>
                                    <div className="flex gap-4">
                                        <button
                                            onClick={() => setShowResetConfirm(false)}
                                            className="flex-1 bg-gray-200 text-gray-800 px-6 py-4 rounded-2xl font-bold"
                                        >
                                            Cancel
                                        </button>
                                        <button
                                            onClick={resetSession}
                                            className="flex-1 bg-red-500 text-white px-6 py-4 rounded-2xl font-bold"
                                        >
                                            Reset
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<PranaclimbLiveMonitor />, document.getElementById('root'));
    </script>
</body>
</html>
