<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranaclimb Live Climb Monitor</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icon components
        const Mic = () => (
            <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
        );

        const Activity = () => (
            <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
        );

        const Smartphone = () => (
            <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
            </svg>
        );

        const Play = () => (
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const Square = () => (
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
            </svg>
        );

        const Download = () => (
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
        );

        function PranaclimbLiveMonitor() {
            const [isRecording, setIsRecording] = useState(false);
            const [audioLevel, setAudioLevel] = useState(0);
            const [breathCount, setBreathCount] = useState(0);
            const [currentBR, setCurrentBR] = useState(0);
            const [rpe, setRpe] = useState(5);
            const [motionData, setMotionData] = useState({ x: 0, y: 0, z: 0, magnitude: 0 });
            const [isMoving, setIsMoving] = useState(false);
            const [sessionData, setSessionData] = useState([]);
            const [elapsedTime, setElapsedTime] = useState(0);
            const [restDetected, setRestDetected] = useState(false);
            const [expressiveEvents, setExpressiveEvents] = useState([]);
            
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const mediaStreamRef = useRef(null);
            const animationFrameRef = useRef(null);
            const breathTimestampsRef = useRef([]);
            const lastBreathTimeRef = useRef(0);
            const sessionStartRef = useRef(null);

            // Timer effect
            useEffect(() => {
                let interval;
                if (isRecording) {
                    interval = setInterval(() => {
                        setElapsedTime(prev => prev + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isRecording]);

            // Motion detection effect
            useEffect(() => {
                let motionHandler;
                
                if (isRecording && window.DeviceMotionEvent) {
                    motionHandler = (event) => {
                        const acc = event.accelerationIncludingGravity;
                        if (acc) {
                            const x = acc.x || 0;
                            const y = acc.y || 0;
                            const z = acc.z || 0;
                            const magnitude = Math.sqrt(x*x + y*y + z*z);
                            
                            setMotionData({ x, y, z, magnitude });
                            
                            const moving = magnitude > 12;
                            
                            if (!moving && isMoving) {
                                setRestDetected(true);
                                setTimeout(() => setRestDetected(false), 3000);
                            }
                            
                            setIsMoving(moving);
                        }
                    };
                    
                    window.addEventListener('devicemotion', motionHandler);
                }
                
                return () => {
                    if (motionHandler) {
                        window.removeEventListener('devicemotion', motionHandler);
                    }
                };
            }, [isRecording, isMoving]);

            const analyzeAudio = () => {
                if (!analyserRef.current) return;
                
                const dataArray = new Uint8Array(analyserRef.current.frequencyBinCount);
                analyserRef.current.getByteFrequencyData(dataArray);
                
                const sum = dataArray.reduce((acc, val) => acc + val * val, 0);
                const rms = Math.sqrt(sum / dataArray.length);
                const normalizedLevel = Math.min(100, (rms / 128) * 100);
                
                setAudioLevel(normalizedLevel);
                
                const now = Date.now();
                if (normalizedLevel > 30 && now - lastBreathTimeRef.current > 1000) {
                    breathTimestampsRef.current.push(now);
                    setBreathCount(prev => prev + 1);
                    lastBreathTimeRef.current = now;
                    
                    if (normalizedLevel > 60) {
                        const event = {
                            time: elapsedTime,
                            type: normalizedLevel > 80 ? 'scream' : 'grunt',
                            level: normalizedLevel
                        };
                        setExpressiveEvents(prev => [...prev, event]);
                    }
                    
                    const oneMinuteAgo = now - 60000;
                    const recentBreaths = breathTimestampsRef.current.filter(t => t > oneMinuteAgo);
                    setCurrentBR(recentBreaths.length);
                    
                    logSessionData(normalizedLevel);
                }
                
                animationFrameRef.current = requestAnimationFrame(analyzeAudio);
            };

            const logSessionData = (audioLevel) => {
                setSessionData(prev => [...prev, {
                    timestamp: elapsedTime,
                    br: currentBR,
                    rpe: rpe,
                    audioLevel: audioLevel,
                    motion: motionData.magnitude,
                    isMoving: isMoving,
                    expressiveCount: expressiveEvents.length
                }]);
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaStreamRef.current = stream;
                    
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioContextRef.current.createMediaStreamSource(stream);
                    analyserRef.current = audioContextRef.current.createAnalyser();
                    analyserRef.current.fftSize = 2048;
                    source.connect(analyserRef.current);
                    
                    setIsRecording(true);
                    sessionStartRef.current = Date.now();
                    setElapsedTime(0);
                    setBreathCount(0);
                    setSessionData([]);
                    setExpressiveEvents([]);
                    breathTimestampsRef.current = [];
                    
                    analyzeAudio();
                    
                    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                        DeviceMotionEvent.requestPermission();
                    }
                    
                } catch (err) {
                    console.error('Error accessing microphone:', err);
                    alert('Please allow microphone access to use this feature');
                }
            };

            const stopRecording = () => {
                setIsRecording(false);
                
                if (animationFrameRef.current) {
                    cancelAnimationFrame(animationFrameRef.current);
                }
                
                if (mediaStreamRef.current) {
                    mediaStreamRef.current.getTracks().forEach(track => track.stop());
                }
                
                if (audioContextRef.current) {
                    audioContextRef.current.close();
                }
            };

            const exportData = () => {
                const csvContent = [
                    ['Time(s)', 'BR(bpm)', 'RPE', 'Audio Level', 'Motion', 'Moving', 'Expressive Events'],
                    ...sessionData.map(d => [
                        d.timestamp,
                        d.br,
                        d.rpe,
                        d.audioLevel.toFixed(2),
                        d.motion.toFixed(2),
                        d.isMoving ? 'Yes' : 'No',
                        d.expressiveCount
                    ])
                ].map(row => row.join(',')).join('\n');
                
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pranaclimb_session_${Date.now()}.csv`;
                a.click();
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const getZoneColor = (br) => {
                if (br < 35) return 'bg-green-500';
                if (br < 45) return 'bg-yellow-500';
                if (br <= 48) return 'bg-orange-500';
                if (br <= 55) return 'bg-red-500';
                return 'bg-red-800';
            };

            const getZoneLabel = (br) => {
                if (br < 35) return 'Sub-threshold';
                if (br < 45) return 'Below CP';
                if (br <= 48) return 'At CP';
                if (br <= 55) return 'Above CP → RCP';
                return 'Redline';
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-900 to-purple-900 p-4">
                    <div className="max-w-7xl mx-auto">
                        <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-6 mb-6 border border-white/20">
                            <div className="flex items-center justify-between mb-4 flex-wrap gap-4">
                                <div>
                                    <h1 className="text-3xl font-bold text-white mb-2">🧗 Pranaclimb Live Monitor</h1>
                                    <p className="text-white/80">Real-time Audio + Motion Analysis</p>
                                </div>
                                <div className="text-right">
                                    <div className="text-5xl font-bold text-white">{formatTime(elapsedTime)}</div>
                                    <div className="text-white/60 text-sm">Session Time</div>
                                </div>
                            </div>
                            
                            <div className="flex gap-4 flex-wrap">
                                {!isRecording ? (
                                    <button
                                        onClick={startRecording}
                                        className="flex-1 min-w-[200px] bg-green-500 hover:bg-green-600 text-white px-6 py-4 rounded-xl font-bold transition flex items-center justify-center gap-2"
                                    >
                                        <Play />
                                        Start Session
                                    </button>
                                ) : (
                                    <button
                                        onClick={stopRecording}
                                        className="flex-1 min-w-[200px] bg-red-500 hover:bg-red-600 text-white px-6 py-4 rounded-xl font-bold transition flex items-center justify-center gap-2"
                                    >
                                        <Square />
                                        Stop Session
                                    </button>
                                )}
                                
                                <button
                                    onClick={exportData}
                                    disabled={sessionData.length === 0}
                                    className="bg-blue-500 hover:bg-blue-600 text-white px-6 py-4 rounded-xl font-bold transition disabled:opacity-50 flex items-center gap-2"
                                >
                                    <Download />
                                    Export
                                </button>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
                            <div className={`${getZoneColor(currentBR)} rounded-2xl p-6 text-white shadow-2xl`}>
                                <div className="flex items-center justify-between mb-4">
                                    <Mic />
                                    <span className="text-sm opacity-80">{getZoneLabel(currentBR)}</span>
                                </div>
                                <div className="text-6xl font-bold mb-2">{currentBR}</div>
                                <div className="text-sm opacity-90">Breaths/Min (Live BR)</div>
                                <div className="mt-4 text-sm">
                                    Total breaths: {breathCount}
                                </div>
                            </div>

                            <div className="bg-purple-600 rounded-2xl p-6 text-white shadow-2xl">
                                <div className="flex items-center justify-between mb-4">
                                    <Activity />
                                    <span className="text-sm opacity-80">Rate of Perceived Exertion</span>
                                </div>
                                <div className="text-6xl font-bold mb-2">{rpe}</div>
                                <div className="text-sm opacity-90 mb-4">RPE (0-10)</div>
                                <input
                                    type="range"
                                    min="0"
                                    max="10"
                                    value={rpe}
                                    onChange={(e) => setRpe(parseInt(e.target.value))}
                                    className="w-full"
                                />
                            </div>

                            <div className={`${isMoving ? 'bg-orange-500' : 'bg-gray-600'} rounded-2xl p-6 text-white shadow-2xl transition-all`}>
                                <div className="flex items-center justify-between mb-4">
                                    <Smartphone />
                                    <span className="text-sm opacity-80">
                                        {isMoving ? '🏃 Moving' : '🧘 Still'}
                                    </span>
                                </div>
                                <div className="text-6xl font-bold mb-2">
                                    {motionData.magnitude.toFixed(1)}
                                </div>
                                <div className="text-sm opacity-90 mb-4">Motion Magnitude</div>
                                <div className="text-xs space-y-1">
                                    <div>X: {motionData.x.toFixed(2)}</div>
                                    <div>Y: {motionData.y.toFixed(2)}</div>
                                    <div>Z: {motionData.z.toFixed(2)}</div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-6 mb-6 border border-white/20">
                            <h3 className="text-white font-bold text-xl mb-4">🎙️ Audio Level</h3>
                            <div className="relative h-32 bg-slate-800/50 rounded-xl overflow-hidden">
                                <div
                                    className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-green-400 to-green-600 transition-all duration-100"
                                    style={{ height: `${audioLevel}%` }}
                                />
                                <div className="absolute inset-0 flex items-center justify-center">
                                    <span className="text-white text-4xl font-bold">
                                        {audioLevel.toFixed(0)}%
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-6 mb-6 border border-white/20">
                            <h3 className="text-white font-bold text-xl mb-4">⚡ Expressive Breathing Events</h3>
                            <div className="space-y-2 max-h-48 overflow-y-auto">
                                {expressiveEvents.length === 0 ? (
                                    <p className="text-white/60 text-center py-4">No expressive events detected yet</p>
                                ) : (
                                    expressiveEvents.slice(-10).reverse().map((event, idx) => (
                                        <div key={idx} className="bg-white/5 rounded-lg p-3 flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <span className="text-2xl">
                                                    {event.type === 'scream' ? '😱' : '💪'}
                                                </span>
                                                <span className="text-white font-semibold">
                                                    {event.type === 'scream' ? 'Scream/Yell' : 'Grunt'}
                                                </span>
                                            </div>
                                            <div className="text-white/80 text-sm">
                                                {formatTime(event.time)} • {event.level.toFixed(0)}dB
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        {restDetected && (
                            <div className="bg-blue-500 rounded-2xl p-6 mb-6 text-white shadow-2xl">
                                <div className="flex items-center gap-4">
                                    <div className="text-4xl">🧘</div>
                                    <div>
                                        <div className="text-xl font-bold">Rest Detected!</div>
                                        <div className="text-sm opacity-90">Begin HRR₆₀ countdown if measuring HR</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {sessionData.length > 0 && (
                            <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-6 mb-6 border border-white/20">
                                <h3 className="text-white font-bold text-xl mb-4">📊 Session Summary</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-white">
                                    <div>
                                        <div className="text-3xl font-bold">{sessionData.length}</div>
                                        <div className="text-sm opacity-80">Data Points</div>
                                    </div>
                                    <div>
                                        <div className="text-3xl font-bold">
                                            {Math.max(...sessionData.map(d => d.br))}
                                        </div>
                                        <div className="text-sm opacity-80">Peak BR</div>
                                    </div>
                                    <div>
                                        <div className="text-3xl font-bold">
                                            {(sessionData.reduce((acc, d) => acc + d.br, 0) / sessionData.length).toFixed(1)}
                                        </div>
                                        <div className="text-sm opacity-80">Avg BR</div>
                                    </div>
                                    <div>
                                        <div className="text-3xl font-bold">{expressiveEvents.length}</div>
                                        <div className="text-sm opacity-80">Expressive Events</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {!isRecording && sessionData.length === 0 && (
                            <div className="bg-white/10 backdrop-blur-lg rounded-2xl p-6 border border-white/20">
                                <h3 className="text-white font-bold text-xl mb-4">📱 How to Use</h3>
                                <div className="text-white/80 space-y-3">
                                    <p>1. <strong>Grant Permissions:</strong> Allow microphone and motion sensor access</p>
                                    <p>2. <strong>Start Session:</strong> Click "Start Session" before climbing</p>
                                    <p>3. <strong>Climb:</strong> The app will automatically detect breathing, motion, and expressive events</p>
                                    <p>4. <strong>Adjust RPE:</strong> Update your perceived exertion during rests</p>
                                    <p>5. <strong>Stop & Export:</strong> End the session and download data for coach analysis</p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<PranaclimbLiveMonitor />, document.getElementById('root'));
    </script>
</body>
</html>
