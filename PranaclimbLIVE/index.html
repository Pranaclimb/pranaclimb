<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pranaclimb Live">
    <title>Pranaclimb Live Monitor</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
        }

        .breathing-animation {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.05); opacity: 0.35; }
        }

        .slide-up {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-shadow {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .pulse-circle {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        @supports (padding: max(0px)) {
            body {
                padding-top: max(env(safe-area-inset-top), 0px);
                padding-bottom: max(env(safe-area-inset-bottom), 0px);
            }
        }
    </style>
</head>
<body class="gradient-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Expression adjustment table
        const EXPRESSION_ADJUSTMENTS = {
            'breath_hold': { min: 2, max: 10, emoji: '🔇', meaning: 'Bracing / pressure' },
            'grunt': { value: 3, emoji: '💪', meaning: 'Force transfer' },
            'scream': { value: 5, emoji: '😱', meaning: 'Max neural drive' },
            'strong_nasal': { value: 2, emoji: '👃', meaning: 'Diaphragm priming' },
            'yes_woo': { min: 1, max: 2, emoji: '🎉', meaning: 'Emotional release' },
            'sigh': { min: 0, max: -1, emoji: '😮‍💨', meaning: 'Parasympathetic reset' },
            'rp_latent': { value: 1, emoji: '🧠', meaning: 'Neural prep' }
        };

        function PranaclimbLiveMonitor() {
            const [isRecording, setIsRecording] = useState(false);
            const [audioLevel, setAudioLevel] = useState(0);
            const [breathCount, setBreathCount] = useState(0);
            const [rawBR, setRawBR] = useState(0);
            const [effectiveBR, setEffectiveBR] = useState(0);
            const [rpe, setRpe] = useState(5);
            const [motionData, setMotionData] = useState({ x: 0, y: 0, z: 0, magnitude: 0 });
            const [isMoving, setIsMoving] = useState(false);
            const [sessionData, setSessionData] = useState([]);
            const [elapsedTime, setElapsedTime] = useState(0);
            const [restDetected, setRestDetected] = useState(false);
            const [expressiveEvents, setExpressiveEvents] = useState([]);
            const [currentExpression, setCurrentExpression] = useState(null);
            const [brZone, setBrZone] = useState('baseline');
            const [peakBR, setPeakBR] = useState(0);
            const [showExpressionTable, setShowExpressionTable] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [breathingNow, setBreathingNow] = useState(false);
            
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const mediaStreamRef = useRef(null);
            const animationFrameRef = useRef(null);
            const breathTimestampsRef = useRef([]);
            const lastBreathTimeRef = useRef(0);
            const sessionStartRef = useRef(null);
            const expressionBufferRef = useRef([]);
            const motionHistoryRef = useRef([]);
            const energyHistoryRef = useRef([]);

            useEffect(() => {
                let interval;
                if (isRecording) {
                    interval = setInterval(() => {
                        setElapsedTime(prev => prev + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isRecording]);

            useEffect(() => {
                let motionHandler;
                
                if (isRecording && window.DeviceMotionEvent) {
                    if (typeof DeviceMotionEvent.requestPermission === 'function') {
                        DeviceMotionEvent.requestPermission()
                            .then(permissionState => {
                                if (permissionState === 'granted') {
                                    attachMotionHandler();
                                }
                            })
                            .catch(console.error);
                    } else {
                        attachMotionHandler();
                    }
                }
                
                function attachMotionHandler() {
                    motionHandler = (event) => {
                        const acc = event.accelerationIncludingGravity;
                        if (acc) {
                            const x = acc.x || 0;
                            const y = acc.y || 0;
                            const z = acc.z || 0;
                            const magnitude = Math.sqrt(x*x + y*y + z*z);
                            
                            setMotionData({ x, y, z, magnitude });
                            
                            motionHistoryRef.current.push(magnitude);
                            if (motionHistoryRef.current.length > 50) {
                                motionHistoryRef.current.shift();
                            }
                            
                            const avgMagnitude = motionHistoryRef.current.reduce((a, b) => a + b, 0) / motionHistoryRef.current.length;
                            const moving = avgMagnitude > 11;
                            
                            if (!moving && isMoving) {
                                setRestDetected(true);
                                setTimeout(() => setRestDetected(false), 5000);
                            }
                            
                            setIsMoving(moving);
                        }
                    };
                    
                    window.addEventListener('devicemotion', motionHandler);
                }
                
                return () => {
                    if (motionHandler) {
                        window.removeEventListener('devicemotion', motionHandler);
                    }
                };
            }, [isRecording, isMoving]);

            useEffect(() => {
                if (effectiveBR < 20) setBrZone('baseline');
                else if (effectiveBR < 35) setBrZone('aerobic');
                else if (effectiveBR < 45) setBrZone('below-cp');
                else if (effectiveBR <= 48) setBrZone('at-cp');
                else if (effectiveBR <= 55) setBrZone('above-cp');
                else setBrZone('redline');
            }, [effectiveBR]);

            // EXHALE-FOCUSED breath detection with debouncing
            const analyzeAudio = () => {
                if (!analyserRef.current) return;
                
                const bufferLength = analyserRef.current.frequencyBinCount;
                const freqData = new Uint8Array(bufferLength);
                const timeData = new Uint8Array(bufferLength);
                
                analyserRef.current.getByteFrequencyData(freqData);
                analyserRef.current.getByteTimeDomainData(timeData);
                
                const sampleRate = 16000;
                
                // Focus on breathing frequencies (150-1500 Hz)
                const minBin = Math.floor((150 / (sampleRate / 2)) * bufferLength);
                const maxBin = Math.floor((1500 / (sampleRate / 2)) * bufferLength);
                
                // Calculate energy in breathing band
                let breathEnergy = 0;
                for (let i = minBin; i < maxBin; i++) {
                    breathEnergy += freqData[i];
                }
                breathEnergy = breathEnergy / (maxBin - minBin);
                
                // Calculate RMS from time domain
                let rms = 0;
                for (let i = 0; i < timeData.length; i++) {
                    const normalized = (timeData[i] - 128) / 128;
                    rms += normalized * normalized;
                }
                rms = Math.sqrt(rms / timeData.length) * 100;
                
                // Combine both metrics
                const combinedEnergy = Math.max(breathEnergy, rms);
                setAudioLevel(combinedEnergy);
                
                // Track energy history for exhale detection
                energyHistoryRef.current.push(combinedEnergy);
                if (energyHistoryRef.current.length > 20) { // Keep 20 frames (~300ms at 60fps)
                    energyHistoryRef.current.shift();
                }
                
                const now = Date.now();
                const timeSinceLastBreath = now - lastBreathTimeRef.current;
                
                // REALISTIC breathing timing - prevent multiple counts per breath
                // Normal breathing: 10-20 breaths/min = 3-6 seconds per breath
                // Heavy breathing: 30-40 breaths/min = 1.5-2 seconds per breath
                // Extreme: 50-60 breaths/min = 1-1.2 seconds per breath
                const minTimeBetweenBreaths = 1000; // 1 second minimum (allows up to 60 BPM)
                
                if (energyHistoryRef.current.length >= 15 && timeSinceLastBreath > minTimeBetweenBreaths) {
                    // EXHALE DETECTION: Look for falling edge pattern
                    // Exhale = rise in energy, then fall
                    
                    const recent = energyHistoryRef.current.slice(-5); // Last 5 frames
                    const earlier = energyHistoryRef.current.slice(-15, -10); // 10-15 frames ago
                    const oldest = energyHistoryRef.current.slice(0, 5); // Oldest frames
                    
                    const recentAvg = recent.reduce((a, b) => a + b, 0) / recent.length;
                    const earlierAvg = earlier.reduce((a, b) => a + b, 0) / earlier.length;
                    const oldestAvg = oldest.reduce((a, b) => a + b, 0) / oldest.length;
                    
                    // Exhale pattern: energy rose, then is falling
                    const hadPeak = earlierAvg > oldestAvg + 5; // Energy increased
                    const nowFalling = recentAvg < earlierAvg - 3; // Energy now decreasing
                    const aboveThreshold = earlierAvg > 15; // Peak was significant
                    
                    // Visual feedback for any sound
                    const anySound = combinedEnergy > 12;
                    setBreathingNow(anySound);
                    
                    // EXHALE DETECTED: Peak passed, energy falling, was above threshold
                    if (hadPeak && nowFalling && aboveThreshold) {
                        const duration = timeSinceLastBreath / 1000;
                        const peakEnergy = earlierAvg;
                        
                        // Expression classification based on peak energy
                        let expression = null;
                        if (peakEnergy > 70) {
                            expression = peakEnergy > 85 ? 'scream' : 'grunt';
                        } else if (peakEnergy > 50 && duration < 2) {
                            expression = 'yes_woo';
                        } else if (duration > 4) {
                            expression = 'breath_hold';
                        } else if (duration > 2 && peakEnergy > 20 && peakEnergy < 50) {
                            expression = 'sigh';
                        }
                        
                        breathTimestampsRef.current.push(now);
                        setBreathCount(prev => prev + 1);
                        lastBreathTimeRef.current = now;
                        
                        if (expression) {
                            const adjustment = calculateExpressionAdjustment(expression, duration);
                            const event = {
                                time: elapsedTime,
                                type: expression,
                                level: peakEnergy,
                                adjustment: adjustment,
                                emoji: EXPRESSION_ADJUSTMENTS[expression]?.emoji || '🫁'
                            };
                            
                            setExpressiveEvents(prev => [...prev, event]);
                            setCurrentExpression(expression);
                            setTimeout(() => setCurrentExpression(null), 1000);
                            
                            expressionBufferRef.current.push(adjustment);
                            if (expressionBufferRef.current.length > 10) {
                                expressionBufferRef.current.shift();
                            }
                        }
                        
                        // Calculate Raw BR
                        const oneMinuteAgo = now - 60000;
                        const recentBreaths = breathTimestampsRef.current.filter(t => t > oneMinuteAgo);
                        const newRawBR = recentBreaths.length;
                        setRawBR(newRawBR);
                        
                        // Calculate Effective BR
                        const recentAdjustments = expressionBufferRef.current.reduce((a, b) => a + b, 0);
                        const avgAdjustment = expressionBufferRef.current.length > 0 
                            ? recentAdjustments / expressionBufferRef.current.length 
                            : 0;
                        
                        const newEffectiveBR = Math.round(newRawBR + avgAdjustment);
                        setEffectiveBR(newEffectiveBR);
                        
                        if (newEffectiveBR > peakBR) {
                            setPeakBR(newEffectiveBR);
                        }
                        
                        logSessionData(peakEnergy, expression);
                    }
                } else {
                    // Visual feedback even if not counting
                    const anySound = combinedEnergy > 12;
                    setBreathingNow(anySound);
                }
                
                animationFrameRef.current = requestAnimationFrame(analyzeAudio);
            };

            const calculateExpressionAdjustment = (expression, duration) => {
                if (!expression) return 0;
                
                const adjust = EXPRESSION_ADJUSTMENTS[expression];
                if (!adjust) return 0;
                
                if (expression === 'breath_hold') {
                    return Math.min(10, Math.max(2, duration * 2));
                } else if (expression === 'sigh') {
                    return -0.5;
                } else if (expression === 'yes_woo') {
                    return 1.5;
                } else if (adjust.value !== undefined) {
                    return adjust.value;
                } else if (adjust.min !== undefined && adjust.max !== undefined) {
                    return (adjust.min + adjust.max) / 2;
                }
                return 0;
            };

            const logSessionData = (audioLevel, expression) => {
                setSessionData(prev => [...prev, {
                    timestamp: elapsedTime,
                    rawBR: rawBR,
                    effectiveBR: effectiveBR,
                    rpe: rpe,
                    audioLevel: audioLevel,
                    motion: motionData.magnitude,
                    isMoving: isMoving,
                    expression: expression || 'none',
                    zone: brZone
                }]);
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: true,
                            sampleRate: 16000
                        } 
                    });
                    mediaStreamRef.current = stream;
                    
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 16000
                    });
                    const source = audioContextRef.current.createMediaStreamSource(stream);
                    analyserRef.current = audioContextRef.current.createAnalyser();
                    analyserRef.current.fftSize = 4096; // High resolution
                    analyserRef.current.smoothingTimeConstant = 0.1; // Fast response
                    source.connect(analyserRef.current);
                    
                    setIsRecording(true);
                    sessionStartRef.current = Date.now();
                    setElapsedTime(0);
                    setBreathCount(0);
                    setRawBR(0);
                    setEffectiveBR(0);
                    setPeakBR(0);
                    setSessionData([]);
                    setExpressiveEvents([]);
                    breathTimestampsRef.current = [];
                    expressionBufferRef.current = [];
                    motionHistoryRef.current = [];
                    energyHistoryRef.current = [];
                    
                    analyzeAudio();
                    
                    if (typeof DeviceMotionEvent !== 'undefined' && 
                        typeof DeviceMotionEvent.requestPermission === 'function') {
                        DeviceMotionEvent.requestPermission()
                            .catch(err => console.log('Motion permission denied:', err));
                    }
                    
                } catch (err) {
                    console.error('Error accessing microphone:', err);
                    alert('Please allow microphone access. On iOS, go to Settings > Safari > Microphone and enable access.');
                }
            };

            const stopRecording = () => {
                setIsRecording(false);
                
                if (animationFrameRef.current) {
                    cancelAnimationFrame(animationFrameRef.current);
                }
                
                if (mediaStreamRef.current) {
                    mediaStreamRef.current.getTracks().forEach(track => track.stop());
                }
                
                if (audioContextRef.current) {
                    audioContextRef.current.close();
                }
            };

            const resetSession = () => {
                setElapsedTime(0);
                setBreathCount(0);
                setRawBR(0);
                setEffectiveBR(0);
                setPeakBR(0);
                setRpe(5);
                setSessionData([]);
                setExpressiveEvents([]);
                setCurrentExpression(null);
                setBrZone('baseline');
                setRestDetected(false);
                breathTimestampsRef.current = [];
                expressionBufferRef.current = [];
                motionHistoryRef.current = [];
                energyHistoryRef.current = [];
                lastBreathTimeRef.current = 0;
                sessionStartRef.current = null;
                setShowResetConfirm(false);
            };

            const exportData = () => {
                const csvContent = [
                    ['Time(s)', 'Raw BR', 'Effective BR', 'RPE', 'Audio Level', 'Motion', 'Moving', 'Expression', 'Zone'],
                    ...sessionData.map(d => [
                        d.timestamp,
                        d.rawBR,
                        d.effectiveBR,
                        d.rpe,
                        d.audioLevel.toFixed(2),
                        d.motion.toFixed(2),
                        d.isMoving ? 'Yes' : 'No',
                        d.expression,
                        d.zone
                    ])
                ].map(row => row.join(',')).join('\n');
                
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pranaclimb_${Date.now()}.csv`;
                a.click();
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const getZoneColor = () => {
                switch(brZone) {
                    case 'baseline': return '#87CEEB';
                    case 'aerobic': return '#32CD32';
                    case 'below-cp': return '#32CD32';
                    case 'at-cp': return '#FF00FC';
                    case 'above-cp': return '#FF00FC';
                    case 'redline': return '#FF00FC';
                    default: return '#87CEEB';
                }
            };

            const getZoneLabel = () => {
                switch(brZone) {
                    case 'baseline': return 'Baseline';
                    case 'aerobic': return 'Aerobic';
                    case 'below-cp': return 'Below CP';
                    case 'at-cp': return 'At CP';
                    case 'above-cp': return 'Above CP → RCP';
                    case 'redline': return 'Redline';
                    default: return 'Monitoring';
                }
            };

            return (
                <div className="min-h-screen pb-8">
                    <div className="fixed inset-0 pointer-events-none overflow-hidden">
                        <div className="breathing-animation absolute top-20 right-20 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#87CEEB' }} />
                        <div className="breathing-animation absolute bottom-20 left-20 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#32CD32', animationDelay: '1.5s' }} />
                        <div className="breathing-animation absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 rounded-full filter blur-3xl" 
                             style={{ backgroundColor: '#FF00FC', animationDelay: '3s' }} />
                    </div>

                    <div className="relative z-10 max-w-7xl mx-auto px-4 py-6">
                        <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 mb-6 card-shadow slide-up border-2 border-gray-100">
                            <div className="flex items-center justify-between mb-6 flex-wrap gap-4">
                                <div>
                                    <h1 className="text-4xl font-bold mb-2 flex items-center gap-3" style={{ color: '#FF00FC' }}>
                                        Pranaclimb Live
                                        {breathingNow && isRecording && (
                                            <span className="pulse-circle inline-block w-4 h-4 rounded-full" 
                                                  style={{ backgroundColor: '#32CD32' }} />
                                        )}
                                    </h1>
                                    <p className="text-gray-600 font-medium">Ultra-Sensitive Breath Detection</p>
                                </div>
                                <div className="text-right">
                                    <div className="mono text-5xl font-bold text-gray-900">
                                        {formatTime(elapsedTime)}
                                    </div>
                                    <div className="text-gray-500 text-sm font-semibold">SESSION TIME</div>
                                </div>
                            </div>
                            
                            {!isRecording && (
                                <div className="mb-6 p-4 bg-gradient-to-r from-green-50 to-blue-50 rounded-2xl border-2 border-green-200">
                                    <p className="text-sm font-bold text-gray-900 mb-2">
                                        🫁 Exhale-Focused Detection:
                                    </p>
                                    <ul className="text-xs text-gray-700 space-y-1">
                                        <li>• <strong>Counts EXHALES only</strong> (one count per breath cycle)</li>
                                        <li>• <strong>Falling edge trigger:</strong> Detects end of exhale</li>
                                        <li>• <strong>Minimum gap:</strong> 1 second (realistic breathing)</li>
                                        <li>• <strong>Debouncing:</strong> Prevents multiple counts per breath</li>
                                        <li>• <strong>Pattern matching:</strong> Energy rise → peak → fall</li>
                                    </ul>
                                </div>
                            )}
                            
                            <div className="flex gap-4 flex-wrap">
                                {!isRecording ? (
                                    <button
                                        onClick={startRecording}
                                        className="flex-1 min-w-[200px] text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                        style={{ backgroundColor: '#32CD32' }}
                                    >
                                        ▶ Start Session
                                    </button>
                                ) : (
                                    <button
                                        onClick={stopRecording}
                                        className="flex-1 min-w-[200px] bg-red-500 hover:bg-red-600 text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                    >
                                        ■ Stop Session
                                    </button>
                                )}
                                
                                <button
                                    onClick={exportData}
                                    disabled={sessionData.length === 0}
                                    className="text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 disabled:opacity-50 shadow-lg"
                                    style={{ backgroundColor: '#87CEEB' }}
                                >
                                    ↓ Export
                                </button>
                                
                                <button
                                    onClick={() => setShowExpressionTable(!showExpressionTable)}
                                    className="text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                    style={{ backgroundColor: '#FF00FC' }}
                                >
                                    📋
                                </button>
                                
                                {sessionData.length > 0 && !isRecording && (
                                    <button
                                        onClick={() => setShowResetConfirm(true)}
                                        className="bg-gray-600 hover:bg-gray-700 text-white px-8 py-5 rounded-2xl font-bold transition transform active:scale-95 shadow-lg"
                                    >
                                        🔄
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-2 border-gray-100 slide-up">
                                <div className="flex items-center justify-between mb-3">
                                    <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">
                                        Raw BR
                                    </span>
                                    <span className="text-xs px-3 py-1 rounded-full" style={{ backgroundColor: '#87CEEB', color: 'white' }}>
                                        Observed
                                    </span>
                                </div>
                                <div className="mono text-6xl font-bold mb-2" style={{ color: '#87CEEB' }}>
                                    {rawBR}
                                </div>
                                <div className="text-sm text-gray-600 font-semibold">Breaths/Min</div>
                                <div className="mt-4 text-sm text-gray-500">
                                    Total: {breathCount} breaths
                                </div>
                            </div>

                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-4 slide-up" 
                                 style={{ borderColor: getZoneColor() }}>
                                <div className="flex items-center justify-between mb-3">
                                    <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">
                                        Effective BR
                                    </span>
                                    <span className="text-xs px-3 py-1 rounded-full text-white font-semibold" 
                                          style={{ backgroundColor: getZoneColor() }}>
                                        {getZoneLabel()}
                                    </span>
                                </div>
                                <div className="mono text-6xl font-bold mb-2" style={{ color: getZoneColor() }}>
                                    {effectiveBR}
                                </div>
                                <div className="text-sm text-gray-600 font-semibold">
                                    Raw + Expressions
                                </div>
                                {currentExpression && (
                                    <div className="mt-3 text-2xl animate-bounce">
                                        {EXPRESSION_ADJUSTMENTS[currentExpression]?.emoji}
                                    </div>
                                )}
                            </div>

                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-2 slide-up" 
                                 style={{ borderColor: '#FF00FC' }}>
                                <div className="flex items-center justify-between mb-3">
                                    <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">
                                        RPE
                                    </span>
                                </div>
                                <div className="mono text-6xl font-bold mb-2" style={{ color: '#FF00FC' }}>
                                    {rpe}
                                </div>
                                <div className="text-sm text-gray-600 font-semibold mb-4">
                                    Perceived Exertion
                                </div>
                                <input
                                    type="range"
                                    min="0"
                                    max="10"
                                    value={rpe}
                                    onChange={(e) => setRpe(parseInt(e.target.value))}
                                    className="w-full h-3 rounded-full appearance-none cursor-pointer"
                                    style={{ 
                                        background: `linear-gradient(to right, #87CEEB 0%, #32CD32 50%, #FF00FC 100%)`,
                                        accentColor: '#FF00FC'
                                    }}
                                />
                            </div>

                            <div className={`bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow slide-up border-4`}
                                 style={{ borderColor: isMoving ? '#32CD32' : '#87CEEB' }}>
                                <div className="flex items-center justify-between mb-3">
                                    <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">
                                        Motion
                                    </span>
                                    <span className="text-xs px-3 py-1 rounded-full text-white font-semibold" 
                                          style={{ backgroundColor: isMoving ? '#32CD32' : '#87CEEB' }}>
                                        {isMoving ? '🏃 Moving' : '🧘 Still'}
                                    </span>
                                </div>
                                <div className="mono text-6xl font-bold mb-2" 
                                     style={{ color: isMoving ? '#32CD32' : '#87CEEB' }}>
                                    {motionData.magnitude.toFixed(1)}
                                </div>
                                <div className="text-sm text-gray-600 font-semibold mb-4">
                                    Accelerometer
                                </div>
                                <div className="grid grid-cols-3 gap-2 text-xs mono">
                                    <div className="bg-gray-100 rounded-lg p-2">
                                        <div className="text-gray-500">X</div>
                                        <div className="font-bold">{motionData.x.toFixed(1)}</div>
                                    </div>
                                    <div className="bg-gray-100 rounded-lg p-2">
                                        <div className="text-gray-500">Y</div>
                                        <div className="font-bold">{motionData.y.toFixed(1)}</div>
                                    </div>
                                    <div className="bg-gray-100 rounded-lg p-2">
                                        <div className="text-gray-500">Z</div>
                                        <div className="font-bold">{motionData.z.toFixed(1)}</div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-2 border-gray-100 slide-up">
                                <div className="flex items-center justify-between mb-3">
                                    <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">
                                        🎙️ Audio
                                    </span>
                                </div>
                                <div className="relative h-32 bg-gray-100 rounded-2xl overflow-hidden">
                                    <div
                                        className="absolute bottom-0 left-0 right-0 transition-all duration-100"
                                        style={{ 
                                            height: `${audioLevel}%`,
                                            background: 'linear-gradient(to top, #87CEEB, #32CD32, #FF00FC)'
                                        }}
                                    />
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <span className="mono text-4xl font-bold text-gray-800">
                                            {audioLevel.toFixed(0)}%
                                        </span>
                                    </div>
                                </div>
                                <p className="text-xs text-gray-500 mt-2 text-center">
                                    Green pulse = sound detected (counts on exhale end)
                                </p>
                            </div>

                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-2 slide-up"
                                 style={{ borderColor: '#FF00FC' }}>
                                <div className="flex items-center justify-between mb-3">
                                    <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">
                                        Peak BR
                                    </span>
                                    <span className="text-2xl">🔥</span>
                                </div>
                                <div className="mono text-6xl font-bold mb-2" style={{ color: '#FF00FC' }}>
                                    {peakBR}
                                </div>
                                <div className="text-sm text-gray-600 font-semibold">
                                    Maximum Effective BR
                                </div>
                            </div>
                        </div>

                        <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 mb-6 card-shadow border-2 border-gray-100 slide-up">
                            <h3 className="text-xl font-bold mb-4 text-gray-900">
                                ⚡ Expressive Events
                            </h3>
                            <div className="space-y-2 max-h-64 overflow-y-auto">
                                {expressiveEvents.length === 0 ? (
                                    <p className="text-gray-500 text-center py-8">
                                        No expressive events yet
                                    </p>
                                ) : (
                                    expressiveEvents.slice(-15).reverse().map((event, idx) => (
                                        <div key={idx} className="bg-gradient-to-r from-gray-50 to-white rounded-2xl p-4 flex items-center justify-between border-2 border-gray-100">
                                            <div className="flex items-center gap-4">
                                                <span className="text-3xl">{event.emoji}</span>
                                                <div>
                                                    <div className="font-bold text-gray-900 capitalize">
                                                        {event.type.replace('_', ' ')}
                                                    </div>
                                                    <div className="text-sm text-gray-500">
                                                        +{event.adjustment.toFixed(1)} BPM
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <div className="mono font-semibold text-gray-900">
                                                    {formatTime(event.time)}
                                                </div>
                                                <div className="text-xs text-gray-500">
                                                    {event.level.toFixed(0)}dB
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        {restDetected && (
                            <div className="bg-gradient-to-r from-blue-500 to-blue-600 rounded-3xl p-6 mb-6 text-white shadow-2xl slide-up">
                                <div className="flex items-center gap-4">
                                    <div className="text-5xl">🧘</div>
                                    <div>
                                        <div className="text-2xl font-bold">Rest Detected!</div>
                                        <div className="text-sm opacity-90 mt-1">
                                            Begin HRR₆₀ countdown if measuring HR
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {sessionData.length > 0 && (
                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 mb-6 card-shadow border-2 border-gray-100 slide-up">
                                <h3 className="text-xl font-bold mb-6 text-gray-900">
                                    📊 Session Summary
                                </h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    <div>
                                        <div className="mono text-4xl font-bold" style={{ color: '#87CEEB' }}>
                                            {sessionData.length}
                                        </div>
                                        <div className="text-sm text-gray-600 font-semibold mt-1">
                                            Data Points
                                        </div>
                                    </div>
                                    <div>
                                        <div className="mono text-4xl font-bold" style={{ color: '#FF00FC' }}>
                                            {Math.max(...sessionData.map(d => d.effectiveBR))}
                                        </div>
                                        <div className="text-sm text-gray-600 font-semibold mt-1">
                                            Peak BR
                                        </div>
                                    </div>
                                    <div>
                                        <div className="mono text-4xl font-bold" style={{ color: '#32CD32' }}>
                                            {(sessionData.reduce((acc, d) => acc + d.effectiveBR, 0) / sessionData.length).toFixed(1)}
                                        </div>
                                        <div className="text-sm text-gray-600 font-semibold mt-1">
                                            Avg BR
                                        </div>
                                    </div>
                                    <div>
                                        <div className="mono text-4xl font-bold text-gray-900">
                                            {expressiveEvents.length}
                                        </div>
                                        <div className="text-sm text-gray-600 font-semibold mt-1">
                                            Expressions
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {!isRecording && sessionData.length === 0 && (
                            <div className="bg-white/90 backdrop-blur-lg rounded-3xl p-6 card-shadow border-2 border-gray-100 slide-up">
                                <h3 className="text-xl font-bold mb-4 text-gray-900">
                                    📱 How to Use
                                </h3>
                                <div className="space-y-3 text-gray-700">
                                    <p><strong style={{ color: '#32CD32' }}>1.</strong> Grant microphone permission</p>
                                    <p><strong style={{ color: '#87CEEB' }}>2.</strong> Start session</p>
                                    <p><strong style={{ color: '#FF00FC' }}>3.</strong> Watch green pulse when you breathe</p>
                                    <p><strong style={{ color: '#32CD32' }}>4.</strong> Count updates at END of exhale (one per breath)</p>
                                    <p><strong style={{ color: '#87CEEB' }}>5.</strong> Adjust RPE during rests, stop & export</p>
                                </div>
                                
                                <div className="mt-6 p-4 bg-gradient-to-r from-green-50 to-blue-50 rounded-2xl border-2 border-green-300">
                                    <p className="text-sm font-bold text-gray-900 mb-2">
                                        🫁 Exhale Detection Explained:
                                    </p>
                                    <p className="text-sm text-gray-700 mb-2">
                                        The app detects the <strong>falling edge</strong> of your exhale - the moment when your breath energy drops after peaking. This ensures <strong>one count per breath cycle</strong>, not multiple counts.
                                    </p>
                                    <p className="text-sm text-gray-700">
                                        Green pulse shows audio activity. Breath count updates when exhale completes (energy falls). Minimum 1 second between counts prevents duplicates.
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* Expression Table Modal - abbreviated for space */}
                        {showExpressionTable && (
                            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4"
                                 onClick={() => setShowExpressionTable(false)}>
                                <div className="bg-white rounded-3xl p-6 max-w-2xl w-full max-h-[80vh] overflow-y-auto card-shadow"
                                     onClick={(e) => e.stopPropagation()}>
                                    <h2 className="text-2xl font-bold mb-4" style={{ color: '#FF00FC' }}>
                                        Expression Table
                                    </h2>
                                    <div className="space-y-2 text-sm">
                                        <div className="p-3 bg-gray-50 rounded-lg">
                                            <span className="text-xl mr-2">💪</span>
                                            <strong>Grunt:</strong> +3 BPM (Force transfer)
                                        </div>
                                        <div className="p-3 bg-gray-50 rounded-lg">
                                            <span className="text-xl mr-2">😱</span>
                                            <strong>Scream:</strong> +5 BPM (Max neural drive)
                                        </div>
                                        <div className="p-3 bg-gray-50 rounded-lg">
                                            <span className="text-xl mr-2">🔇</span>
                                            <strong>Breath Hold:</strong> +2-10 BPM (Bracing)
                                        </div>
                                        <div className="p-3 bg-gray-50 rounded-lg">
                                            <span className="text-xl mr-2">😮‍💨</span>
                                            <strong>Sigh:</strong> 0 to -1 BPM (Reset)
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => setShowExpressionTable(false)}
                                        className="w-full mt-6 text-white px-6 py-3 rounded-2xl font-bold"
                                        style={{ backgroundColor: '#FF00FC' }}
                                    >
                                        Close
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Reset Modal */}
                        {showResetConfirm && (
                            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4"
                                 onClick={() => setShowResetConfirm(false)}>
                                <div className="bg-white rounded-3xl p-6 max-w-md w-full card-shadow"
                                     onClick={(e) => e.stopPropagation()}>
                                    <h3 className="text-2xl font-bold mb-4 text-gray-900">
                                        Reset Session?
                                    </h3>
                                    <p className="text-gray-700 mb-6">
                                        Clear all data? Make sure you've exported first!
                                    </p>
                                    <div className="flex gap-4">
                                        <button
                                            onClick={() => setShowResetConfirm(false)}
                                            className="flex-1 bg-gray-200 text-gray-800 px-6 py-4 rounded-2xl font-bold"
                                        >
                                            Cancel
                                        </button>
                                        <button
                                            onClick={resetSession}
                                            className="flex-1 bg-red-500 text-white px-6 py-4 rounded-2xl font-bold"
                                        >
                                            Reset
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<PranaclimbLiveMonitor />, document.getElementById('root'));
    </script>
</body>
</html>
