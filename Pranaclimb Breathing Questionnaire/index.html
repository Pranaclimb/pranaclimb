<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranaclimb - Breathing & Climbing Regulation Questionnaire</title>
    
    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .animate-pulse-subtle {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const ChevronDown = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        );

        const ChevronUp = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
        );

        const PranaclimbApp = () => {
            const [responses, setResponses] = useState(Array(18).fill(null));
            const [showResults, setShowResults] = useState(false);
            const [expandedSections, setExpandedSections] = useState({
                mechanical: false,
                stress: false,
                power: false
            });

            const questions = [
                "I hold my breath during hard moves or clipping",
                "I lose rhythm with my breathing when pumped",
                "My breathing becomes shallow in stressful sections",
                "I over-breathe or gasp when anxious/falling",
                "I struggle to inhale deeply mid-route",
                "I exhale sharply (grunt/scream) without control",
                "I feel tightness in chest/diaphragm while climbing",
                "I breathe too fast early in the climb",
                "I get dizzy/lightheaded on intense routes",
                "I panic or lose composure when pumped",
                "I struggle to calm my breathing at rests",
                "I can't return to nasal breathing after effort",
                "My fingers/toes tingle when overgripping or pumped",
                "I feel disconnected from breathing when climbing",
                "I find it hard to stay mentally calm on lead",
                "My breathing feels loud, stressed or erratic",
                "I hyperventilate after falling or on the redpoint go",
                "I struggle to breathe with tension in core/abdomen"
            ];

            const labels = ["Never", "Seldom", "Sometimes", "Often", "Very Often"];
            
            // Categories as per the document
            const categories = {
                mechanical: [0, 1, 2, 4, 6, 7, 15], // Items 1,2,3,5,7,8,16 (0-indexed)
                stress: [3, 8, 9, 13, 14, 16],       // Items 4,9,10,14,15,17 (0-indexed)
                power: [5, 10, 11, 17]               // Items 6,11,12,18 (0-indexed)
            };

            const totalScore = responses.reduce((sum, val) => sum + (val || 0), 0);
            const isComplete = responses.every(val => val !== null);

            const getScoreData = () => {
                const mechanicalScore = categories.mechanical.reduce((sum, i) => sum + (responses[i] || 0), 0);
                const stressScore = categories.stress.reduce((sum, i) => sum + (responses[i] || 0), 0);
                const powerScore = categories.power.reduce((sum, i) => sum + (responses[i] || 0), 0);

                let zone, zoneEmoji, interpretation, limiters;
                
                // Correct scoring: 0-20 = GREEN, 21-40 = YELLOW, 41+ = RED
                if (totalScore <= 20) {
                    zone = "Functional & Efficient Breathing";
                    zoneEmoji = "🟢";
                    interpretation = "Your breathing patterns are functional and efficient during climbing.";
                    limiters = [];
                } else if (totalScore <= 40) {
                    zone = "Improvable - Moderate Dysregulation";
                    zoneEmoji = "🟡";
                    interpretation = "Moderate breathing dysregulation is present. Your breathing is improvable with targeted training.";
                    limiters = [];
                } else {
                    zone = "Significant Dysregulation / Anxiety Response";
                    zoneEmoji = "🔴";
                    interpretation = "Significant breathing dysregulation or anxiety response detected. Foundation breathwork is recommended.";
                    limiters = [];
                }

                // Identify high-scoring limiters
                if (totalScore > 20) {
                    if (mechanicalScore >= 12) limiters.push("Breath-hold → Core tension issue · Fear reflex");
                    if (responses[7] >= 3) limiters.push("Fast breathing early → Pacing/CO₂ tolerance limiter");
                    if (responses[1] >= 3 || responses[10] >= 3) limiters.push("Loss of control under pump → Threshold management");
                    if (responses[10] >= 3) limiters.push("Hard to calm at rests → HRR recovery skill needed");
                }

                return {
                    totalScore,
                    mechanicalScore,
                    stressScore,
                    powerScore,
                    zone,
                    zoneEmoji,
                    interpretation,
                    limiters
                };
            };

            const getPatternRecommendations = () => {
                const data = getScoreData();
                const patterns = [];

                // Identify specific patterns based on high-scoring items
                if (responses[0] >= 3 || responses[4] >= 3 || responses[5] >= 3) {
                    patterns.push({
                        name: "Breath-Holding Dominance",
                        focus: "Shield Breath • Micro-Exhales • Reduce Valsalva duration"
                    });
                }

                if (responses[2] >= 3 || responses[6] >= 3 || responses[8] >= 3 || responses[14] >= 3) {
                    patterns.push({
                        name: "Anxiety → Over-Breathing Loop",
                        focus: "Grounding Breath • Extended Exhale 4:8 • Eyes-soft reset"
                    });
                }

                if (responses[1] >= 3 || responses[3] >= 3 || responses[10] >= 3) {
                    patterns.push({
                        name: "CO₂ Sensitivity (low tolerance)",
                        focus: "Apnea Walks • Tolerance Ladders • Nasal warm-ups"
                    });
                }

                if (responses[5] >= 3 || responses[7] >= 3 || responses[12] >= 3 || responses[15] >= 3) {
                    patterns.push({
                        name: "Chaotic Breathing Under Load",
                        focus: "Rowing Breath • HRR Reset • Breath-movement coupling"
                    });
                }

                if (responses[9] >= 3 || responses[13] >= 3 || responses[17] >= 3) {
                    patterns.push({
                        name: "Recovery Lag / Slow Downregulation",
                        focus: "Coherent Breathing • Physiologic Sighs • Shakeout strategy"
                    });
                }

                if (responses[11] >= 3 || responses[16] >= 3) {
                    patterns.push({
                        name: "Mechanical Restriction / BIQ Low",
                        focus: "10th-rib mobility • lateral expansion drills"
                    });
                }

                return patterns;
            };

            const getTrainingRecommendations = () => {
                const data = getScoreData();
                let recommendations = [];

                if (totalScore <= 20) {
                    // GREEN ZONE
                    recommendations = [
                        { title: "Continue monitoring", detail: "Track changes over time with periodic reassessment" },
                        { title: "Maintain awareness", detail: "Stay conscious of breathing patterns during climbs" },
                        { title: "Pre-climb breathing prep", detail: "Light nasal warm-up routines (2-3 min)" },
                        { title: "Monitor stress responses", detail: "Notice any changes during challenging routes" }
                    ];
                } else if (totalScore <= 40) {
                    // YELLOW ZONE
                    recommendations = [
                        { title: "Nasal breathing warm-ups", detail: "3–5 min before each climbing session" },
                        { title: "4:8 extended exhales", detail: "4s inhale / 8s exhale practice daily" },
                        { title: "Breathing awareness drills", detail: "Focus on breath rhythm during easy routes" },
                        { title: "Recovery breath timing", detail: "Practice HRR60 tracking at rest points" },
                        { title: "CO₂ tolerance work", detail: "Gentle apnea walks 2×/week" }
                    ];
                } else {
                    // RED ZONE
                    recommendations = [
                        { title: "Foundation breathwork", detail: "Daily practice is essential (5-10 min)" },
                        { title: "4:8 extended exhales", detail: "Calm nervous system before climbing" },
                        { title: "Apnea walking", detail: "Build CO₂ tolerance 2–3×/week" },
                        { title: "Shield Breath + Micro-Exhale", detail: "Practice during climbing drills" },
                        { title: "Nasal breathing training", detail: "Easy routes with exclusive nasal breathing" },
                        { title: "Professional support", detail: "Consider working with a breathing coach or therapist" }
                    ];
                }

                return recommendations;
            };

            const handleResponse = (questionIndex, value) => {
                const newResponses = [...responses];
                newResponses[questionIndex] = value;
                setResponses(newResponses);
            };

            const handleSubmit = () => {
                if (isComplete) {
                    setShowResults(true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            const handleReset = () => {
                setResponses(Array(18).fill(null));
                setShowResults(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const toggleSection = (section) => {
                setExpandedSections(prev => ({
                    ...prev,
                    [section]: !prev[section]
                }));
            };

            const scoreData = isComplete ? getScoreData() : null;
            const trainingRecs = isComplete ? getTrainingRecommendations() : null;
            const patternRecs = isComplete ? getPatternRecommendations() : null;

            return (
                <div className="min-h-screen p-4 md:p-8" style={{ backgroundColor: '#ffffff' }}>
                    <div className="max-w-4xl mx-auto">
                        {/* Header */}
                        <div className="mb-8 p-6 md:p-8 rounded-2xl shadow-lg" style={{ 
                            borderWidth: '4px', 
                            borderStyle: 'solid',
                            borderColor: '#ff00ff',
                            background: 'linear-gradient(135deg, #ffffff 0%, #fafafa 100%)'
                        }}>
                            <div className="text-center">
                                <h1 className="text-5xl md:text-6xl font-bold mb-3" style={{ color: '#ff00ff' }}>
                                    🫁 Pranaclimb
                                </h1>
                                <p className="text-2xl md:text-3xl font-semibold mb-2" style={{ color: '#89cff0' }}>
                                    Breathing & Climbing Regulation
                                </p>
                                <p className="text-lg text-gray-600 italic">
                                    Questionnaire
                                </p>
                                <div className="mt-4 pt-4 border-t-2" style={{ borderColor: '#aaff00' }}>
                                    <p className="text-sm md:text-base text-gray-700">
                                        🧗‍♀️ Rate how often each occurs while climbing or preparing to climb
                                    </p>
                                    <p className="text-xs md:text-sm text-gray-500 mt-2">
                                        Adapted from Nijmegen Questionnaire
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Results Display */}
                        {showResults && scoreData && (
                            <div className="mb-8 space-y-6 animate-fadeIn">
                                {/* Score Summary Card */}
                                <div className="p-6 md:p-8 rounded-2xl shadow-xl" style={{ 
                                    borderWidth: '3px',
                                    borderColor: '#aaff00',
                                    backgroundColor: '#fafafa'
                                }}>
                                    <div className="flex flex-col md:flex-row md:items-center md:justify-between mb-6 gap-4">
                                        <h2 className="text-3xl md:text-4xl font-bold" style={{ color: '#ff00ff' }}>
                                            Your Results
                                        </h2>
                                        <button
                                            onClick={handleReset}
                                            className="px-6 py-3 rounded-xl font-bold text-lg transition-all hover:scale-105 shadow-md"
                                            style={{ backgroundColor: '#aaff00', color: '#000' }}
                                        >
                                            ↻ Retake Assessment
                                        </button>
                                    </div>
                                    
                                    <div className="grid md:grid-cols-2 gap-6 mb-6">
                                        <div className="p-6 rounded-xl shadow-md" style={{ 
                                            backgroundColor: '#ffffff', 
                                            border: '3px solid #89cff0' 
                                        }}>
                                            <p className="text-sm font-semibold text-gray-600 mb-2">TOTAL SCORE</p>
                                            <p className="text-5xl font-bold" style={{ color: '#ff00ff' }}>
                                                {scoreData.totalScore}
                                            </p>
                                            <p className="text-2xl text-gray-500 mt-1">/ 72</p>
                                        </div>
                                        
                                        <div className="p-6 rounded-xl shadow-md" style={{ 
                                            backgroundColor: '#ffffff', 
                                            border: '3px solid #89cff0' 
                                        }}>
                                            <p className="text-sm font-semibold text-gray-600 mb-2">ZONE</p>
                                            <p className="text-4xl mb-2">{scoreData.zoneEmoji}</p>
                                            <p className="text-xl font-bold" style={{ color: '#ff00ff' }}>
                                                {scoreData.zone}
                                            </p>
                                        </div>
                                    </div>

                                    <div className="p-6 rounded-xl mb-4" style={{ 
                                        backgroundColor: '#aaff00', 
                                        opacity: 0.15,
                                        border: '2px solid #aaff00'
                                    }}>
                                        <p className="font-bold text-lg mb-2" style={{ color: '#000' }}>Interpretation:</p>
                                        <p className="text-gray-900 leading-relaxed">{scoreData.interpretation}</p>
                                    </div>

                                    {scoreData.limiters.length > 0 && (
                                        <div className="p-6 rounded-xl" style={{ 
                                            backgroundColor: 'rgba(137, 207, 240, 0.15)',
                                            border: '2px solid #89cff0'
                                        }}>
                                            <p className="font-bold text-lg mb-3" style={{ color: '#ff00ff' }}>
                                                ⚠️ Identified Limiters:
                                            </p>
                                            <ul className="space-y-2">
                                                {scoreData.limiters.map((limiter, idx) => (
                                                    <li key={idx} className="text-gray-800 flex items-start">
                                                        <span className="mr-2" style={{ color: '#aaff00' }}>•</span>
                                                        <span>{limiter}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                </div>

                                {/* Category Breakdown */}
                                <div className="p-6 md:p-8 rounded-2xl shadow-xl" style={{ 
                                    borderWidth: '3px',
                                    borderColor: '#ff00ff',
                                    backgroundColor: '#fafafa'
                                }}>
                                    <h3 className="text-2xl md:text-3xl font-bold mb-6" style={{ color: '#ff00ff' }}>
                                        📊 Pattern Breakdown
                                    </h3>
                                    
                                    <div className="space-y-4">
                                        {/* Mechanical Pattern */}
                                        <div 
                                            className="p-5 rounded-xl cursor-pointer transition-all hover:shadow-lg" 
                                            style={{ 
                                                backgroundColor: '#ffffff', 
                                                border: '3px solid #89cff0' 
                                            }}
                                            onClick={() => toggleSection('mechanical')}
                                        >
                                            <div className="flex justify-between items-center">
                                                <div className="flex-1">
                                                    <p className="font-bold text-lg mb-1">🫁 Mechanical / Pattern</p>
                                                    <p className="text-sm text-gray-600">Skill-based breathing efficiency</p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <span className="text-3xl font-bold" style={{ color: '#ff00ff' }}>
                                                        {scoreData.mechanicalScore}
                                                    </span>
                                                    <span className="text-gray-400">/ 28</span>
                                                    <div style={{ color: '#89cff0' }}>
                                                        {expandedSections.mechanical ? <ChevronUp /> : <ChevronDown />}
                                                    </div>
                                                </div>
                                            </div>
                                            {expandedSections.mechanical && (
                                                <div className="mt-4 pt-4 border-t-2" style={{ borderColor: '#aaff00' }}>
                                                    <p className="text-sm font-semibold mb-2" style={{ color: '#ff00ff' }}>
                                                        Focus Areas:
                                                    </p>
                                                    <p className="text-gray-700">
                                                        Shield Breath • Micro-Exhales • Reduce Valsalva duration
                                                    </p>
                                                </div>
                                            )}
                                        </div>

                                        {/* Stress Pattern */}
                                        <div 
                                            className="p-5 rounded-xl cursor-pointer transition-all hover:shadow-lg" 
                                            style={{ 
                                                backgroundColor: '#ffffff', 
                                                border: '3px solid #aaff00' 
                                            }}
                                            onClick={() => toggleSection('stress')}
                                        >
                                            <div className="flex justify-between items-center">
                                                <div className="flex-1">
                                                    <p className="font-bold text-lg mb-1">⚡ Stress / CO₂ Response</p>
                                                    <p className="text-sm text-gray-600">Emotional + ventilatory threat response</p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <span className="text-3xl font-bold" style={{ color: '#ff00ff' }}>
                                                        {scoreData.stressScore}
                                                    </span>
                                                    <span className="text-gray-400">/ 24</span>
                                                    <div style={{ color: '#aaff00' }}>
                                                        {expandedSections.stress ? <ChevronUp /> : <ChevronDown />}
                                                    </div>
                                                </div>
                                            </div>
                                            {expandedSections.stress && (
                                                <div className="mt-4 pt-4 border-t-2" style={{ borderColor: '#89cff0' }}>
                                                    <p className="text-sm font-semibold mb-2" style={{ color: '#ff00ff' }}>
                                                        Focus Areas:
                                                    </p>
                                                    <p className="text-gray-700">
                                                        Grounding Breath • Extended Exhale 4:8 • Eyes-soft reset
                                                    </p>
                                                </div>
                                            )}
                                        </div>

                                        {/* Power Pattern */}
                                        <div 
                                            className="p-5 rounded-xl cursor-pointer transition-all hover:shadow-lg" 
                                            style={{ 
                                                backgroundColor: '#ffffff', 
                                                border: '3px solid #ff00ff' 
                                            }}
                                            onClick={() => toggleSection('power')}
                                        >
                                            <div className="flex justify-between items-center">
                                                <div className="flex-1">
                                                    <p className="font-bold text-lg mb-1">🔥 Power / Expression</p>
                                                    <p className="text-sm text-gray-600">Redline breathing control + exhale coupling</p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <span className="text-3xl font-bold" style={{ color: '#ff00ff' }}>
                                                        {scoreData.powerScore}
                                                    </span>
                                                    <span className="text-gray-400">/ 20</span>
                                                    <div style={{ color: '#ff00ff' }}>
                                                        {expandedSections.power ? <ChevronUp /> : <ChevronDown />}
                                                    </div>
                                                </div>
                                            </div>
                                            {expandedSections.power && (
                                                <div className="mt-4 pt-4 border-t-2" style={{ borderColor: '#aaff00' }}>
                                                    <p className="text-sm font-semibold mb-2" style={{ color: '#ff00ff' }}>
                                                        Focus Areas:
                                                    </p>
                                                    <p className="text-gray-700">
                                                        Rowing Breath • HRR Reset • Breath-movement coupling
                                                    </p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* Pattern-Specific Recommendations */}
                                {patternRecs && patternRecs.length > 0 && (
                                    <div className="p-6 md:p-8 rounded-2xl shadow-xl" style={{ 
                                        borderWidth: '3px',
                                        borderColor: '#89cff0',
                                        backgroundColor: '#fafafa'
                                    }}>
                                        <h3 className="text-2xl md:text-3xl font-bold mb-6" style={{ color: '#ff00ff' }}>
                                            🎯 Detected Patterns
                                        </h3>
                                        <div className="space-y-4">
                                            {patternRecs.map((pattern, idx) => (
                                                <div key={idx} className="p-5 rounded-xl shadow-md" style={{ 
                                                    backgroundColor: '#ffffff', 
                                                    border: '2px solid #aaff00' 
                                                }}>
                                                    <p className="font-bold text-lg mb-2" style={{ color: '#ff00ff' }}>
                                                        {pattern.name}
                                                    </p>
                                                    <p className="text-gray-700">
                                                        <span className="font-semibold">Intervention:</span> {pattern.focus}
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Training Recommendations */}
                                <div className="p-6 md:p-8 rounded-2xl shadow-xl" style={{ 
                                    borderWidth: '3px',
                                    borderColor: '#aaff00',
                                    backgroundColor: '#fafafa'
                                }}>
                                    <h3 className="text-2xl md:text-3xl font-bold mb-6" style={{ color: '#ff00ff' }}>
                                        📋 Your Training Program
                                    </h3>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        {trainingRecs.map((rec, idx) => (
                                            <div key={idx} className="p-5 rounded-xl transition-all hover:shadow-lg" 
                                                style={{ 
                                                    backgroundColor: '#ffffff', 
                                                    border: '2px solid #89cff0' 
                                                }}>
                                                <p className="font-bold mb-2" style={{ color: '#ff00ff' }}>
                                                    {rec.title}
                                                </p>
                                                <p className="text-sm text-gray-700">{rec.detail}</p>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="mt-6 p-5 rounded-xl" style={{ 
                                        backgroundColor: 'rgba(255, 0, 255, 0.05)',
                                        border: '2px solid #ff00ff'
                                    }}>
                                        <p className="text-sm font-semibold mb-2" style={{ color: '#ff00ff' }}>
                                            💡 Reassessment Recommended:
                                        </p>
                                        <p className="text-gray-700">
                                            Complete this questionnaire again in 4-6 weeks to track your progress.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Questionnaire */}
                        {!showResults && (
                            <div className="space-y-5">
                                <div className="mb-6 p-4 rounded-xl text-center" style={{ 
                                    backgroundColor: 'rgba(170, 255, 0, 0.1)',
                                    border: '2px solid #aaff00'
                                }}>
                                    <p className="text-sm font-semibold text-gray-700">
                                        Progress: {responses.filter(r => r !== null).length} / 18 questions completed
                                    </p>
                                    <div className="mt-2 h-2 rounded-full bg-gray-200">
                                        <div 
                                            className="h-2 rounded-full transition-all duration-300" 
                                            style={{ 
                                                width: `${(responses.filter(r => r !== null).length / 18) * 100}%`,
                                                backgroundColor: '#aaff00'
                                            }}
                                        />
                                    </div>
                                </div>

                                {questions.map((question, qIndex) => (
                                    <div 
                                        key={qIndex} 
                                        className="p-5 md:p-6 rounded-xl shadow-lg transition-all hover:shadow-xl" 
                                        style={{ 
                                            backgroundColor: '#ffffff',
                                            borderWidth: '3px',
                                            borderColor: responses[qIndex] !== null ? '#aaff00' : '#89cff0'
                                        }}
                                    >
                                        <p className="font-semibold mb-4 text-gray-800 text-base md:text-lg">
                                            <span className="font-bold text-xl md:text-2xl mr-2" style={{ color: '#ff00ff' }}>
                                                {qIndex + 1}.
                                            </span>
                                            {question}
                                        </p>
                                        <div className="flex flex-wrap gap-2">
                                            {[0, 1, 2, 3, 4].map((value) => (
                                                <button
                                                    key={value}
                                                    onClick={() => handleResponse(qIndex, value)}
                                                    className="flex-1 min-w-[70px] px-3 py-3 md:py-4 rounded-xl font-bold transition-all hover:scale-105 shadow-md"
                                                    style={{
                                                        backgroundColor: responses[qIndex] === value ? '#ff00ff' : '#f5f5f5',
                                                        color: responses[qIndex] === value ? '#ffffff' : '#333',
                                                        border: responses[qIndex] === value ? '3px solid #aaff00' : '2px solid #ddd'
                                                    }}
                                                >
                                                    <div className="text-base md:text-lg font-bold">{value}</div>
                                                    <div className="text-xs mt-1">{labels[value]}</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}

                                {/* Submit Button */}
                                <div className="sticky bottom-4 pt-6">
                                    <button
                                        onClick={handleSubmit}
                                        disabled={!isComplete}
                                        className="w-full py-5 md:py-6 rounded-2xl font-bold text-xl md:text-2xl transition-all shadow-2xl"
                                        style={{
                                            backgroundColor: isComplete ? '#aaff00' : '#e8e8e8',
                                            color: '#000',
                                            cursor: isComplete ? 'pointer' : 'not-allowed',
                                            opacity: isComplete ? 1 : 0.6,
                                            border: '4px solid #ff00ff',
                                            transform: isComplete ? 'scale(1)' : 'scale(0.98)'
                                        }}
                                    >
                                        {isComplete ? '🎯 View My Results & Training Plan' : `${responses.filter(r => r !== null).length}/18 Questions - Keep Going!`}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Footer */}
                        <div className="mt-12 text-center text-sm text-gray-500 pb-8">
                            <div className="mb-2" style={{ color: '#89cff0' }}>
                                ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                            </div>
                            <p className="font-semibold">Pranaclimb Methodology</p>
                            <p className="mt-1">Adapted from Nijmegen Questionnaire</p>
                            <p className="mt-2 text-xs">© 2025 · A climbing-specific breathing dysregulation screen</p>
                        </div>
                    </div>
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PranaclimbApp />);
    </script>
</body>
</html>
